body:
  text: 竹書統箋卷首下翰林院檢討徐文靖撰前編太昊庖羲氏箋按漢律厯志庖羲繼天而王為百王先漁首德始於木故為帝太昊作罔罟以佃以取犧牲故天下號曰庖犧氏司馬公稽古録曰伏羲之前如天皇地皇人皇有巢之類雖於𫝊記有之語多迂怪事不經見臣不敢引獨據周易自伏羲以來叙之今紀年前編始于伏羲以此太昊之母居于華胥之渚箋按華胥地名在陜西藍田縣小洲曰渚履巨人跡意有所動虹且繞之因而始娠生帝于成紀箋按漢志天水郡有成紀縣今鞏昌府秦州也以木德王為風姓箋按月令春盛德在木其帝太皥太古河圖代姓紀伏羲氏燧人子也因風而生故風姓三墳書以伏羲為天皇墳為山墳元年即位都宛丘箋按三墳書伏羲氏皇策辭曰惟我承父居方三十二易草木上升君位是先分土于外後登帝位也昭公二十七年左𫝊梓慎曰陳太皥之墟也詩陳風宛丘之上朱子集𫝊曰四方高中央下曰宛丘龍馬負圗出河箋按五帝外紀注曰龍馬者天地之精其為形也馬身而龍鱗故謂之龍馬高八尺五寸頪骼有翼蹈水不沒故聖人在位負圗出于孟河之中焉唐志慈州文城縣冇孟門山在縣西南三十六里舊𫝊伏羲時有龍馬負圗出此三墳書皇榮辭曰命子襄居我飛龍之位主我圗文代我咨于四方上下無或私雖其書或後世所穿鑿而河圗之相𫝊有由也子華子曰河圗之二與四抱九而上躋六與八蹈一而下沉戴九而履一據三而持七五居中宮數之所由生一縱一橫數之所由成子華子程本與孔子同時其所言河圖當自有據又管子小匡篇曰昔人之受命者龜龍假河出圗洛出書地出乘黃更在孔子之前宋杜鎬對真宗曰河圗洛書蓋聖人以神道設教耳歐陽修作葛氏鼎歌曰馬圗出河龜負疇自古怪說何悠悠朱子曰以河圗洛書為不足信歐陽公以來已有此說然終無奈顧命繫辭論語皆有是言始作八卦箋按繫𫝊曰古者庖羲氏之王天下也仰則觀象于天俯則觀法于地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦周禮太卜掌三易一曰連山二曰歸藏杜子春謂連山伏羲歸藏黃帝殷康論易曰昔伏羲始畫八卦觀象以應樞禮含文嘉曰伏羲德洽上下天應以鳥獸文章地應以龜書唐孔氏曰繫辭云河出圗洛出書聖人則之故孔安國馬融王肅姚信等並云伏羲得河圗而作易是則伏羲雖得河圗並須仰觀俯察以相參正然後畫卦伏羲初畫八卦萬物之象皆在其中故繫辭曰八卦成列象在其中矣雖有萬物之象其萬物變通之理猶自未備故因其八卦而更重之卦有六爻遂重為六十四卦也繫辭曰因而重之爻在其中矣是也然重卦之人諸儒不同凡有四說王輔嗣等以為伏羲重卦鄭康成之徒以為神農重卦孫盛以為夏禹重卦史遷等以為文王重卦其言夏禹及文王重卦者按繫辭神農之時已有蓋取益與噬嗑者以此論之不攻自破其神農重卦亦未為得今依輔嗣以伏羲既畫八卦即重為六十四卦為得其實以龍紀官箋按昭十七年左𫝊郯子曰太皥氏以龍紀故為龍師而龍名杜預曰大皥伏羲氏風姓之祖也有龍瑞故以龍命官外紀太昊命朱襄為飛龍氏造書契昊英為潛龍氏造甲歷大庭為居龍氏造屋廬渾沌為降龍氏驅民害隂康為土龍氏治田里栗陸為水龍氏繁滋草木疏導泉流又立五官以春官為青龍氏又曰蒼龍夏官為赤龍氏秋官為白龍氏冬官為黑龍氏中官為黃龍氏是謂龍師而龍名立九相六佐箋按外紀曰太昊立九相共工為上相柏皇為下相朱襄昊英常居左右栗陸居北赫胥居南昆連居西葛天居東隂康居下又陶潛羣輔録曰太昊六佐金提主化俗烏明主建福視默主災惡紀通為中職仲起為海陸陽侯為江湖分理宇內而政化大治制九州箋按伏羲氏皇策辭曰九州之牧各統其人羣居于外法語曰伏羲始定四海之廣作八卦分九州真源賦曰伏羲别九宫因此制九州鄭康成注易乾鑿度曰太一者北辰神名也下行八卦之宫每四乃還於中央中央者北辰之所居故謂之九宫太一下行九宫從坎宫起自此而從於坤宫而震宫而巽宫所行半矣還息于中央之宫又自此而從于乾宫而兌宫而艮宫而離宫行則周矣上遊息於太一之宫而反紫宫行起此太昊以八卦有九宫因此制九州也造書契箋按易繫曰上古結繩而治後世聖人易之以書契物原曰燧人氏作繩蓋上古未有文字大事則大結其繩小事則小結其繩至太昊始易以書契也河圗代姓記天皇命臣飛龍氏造六書周禮六書一曰象形二曰假借三曰指事四曰㑹意五曰轉注六曰諧聲是也契約也周禮聽取豫以書契曲禮獻粟者執右契注曰兩書一札同而别之也外紀注曰論字學者謂始於倉頡而不謂始於伏羲倉頡為黃帝史官或伏羲制字至倉頡而大備或倉頡即伏羲之臣而共成書契皆無從稽考也今按伏羲時朱襄為飛龍氏造書契何必疑倉頡為伏羲之臣也作甲歷箋按古三墳羲皇命昊英居潛龍之位主隂陽甲歷咨於四方上下無或差爾雅太嵗在甲曰閼逢在寅曰攝提格邢昺疏曰甲至癸為十日日為陽寅至丑為十二辰辰為隂按漢律厯志述三統曰人統寅木也太簇律長八寸象八卦虙戲氏之所以順天地通神明類萬物也以是知伏羲已用寅正夏后氏因之而已賈公彥謂連山作于伏羲因于夏后氏此之謂也蓋夏正建寅艮居東北為寅春首寅連山首艮其義一也外紀曰伏羲作甲歷起于甲寅支干相配為十二辰六甲而天道周矣嵗以是紀而年不亂月以是紀而時不易東西南北以是紀而方不惑之矣造琴瑟箋按琴操伏羲作琴所以禦邪僻防心淫外紀曰伏羲斫木為琴繩絲為絃絃二十有七命之曰離徽爾雅大琴謂之離郭璞注或曰琴大者二十通七絃未詳長短當猶是伏羲遺制故謂之離離者以神明之貺而名之蓋取諸離孫叔然云音多變聲流命離也失其㫖矣虞汝明古琴疏云伏羲時嬰䃌貢梓下相柏皇為琴曰丹維曰祖牀正未知出何書又按世本曰瑟伏羲氏作五十絃漢郊祀志曰泰帝使素女鼓五十絃瑟悲帝禁不止故破其瑟為二十五絃帝王世紀曰伏羲作瑟三十六絃外紀曰伏羲絙桑為三十六絃之瑟所以修身理性返其天真魏曹植伏羲贊曰瑟以象時神德通𤣥爾雅大瑟謂之灑郭曰長八尺一寸廣一尺八寸二十七絃孫叔然云謂之灑者音多變布如灑出也郭云二十七絃未見所出又按楚辭大招曰伏羲駕辨楚勞商只王逸注伏羲作瑟造駕辨之曲吳都賦或超延露而駕辨皆言太昊作瑟之事也作立基之樂箋按河圗代姓紀曰天皇因龍出而紀官因鳳來而作樂王嘉曰庖羲灼土為塤孝經鉤命决曰伏羲樂曰立基外紀曰帝作荒樂歌扶徠詠罔罟以鎮天下之人命曰立本亦曰立基製嫁娶以儷皮為禮箋按上古男女無别伏羲始製嫁娶以儷皮為禮時女媧氏與伏羲同母生而神靈佐伏羲以重萬民之别而民始不瀆造干戈箋按王嘉拾遺記伏羲造干戈以飾武此干戈之始也在位一百一十五年陟箋按東吳朱氏曰三皇之號有以為天皇地皇人皇者見於秦博士之妄議有以為伏羲神農燧人者見於梁武帝之謬談有以為伏羲女媧神農者司馬貞之陋說紛紛不一皆非也孔安國尚書序曰古者庖羲氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉伏羲神農黃帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也或有問于朱子曰三皇所說甚多當以何者為是朱子曰無處理㑹當且依孔安國之說五峯以為天皇地皇人皇而伏羲神農黃帝堯舜為五帝却無顓頊高辛之數要之也不可便如此說董氏鼎曰周禮外史掌三皇五帝之書左氏亦謂楚左史倚相能讀三墳五典則三皇有書明矣而孔子則云庖羲氏始畫八卦上古結繩而治後世聖人易之以書契是庖羲已前且未有字安得有書如此則三皇為伏羲神農黃帝之書安國之說近是觀朱子及童氏之言則三皇為伏羲神農黃帝斷乎其無疑矣朱子之說如此今竹書紀年始黃帝而不始伏羲者以黃帝已前無年之可紀也無年可紀故始於黃帝而非遺羲農不録之謂今仍以羲農補紀於前庶幾於三皇無關而且於繫𫝊叙庖羲次神農次黃帝之義為無悖云炎帝神農氏箋按三墳書以神農為人皇墳為氣墳漢志神農氏作以火承木故曰炎帝教民耕農故天下號曰神農氏封禪書齊桓公欲封禪管仲曰神農封泰山禪云云炎帝封泰山禪云云注曰炎帝神農後蓋後世襲炎帝之號非二也少典之君娶于有蟜氏之女曰安登生神農三日而能言七日而齒具三嵗而知稼穡箋按五帝外紀少典娶有蟜女生炎帝此有蟜蓋有媧之訛也國語少典娶有蟜女生黃帝豈炎帝與黃帝同父同母乎三皇本紀神農氏母曰安登有媧氏之女為少典妃以時計之為得其實媧蟜字近而訛故誤耳而世紀曰炎帝之母曰任已有蟜氏女也不知何出育于姜水故以姜為姓箋按世紀曰神農氏姜姓也長于姜水其起本于烈山號烈山氏箋按水經注賜水出大紫山西徑厲鄉南水南有重山即烈山也一統志烈山在今德安府隨州本作列左傳列山氏之子又作厲禮祭法厲山氏之有天下也其初國伊又國耆合而稱之又號伊耆氏箋按禮明堂位疏曰禮運云伊耆氏始為蠟是報田之祭易繫神農始作耒耜田起於神農故說者以伊耆氏為神農也元年即位居陳箋按左𫝊陳太皥之虛也杜注今陳州神農氏代伏羲有天下始都于此遷曲阜箋按曲阜魯地今兗州府曲阜縣炎帝遷此又號大庭氏春秋命歷序曰炎帝號大庭氏魯有大庭氏之庫禪通紀有大庭氏又有炎帝神農氏妄也尊師受學箋按漢書古今人表悉諸神農師吕氏春秋神農師於悉諸學於老農作五絃琴箋按世本神農作琴桓談新論曰神農氏始削桐為琴七絃足以通萬物而考理亂也張揖廣雅曰神農氏琴長三尺六寸六分上有五絃曰宫商角徵羽文王增二絃曰少宫少商則新論言七絃者殊未確也又按說文曰琴者禁也神農所作洞越練朱絃樂記清廟之瑟朱絃而疏越鄭注云朱絃練朱絃則聲濁越瑟底空也疏通也使兩頭孔相連而通也然則洞越者通洞其底孔言神農制琴之體製也邢昺爾雅疏曰琴長三尺六寸六分五絃者此常用之琴也象三百六十六日五絃象五行又琴操曰廣六寸象六合也作耒耜箋按易繫神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益汲冡周書曰神農作陶冶斧斤為耜鉏耨以墾草莾然後五榖興以助果蓏實教天下種穀箋按汲冡周書曰神農之時天雨粟神農耕而種之吕氏春秋曰神農教曰士有當年不耕者則天下或受其饑矣女有當年不績者則天下或受其寒矣故夫親耕女親績立歷日箋按楊泉物理論曰疇昔神農始治農功正節氣審寒溫以為早晚之期故立歷日尚書考靈曜主春者烏星昏中可以種稷主夏者心星昏中可以種黍主秋者虛星昏中可以種麥主冬者昴星昏中可以斬伐具器械天子南面而坐視四星之中者知民之緩急則不賦力役敬授民時日中為市箋按日中為市致天下之民聚天下之貨交易而退各得其所易繫𫝊曰蓋取諸噬嗑是也日中者以四方之民道里逺近不同故一以日中為期俾令販夫販婦貿遷有無者皆得依期而至也辨水泉甘苦箋按河圗曰九州殊題水泉各異荆揚角徵㑹其泉酸以苦梁州商徵接其泉苦以辛兗豫宫徵合其泉甘以苦雍冀商羽合其泉辛以鹹又文子曰汾水濛濁而宜麻濟水通和而宜麥河水濛濁而宜菽洛水輕利而宜禾渭水多力而宜黍漢水安重而宜竹江水肥仁而宜稻劉氏外紀曰炎帝察水泉甘苦令民知所避就以此也味嘗草木作方書箋按神農政典曰病正四百四藥三百六十五過數乃亂而昏而毒陸景典語曰神農嘗草别穀蒸民乃粒食外紀曰上古民有疾病未知藥石炎帝始味草木之滋察其寒溫平熱之性辨其君臣佐使之義嘗一日而遇七十毒神而化之遂作方書以療民疾而醫道立矣建明堂箋按桓談新論曰神農氏祀明堂有蓋而無四方則明堂不始于黃帝也作中天易箋按鄭康成曰伏羲畫八卦神農重之為六十四卦周禮太卜掌三易干寶注曰伏羲之易小成為先天神農之易中成為中天黃帝之易大成為後天杜子春曰連山伏羲歸藏黃帝唐孔氏曰案世譜等書神農又號連山氏黃帝又號歸藏氏是神農之易本于伏羲至黃帝乃别為歸藏也有火瑞以火紀官箋按左𫝊郯子曰炎帝氏以火紀故為火師而火名杜氏曰亦有火瑞故以火命官應劭曰春官為大火夏官為鶉火秋官為西火冬官為北火中官為中火命官分職箋按外紀曰神農命赤冀為杵臼命巫咸主卜筮命刑天作扶犁之樂命屏封作種書命白阜作地理紀以理天下又按山海經刑天與帝爭神帝乃斷其首而葬之常羊之山刑天以乳為目臍為口操干戚而舞注不言何帝以此計之當即為炎帝也又春秋元命包曰神農世怪義生白阜圖地形脉水道御覽以怪義為白阜母是圖書並起于羲農也作下謀之樂箋按孝經鉤命決曰神農樂曰下謀禮明堂位曰土鼓蕢桴葦籥伊耆氏之樂也孔疏曰說者以伊耆為神農也時諸侯夙沙氏叛不用帝命其臣箕文諫而被殺炎帝益修厥德夙沙之民自攻其君而來歸其地箋按汲冢周書曰黃帝時有諸侯夙沙氏始以海煮成鹽此夙沙氏其先也於是南至交址箋按交址國名今安南是北至幽都即古之幽陵今幽燕是東至𤾉谷即湯谷日所出處西至三危箋按唐志三危山在沙州燉煌縣東南六十里莫不服從其化在位一百四十年陟于長沙之荼鄉箋按漢志長沙荼陵縣莽曰聲鄉師古曰荼音弋奢反又文加反趙雪航曰外紀載伏羲人首蛇身神農人首牛身不知二聖乃開物成務之祖顧有此怪異之貌乎不足信矣殊不審人首蛇身之說猶孔子龜背李廣猿臂班超虎頭燕頷之類耳豈真有牛首蛇身者哉趙氏說泥竹書統箋卷首下
