body:
  text: 竹書統箋目録編年類凡例卷首上雜述卷首下前編卷一黃帝在位一百年少昊附紀年不録帝顓頊在位九十八年帝嚳在位六十三年帝摯附在位九年卷二帝堯元丙子在位一百年帝舜元己未在位五十年卷三夏后禹元壬子在位八年后啓元癸亥在位十六年太康元癸未在位四年帝相元戊戌在位二十八年仲康元己丑在位九年明年丙寅少康生乙酉少康奔有虞甲辰少康使汝艾伐過殺澆伯杼滅戈伯靡殺寒浞乙巳少康自綸歸于夏邑帝少康元丙午在位二十一年帝杼元乙巳在位十七年帝芬元戊子在位四十四年帝芒元壬申在位五十八年卷四帝泄元辛未在位二十五年帝不降元己亥在位五十九年遜位于弟後十年陟帝扄元戊戌在位十八年帝厪元己未在位八年帝孔甲元己巳在位九年帝昊元庚辰在位三年帝發元乙酉在位七年帝癸元壬辰在位三十一年自禹至桀十七世有王與無王用嵗四百七十一卷五商王湯湯以諸侯十八年伐夏嵗在癸亥又十有一年而陟共二十九年外丙元己亥在位二年仲壬元丁丑在位四年太甲元辛巳在位十二年沃丁元癸巳在位十九年小庚元壬子在位五年小甲元丁巳在位十七年雍己元甲戌在位十二年太戊元丙辰在位七十五年仲丁元辛丑在位九年外壬元庚戌在位十年河亶甲元庚申在位九年祖乙元己巳在位十九年祖辛元戊子在位十四年開甲元壬寅在位九年祖丁元丁未在位九年南庚元丙辰在位六年陽甲元壬戌在位四年盤庚元丙寅在位二十八年小辛元甲午在位三年小乙元丁酉在位十年卷六武丁元丁未在位五十九年祖庚元丙午在位十一年祖甲元丁巳在位三十三年馮辛元庚申在位四年庚丁元甲午在位八年武乙元壬寅在位三十五年文丁元丁丑在位十三年帝乙元庚寅在位九年帝辛元己亥在位五十二年湯至紂二十九王用嵗四百九十六年卷七周武王以西伯十有二年伐殷有天下元辛卯又六年陟先後十七年成王元丁酉在位三十七年卷八康王元甲戌在位二十六年昭王元庚子在位十九年穆王元己未在位五十五年共王元甲寅在位十三年懿王元丙寅在位二十五年孝王元辛卯在位九年夷王元庚子在位八年厲王元戊申在位十二年奔彘又十四年陟卷九宣王元甲戌在位四十六年幽王元庚申在位十一年卷十平王元辛未在位五十一年桓王元壬戌在位二十三年莊王元乙酉在位十五年釐王元庚子在位五年惠王元乙巳在位二十五年襄王元庚午在位三十三年頃王元癸卯在位六年卷十一匡王元己酉在位六年定王元乙卯在位二十一年簡王元丙子在位十四年靈王元庚寅在位二十七年景王元丁巳在位二十五年敬王元壬午在位四十四年元王元丙寅在位七年貞定王元癸酉在位二十八年哀王三月附見考王下思王五月附見考王下考王元庚子在位十五年威烈王元丙辰在位二十四年安王元庚辰在位二十六年烈王元丙午在位七年卷十二顯王元癸丑在位四十八年慎靚王元辛丑在位六年隱王元丁未竹書紀年終於隱王十六年臣等謹案竹書統箋十二卷國朝徐文靖撰文靖即著山河兩戒考者是編作於孫之騄考定竹書以後亦因沈約注為之引證推闡首仿司馬貞補史記例作伏羲神農紀年題曰前編而自為之注多據毛漸偽三墳殊失考正又為雜述述竹書源流皆不入卷數其箋則仿諸經注疏之例發明於各條之下蓋文靖誤以紀年為原書又誤以其注真出沈約故以箋自名如鄭康成之尊毛萇也然其引證諸書皆著出典較孫之騄為切實而考正地理訂正世系亦較之騄為詳晰如坊本誤於外丙元年後係以小庚五年小甲十七年雍已十二年太戊三十五年乃繼以二年陟蓋舊本顛倒一頁重刻者因而仍之陳仁錫作四書考遂據以駁難異同文靖以殷本紀排比知其脫誤亦較之騄為密也乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀竹書統箋凡例一紀年一書自周隱王十七年瘞於梁襄王冡至晉武太康二年乃得此書凡五百七十九年其時考正者有和嶠束晳衛恆荀朂王庭堅王接潘滔摯虞謝衡諸人皆博物多聞之士晉隋唐諸志皆有是書梁沈約始為附注約好言符瑞於事實罕有發明今特為統箋逐事分載以紀其詳一統箋之下所引書傳辭義相同者則連書之其稍有不同則加又按其確有徵驗可辨析者則加據字例皆放此一是書於紀年中逐字詳注而謂之箋者倣鄭氏詩箋之例所以别於注也謂之統箋者不特於紀年箋之附注箋之諸凡所引書傳間有訛誤亦併箋之也一紀年逐條之下間有細字皆休文附注故各於箋按之上加圈以别之至歷代某帝某王推原其先世發祥之自亦皆大字僅低一字者世誤以為竹書之本文今並見宋書符瑞志中實亦休文所自撰採後世讖緯諸書而成當時謂之附注以為竹書本文者由未讀宋書故也乃附注之外又有所為約按者以其非習聞而自為立説者也實亦附注之例也一紀年初瘞之嵗下距始皇燔書之嵗八十六年則是書在未焚之前信而可徵也至今以經傳校之一一符合一紀年始于黃帝蓋黃帝使大撓作甲子自是而後始得以甲子紀年故也周禮外史掌三皇五帝之書易大傳黃帝之前有神農伏羲孔安國書序伏羲神農黃帝為三皇溫公稽古録亦始伏羲故特倣司馬承禎三皇補紀之例列之於前非好為蛇足也一劉道原通鑑外紀金仁山前編皆依邵堯夫經世紀年以竹書較之多有不合如外丙仲壬經世所無胤征辰弗集于房經世以為在仲康元年唐一行大衍推合在仲康五年與竹書合小雅十月之交朔日辛卯孔仲達疏據王基之説謂在共和以前梁虞􅒠推合幽王六年乙丑與竹書合如此類不可枚舉近世耳學者每於通鑑編年下乃云據經世正之殊可嘆也一紀年最可議者莫如太甲潛出自桐殺伊尹一事方是時齊田和遷康公于海上晉三卿徙桓公于屯留往往假伊尹放君之名以為解釋時作紀年者特設為潛出殺尹一案以見戰國諸君為臣所放皆可潛殺其臣也不然前言命尹為卿士後言祠保衡此獨言潛出殺尹不亦自相矛盾哉故沈約謂此文與前後不類蓋後人所益一劉知幾作史通不知殺季歷者為文丁誤以文丁為文王韋昭注國語杜預注左傳皆以攜王為伯服不知為王子余臣如此類者甚夥不有竹書烏從而證之此余之統箋所由作也一紀年雜述裒諸簡端無分先後亦容齋隨筆例也俗儒眇見寡聞多以紀年為齊東野語稗官脞録殊不知晉隋諸史列之中經取證經史毫無差謬古今來博物君子著書立説未有不取證於是書者觀之雜述了了可見而俗儒轉不之信束廣微校正竹書而外又有發蒙一記者其亦有感而作者與一紀年雜述之下凡有訛舛宜辨者只用按字不言箋按蓋自述謏聞管見無與於箋注之例故也一同里馬君晴川好古工詩蓄書甚富其令嗣長君葵齋績學精進廣讀父書以余為通家世好遇箋注所有紕謬一一是正無隱故是書或罕有譏彈者葵齋力也一崔子郁岑英年嗜學沉靜寡言嘗見余所纂山河兩戒考管城碩記披閲再四有疑必問余喜其篤志深造非徒以好古博虛名者因併以紀年屬之讎校其有匡余不逮者不敢以年少忽之故並録其姓字於前一是刻非余意也余年八十有二始箋注此書閲三寒暑而後成不過以是書訛誤頗多俾稍拈出示兒輩讀史之法初何敢出以問世適馬崔二子來謁因出是編以就正二子以余為世好各受鉛黃悉加是正力為慫恿以授梓或有誚之者曰彼既與位山有舊何不為位山藏拙余因辭之二子來復曰合河孫總憲奉新甘大司馬華亭張宮詹皆當代偉人也常以先生所著述達之天聽近撫憲衛公以先生經學特薦于朝何必前工後拙且昔是而今非也余無以應遂聽之
