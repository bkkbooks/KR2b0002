body:
  text: 竹書綂箋卷三翰林院檢討徐文靖撰帝禹夏后氏箋按紀年曰帝舜十四年命禹代虞事十五年帝命夏后有事于太室時禹受封為夏伯稱為夏后禹有天下因以為氏也南軒通鑑前編曰禹踐天子之位于韓注引通志曰禹受帝舜之禪踐天子之位于安邑即韓國也此大謬矣漢志潁川陽翟夏禹國周末韓景侯自新鄭徙此應劭曰夏禹都也世紀曰禹受封為夏伯在禹貢豫州外方南於秦漢属潁川本韓地今河南陽翟是也外紀曰禹都安邑或云平陽亦云晉陽及韓韓亦謂陽翟耳南軒引通志謂安邑即韓國謬矣母曰脩己出行見流星貫昴夢接意感箋按帝王世紀曰鯀納有莘氏女曰志是為脩己元命包曰昴七星十一度帝位明即昴星光大既而吞神珠脩己背剖而生禹于石紐箋按李石續博物志曰薏苡一名簳珠禮緯曰禹母脩己呑薏苡而生禹因姓姒氏揚雄蜀本紀曰禹本汶山郡廣柔縣人也生于石紐遁甲開山圖榮氏解曰女狄暮汲石紐山下泉水中得月精如雞子愛而含之不覺呑遂有娠十四月生夏禹晉載記劉元海曰大禹出于西戎文王生于西夷顧惟徳所授耳括地志石紐山在茂州汶川縣西七十二里虎鼻口兩耳參鏤箋按鏤當作漏禮别名記曰禹耳三漏是謂大通興利除害決江疏河首戴鈎鈐箋按星𫝊曰鈎九星鈐一星其星明則道大昌胸有玉斗箋按帝王紀曰禹胸有玉斗足文履已故名文命長有聖徳長九尺九寸箋按續博物志曰禹長九尺九寸夢自洗于河取水飲之又有白狐九尾之瑞箋按趙曄吴越春秋曰禹年三十未娶行塗山恐時暮失嗣曰吾之娶必有應矣乃有白狐九尾而造于禹於是塗山人歌曰綏綏白狐九尾龎龎成于家室我都攸昌禹因娶塗山女一綂志漢當塗縣城在今懷逺縣塗山北麓下即古塗山氏之國當堯之時舜舉之禹觀于河有長人白面魚身出曰吾河精也呼禹曰文命治水言訖授禹河圗言治水之事乃退入于淵箋按世紀曰禹名文命字髙宻水經注曰禹理水觀于河見白面長人魚身出曰吾河精也授禹河圗而還于淵禹治水既畢天錫𤣥圭以告成功箋按宋書符瑞志水泉流通四海㑹同則元珪出一綂志岷山在岷州衛城北山黒無樹木洮水經其下相𫝊夏禹見長人受黒玉書於此夏道將興草木暢茂青龍止于郊祝融之神降于崇山乃受舜禪即天子之位箋按漢郊祀志曰夏得木徳青龍止于郊草木鬯茂括地圗曰夏徳盛二龍降之帝使范氏御之以行國語曰夏之興也祖融降于崇山注曰祖融祝融也崇嵩字古通用耳洛出龜書是為洪範箋按尚書洪範曰天乃錫禹洪範九疇孔𫝊曰天與禹洛出書神龜負文而出列于背有數至于九禹遂因而第之以成九類一綂志龜巢在河南府永寧縣西洛水北岸𤣥滬水濱乃夏禹治水洛書呈瑞處三年䘮畢都于陽城箋按世本曰禹都陽城徐堅曰夏禹在陽城葢避舜子商均非都也元年壬子帝即位箋按舜在位五十年元己未崩戊申而己酉庚戌辛亥三年䘮畢故禹元年為壬子居冀箋按郡縣志安邑故城在陜州夏縣東北十五里禹所都也世紀曰堯都平陽舜都蒲坂禹都安邑相去不盈二百里皆在冀州故竹書總曰居冀頒夏時于邦國箋按禮運曰孔子曰吾欲觀夏道是故之杞而不足徵也吾得夏時焉太史公曰孔子正夏時學者多𫝊夏小正云夏小正序曰孔子得夏時于杞而鄭注月令文辭大抵嚴約不類秦漢以來信其為有夏氏之遺書其間星昏旦伏見中正當鄉若寒暑日風氷雪雨旱之節草木稊秀之候羽毛鱗臝蠕動之屬蟄興粥伏鄉遰陟降離隕鳴呴之應㒺不具紀而王政民事繫焉葢夏之月令也唐志大衍歴議曰夏小正雖頗疎簡失𫝊乃羲和遺跡何承天循大戴之説復用夏時更以正月甲子夜半合朔雨水為上元進乖夏歴退非周正故近代推月令小正者多不與古合開元歴推夏時立春日在營室之末昏東井二度中古歴以参右肩為距方當南正故小正曰正月初昏斗杓懸在下魁枕參首所以著參中也季春在昴十一度半去參距星十八度故曰三月參則伏立夏日在井四度昏角中南門右星入角距西五度其左星入角距東六度故曰四月初昏南門正昴則見五月節日在輿鬼一度半參去日道最逺以渾儀度之參體始見其肩股猶在濁中房星正中故曰五月參則見初昏大火中八月參中則曙失𫝊也辰伏則參見非中也十月初昏南門見亦失𫝊也定星方中則南門伏非昏見也仁山金氏曰八月參中則旦當作參見爾岐張氏曰金氏之説本大衍議曰八月參中則曙失𫝊也辰伏則參見非中也故曰當作參見不知八月辰伏自以昏時伏參中自以平旦中何得以昏時之伏而例平旦之參謂其始見乎三年臯陶薨箋按臯陶字庭堅見左𫝊後漢書馮衍顯志賦臯陶釣于雷澤兮賴虞舜而後親太子賢注曰吕氏春秋曰舜陶于河濵漁于雷澤今言臯陶未詳皇甫謐曰臯陶生于曲阜偃地故帝因之而以賜姓曰偃堯禪舜命之作士舜禪禹禹即舜位以臯陶最賢薦之于天將有禪之之意未及禪㑹陶卒水經注曰六縣故臯陶國也禹封其少子奉其祀今縣都陂中有大冡民𫝊曰公琴者臯陶冢也楚人謂冡為琴矣按琴乃岑之譌耳酈云楚人謂冡為琴非五年巡狩㑹諸侯于塗山箋按王制曰天子五年一巡狩五年者虞夏之制也哀七年𫝊諸大夫對孟孫曰禹合諸侯于塗山執玉帛者萬國杜氏曰諸侯執玉附庸執帛塗山在壽春東北地理通釋曰在壽春東北濠州鍾離縣西九十五里山前有禹㑹村尚書禹娶于塗山辛壬癸甲天問禹身獻功降省下土焉得彼塗山女而通之于台桑即此塗山也一綂志塗山在懷逺縣東南八里又皇侃注孝經曰春秋稱禹㑹諸侯于塗山執玉帛者萬國言禹要服之内地方七千里而置九州九州之中有方百里七十里五十里之國計有萬國也南巡狩濟江中流箋按吕氏春秋曰禹自塗山巡省南土有二黄龍負舟舟人皆懼箋按吳越春秋曰禹南渡江黄龍負舟禹笑曰吾受命于天屈力以養人生性也死命也奚憂龍哉龍于是曳尾而逝箋按水經注江水又右楊岐北山山東有城故華容縣尉舊治也大江又東左合于夏口又東左得候䑓水口又右得龍穴水口江浦右迤也北對虎洲又洲北有龍巢地名也昔禹南濟江黄龍夾舟禹笑曰吾受命于天何憂龍哉故水地取名矣八年春㑹諸侯于㑹稽箋按吳越春秋曰禹巡天下登茅山以朝羣臣乃大㑹計治國之道更名茅山曰㑹稽水經注曰㑹稽山古防山也亦謂之為茅山又曰棟山左𫝊禹㑹諸侯于塗山預注塗山在壽春東北非也余按國語仲尼曰昔禹致羣神于㑹稽之山防風氏後至殺之葢丘明親承聖㫖録為實證故塗山有㑹稽之名今据禹㑹塗山在五年㑹㑹稽在八年先後懸殊非一地矣酈注承劉向説苑之譌不知其非殺防風氏箋按國語仲尼曰防風汪㒺氏守封禺之山者也今湖州府武康縣是也世説㑹稽有防風鬼屢見城邑常跂雷門上脚乘至地晉横陽令賀韜義鼔琴防風聞琴聲在賀中庭舞夏六月雨金于夏邑箋按帝王世紀曰夏禹時天雨金蒼頡時雨粟天鏡曰天雨金為兵䘮徐堅曰唐虞以前都名不著自夏以後各有所稱白虎通曰夏為夏邑商為商邑周為京師秋八月帝陟于㑹稽箋按吳越春秋禹老而嘆曰吾年壽將盡止死斯乎乃命羣臣葬我于㑹稽之山越絶書禹葬㑹稽鳥為之芸地理志㑹稽山隂縣㑹稽山在南上有禹冡禹井墨子曰禹葬㑹稽之山既葬收餘壤其上隴若參耕之畆則止矣禹立四十五年箋按竹書帝舜十四年壬申命禹代虞事至舜五十載戊申凡三十七年舜陟而己酉庚戌辛亥三年䘮畢禹即位元年壬子八年己未凡四十五年帝王世紀曰禹年七十四舜始薦之于天薦後十二年始使禹攝行天子事五年舜崩禹除䘮明年始即真年百嵗崩於㑹稽禹薦益于天七年禹崩三年䘮畢天下歸啓箋按古今人表禹娶塗山氏女曰女趫生啓漢書武帝紀行幸緱氏詔曰朕用事華山至于中嶽見夏后啓母石應劭曰啓生而母化為石文穎曰在嵩高山下陳氏仁錫曰啓一名㑹見紀年連山易作余又曰建見年代歴山海經作夏后開避漢諱也帝啓箋按夏本紀禹子啓賢天下屬意焉禹崩雖薦益益之佐禹日淺天下未洽故諸侯皆去益而朝啓元年癸亥帝即位于夏邑箋按郡國志潁川陽翟禹所都葢禹始封于此為夏伯啓即位居此故曰夏邑帝王世紀曰禹都平陽或在安邑或在晉陽何以知此夏邑非安邑平陽諸地也以啓饗諸侯于陽翟之鈞臺故知啓即位于夏邑即陽翟是也大饗諸侯于鈞臺諸侯從箋按昭四年𫝊椒舉言于楚子曰夏啓有鈞臺之饗杜注河南陽翟有鈞臺陂水經注曰嵎水東逕三封山東南歴大陵西連山易曰啓筮亭啓享神于大陵之上即鈞臺也一綂志鈞臺在禹州城北門外又周禮掌賔曰上公三饗是天子於諸侯稱饗也帝歸于冀都箋按括地志安邑故城在絳州夏縣東北十五里本夏之都大饗諸侯于璿臺箋按易歸藏曰昔者夏后啓筮享神于晉之虚作為璿臺于水之陽王融曲水園詩序夏后兩龍載驅璿臺之上謂此也二年費侯伯益出就國箋按秦本紀大業取少典之子曰女華生大費與禹平水土已成帝錫𤣥圭禹受曰非予能成亦大費為輔帝舜曰咨爾費贊禹功其賜爾斿是為柏翳索隠曰尚書謂之伯益又按莊十六年𫝊滑伯同盟于幽杜預曰滑國都費河南緱氏縣伯益封費宜即此也王帥師伐有扈大戰于甘附注有扈在始平鄠縣箋按書叙曰啓與有扈戰于甘之野作甘誓馬融曰甘有扈氏南郊地名前漢志扶風鄠縣有扈谷亭後志有甘亭楚辭天問曰該秉季徳厥父是臧胡終弊于有扈牧夫牛羊洪興祖注啓兼秉禹之末徳而禹善之授以天下有扈以堯舜與賢啓獨與子故伐啓啓伐滅之有扈遂為牧䜿也据韓非子曰有扈氏有失度驩兜氏有孤男三苗有成駒桀有侯侈紂有崇侯虎晉有優施此六臣者亡國之臣也則啓之伐扈當别有説未必如洪氏所云六年伯益薨祠之箋按天問曰啓代益作后卒然離蠥洪氏補注引汲冡書曰益為啓所殺今据竹書益薨于帝啓六年啓方且祠之何有殺之之事漢律歴志曰夀王言化益為天子代禹皆不合經術亦是類也又按唐書宗室世系表臯陶字庭堅為堯大理生益益生恩成歴虞夏商世為大理八年帝使孟涂如巴涖訟箋按山海經曰夏后啓之臣孟涂是司神于巴巴人訟于孟涂之所其衣有血者乃執之是請生居丹山西郭璞曰今建平郡丹陽城秭歸縣東七里即孟涂所居也十年帝巡狩舞九韶于天穆之野箋按山海經曰天穆之野高二千仭開焉得始歌九韶郭氏曰竹書夏后開歌九韶史記索隠曰招音韶即舜樂簫韶九成故曰九招又天穆之野一曰大穆之野又曰大遺之野文心雕龍曰帝嚳之世咸墨為頌以歌九招九招古樂名也十一年放王季子武觀于西河附注曰武觀即五觀也今頓丘衛縣箋按王季子啓之第五子也昭元年𫝊趙孟曰虞有三苗夏有觀扈商有姺邳周有徐奄杜注觀國今頓丘衛縣國語士亹曰啓有五觀韋昭曰五觀啓子太康昆弟也水經注曰淇水又北逕頓丘縣故城西古文尚書以為觀地矣葢太康弟五君之號為五觀者也据此五觀即武觀也夏本紀謂帝太康失國昆弟五人須于洛汭作五子之歌則五子述大禹之戒以作歌必皆為啓之賢子竹書武觀則武是一人之名不得為五人矣古今人表啓子昆弟五人號五觀路史后啓五庶俱封于觀是為五觀皆謬又禹貢浮于積石至于龍門西河孔疏曰河在冀州之西故謂之西河時夏啓都冀則觀在西河也十五年武觀以西河叛箋按武觀既放于西河至此以西河叛漢于此置畔觀縣屬東郡謂此也彭伯壽帥師征西河武觀來歸箋按史記正義曰彭城徐州所理縣州東外城古之彭國也周書嘗麥解曰其在啓之五子忘伯禹之命假國無正用胥興作亂遂亡厥國皇天哀禹賜以彭壽思正夏畧謂此也十六年陟箋按六當作八据竹書太康元年癸未則后啓之陟當在庚辰葢辛巳壬午三年䘮畢而太康即位是六當作八也帝太康箋按夏本紀夏后帝啓崩子太康立元年癸未帝即位居斟鄩箋按前漢書薛瓚注曰㘰尋在河南汲郡古文太康居斟鄩又昭二十三年𫝊王師晉師圍郊郊尋潰杜注河南鞏縣有地名鄩中括地志故鄩城在洛州鞏縣西南五十八里書序曰太康失邦昆弟五人湏于洛汭此即太康之居為近洛也畋于洛表箋按夏書曰太康尸位以逸豫乃盤遊無度畋于有洛之表十旬弗返有窮后羿因民弗忍距于河孔𫝊曰洛水之南蔡𫝊羿因民不堪命距太康于河北使不得返羿入居斟鄩箋按襄四年𫝊曰夏之方衰也后羿自鉏遷于窮石晉地記曰河南有窮后羿國于有窮者即此也漢志北海平壽縣臣瓚引汲郡古文太康居斟尋羿亦居之時斟尋又自河南遷北海也四年陟箋按寰宇記曰拱州太康縣城太康所築故以名一綂志太康縣在開封府城東南二百一十里本夏太康所築城時太康為羿所距不得返國故陟于此帝仲康箋按夏本紀太康崩弟仲康立元年己丑帝即位居斟鄩箋按孔氏書疏曰羿廢太康猶立仲康不自立則是時羿居斟尋而立仲康故仲康亦居斟尋也五年秋九月庚戌朔日有食之箋按唐志日度議曰夏后氏四百三十二年日却差五度太康後二年戊子嵗冬至應在女十一度書曰乃季秋九月朔辰弗集于房劉炫曰房所次之舎也集㑹合也不合則日蝕可知或以房為房星知不然者且日之所在正可推而知之君子慎疑寧當以日在之宿為文近代善歴者推仲康時九月合朔巳在房星北矣按房者辰之所次星者所次之名其揆一也又春秋𫝊辰在斗柄天䇿焞焞降婁之初辰尾之末君子言之不以為謬何獨致疑于房星哉新歴仲康五年己巳嵗九月庚戌朔日蝕在房二度虞􅒠以為仲康元年非也今据竹書日食在仲康五年與大衍正同命𦙍侯帥師征羲和箋按書堯典疏曰夏王仲康之時𦙍侯命掌六師顧命陳寳有𦙍之舞衣故知古有􅏷國書𦙍征叙曰羲和湎淫廢時亂日𦙍往征之作𦙍征六年錫昆吾命作伯箋按鄭語史伯曰昆吾為夏伯矣韋昭曰昆吾祝融之後陸終第二子名樊為己姓封于昆吾昆吾衛是也其後夏衰昆吾為夏伯墨子曰昔夏后開使飛亷採金于山以鑄鼎于昆吾是昆吾初為侯國至是錫以九命為伯也哀十七年傳衛侯夢見人登昆吾之觀北面而譟曰登此昆吾之虛括地志昆吾故城在濮陽縣西三十里七年陟世子相出居商丘箋按劉道原通鑑外紀相為羿所逐失國居商丘本此王伯厚地理通釋以相居商丘為相居帝丘之誤非是葢相先居商丘即位後十五年始徙帝丘也依邳侯附注一作依同姓諸侯斟灌斟尋箋按定元年𫝊薛宰曰吾祖奚仲居薛為夏車正奚仲遷于邳杜注奚仲為夏禹掌車服大夫太康地記曰奚仲遷于邳謂之下邳臣瓚曰有上邳故曰下邳葢太康畋于洛表則邳侯世掌車服自必從之從太康及仲康至此凡十一年相在商丘與邳近其依于邳侯理或然也帝相箋按夏本紀仲康崩子帝相立元年戊戌帝即位居商箋按杜預曰宋商商丘三名一地括地志曰古商丘又羿所封之地是羿居斟尋而立仲康又就封于商而立相故仲康及相皆依之以為居也征淮夷箋按淮夷謂淮水上之夷也昭元年𫝊曰周有徐奄杜注徐即淮夷非也魯頌保有鳬繹遂荒徐宅至于海邦淮夷蠻貊是淮夷與徐為二昭四年徐子淮夷㑹申楚執徐子秋楚子淮夷伐吴是㑹申時有淮夷有徐伐吴時既執徐子又有淮夷徐非即淮夷明矣又按世本云淮夷嬴姓此杜氏所由誤也三年征風及黄夷箋按後漢列𫝊東夷九種有風夷黄夷七年于夷來賓箋按東夷𫝊有于夷太子賢注曰后相七年于夷來賓八年寒浞殺羿箋按襄四年𫝊曰寒浞伯明氏之䜛子弟也伯明氏棄之夷羿收之浞行媚于内而施賂于外外内咸服羿歸自田家衆殺之皇甫謐曰寒浞殺羿于桃棓而烹之以食其子其子不忍食之死于窮門晉志濟南平壽縣古寒國寒浞封此世本寒妘姓古今人表作韓浞師古曰羿之相也使其子澆居過箋按左氏𫝊浞因羿室生澆及豷處澆于過處豷于戈晉地道記東萊掖縣有過鄉北有過亭是古之過國括地志故過鄉在萊州掖縣西北二十里史記索隠曰過猗姓國九年相居于斟灌箋按薛瓚曰相居斟灌東郡灌是也括地志斟灌故城在青州壽光縣東五十四里時相與羿居商丘羿既見殺故相出居斟灌也十五年商侯相土作乘馬箋按襄九年𫝊陶唐氏之火正閼伯居商丘相土因之商頌相土烈烈海外有截王肅曰相土在夏為司馬之職掌征伐也孔疏曰相土是昭明之子契之孫也前漢刑法志殷周以兵治天下天下既定而猶立司馬之官四邑為丘丘十六井也有戎馬一匹牛三頭四丘為甸甸六十四井也有戎馬四匹兵車一乗牛十二頭甲士三人卒七十二人是為乘馬之法此當是相土所作乘馬遺制故商人因之而立司馬之官以相土在夏為司馬也若易繫服牛乘馬其來已乆不始于相土矣世本黄帝之臣臣胲作服牛相土作駕馬則古時有相土作乘馬非夏后時相土也遂遷于商丘箋按此商丘當為帝丘葢因前有商丘而誤也世本契居畨昭明居砥石相土居商丘荀子成相篇契𤣥王生昭明居于砥石遷于商丘左𫝊閼伯居商丘相土因之杜預曰宋商商丘三名一地一綂志商丘在歸徳府城西南三里高百邑一名閼伯臺則商即商丘也安得又從商而遂遷商丘乎其云遂遷者葢以相土作乘馬以兵車衛相遂遷帝丘如詩所謂載輯干戈爰方啓行者非以相土作乘馬而自遷帝丘也漢志東郡濮陽故帝丘左𫝊衛遷于帝丘衛成公夢康叔曰相奪予享杜注相居帝丘今濮陽唐高宗封泰山次濮陽問此為帝丘何也許敬宗曰昔顓頊始居此地其後夏后相因之春秋時衛成公自楚丘徙此左氏稱相奪予享以舊地也由顓頊所居故曰帝丘時后相自斟灌遷此則當為帝丘無疑二十年寒浞滅戈箋按太史公曰禹後分封用國為姓有戈氏戈本夏同姓路史以戈為己姓非也哀十二年傳鄭人城嵓戈錫杜氏曰戈在宋鄭之間括地志浞既滅戈因遂封豷于戈二十六年寒浞使其子澆帥師滅斟灌箋按襄四年𫝊魏絳曰澆用師滅斟灌及斟尋京相璠曰故斟尋國西北去灌亭九里是斟尋雖在河南亦嘗與斟灌相依共事故后相依斟灌以居也時帝相居斟灌十八年至是澆用師滅斟灌者葢弑帝相之漸也二十七年澆伐斟鄩大戰于濰覆其舟滅之箋按澆論語作奡奡盪舟葢謂澆伐斟尋大戰于濰而覆其舟也先儒皆謂奡多力能陸地行舟謬矣又按山海經濰水出瑯琊箕縣屋箕山東北逕都昌縣東又東北入于海奡伐斟尋戰于是水而覆其舟淮南子濰水出覆舟山葢因是以立名也今本作覈舟覈乃覆譌二十八年寒浞使其子澆弑帝箋按相居斟灌澆滅斟灌而不弑帝者以尚有斟尋在也逮斟尋既滅遂敢于弑帝后緡歸于有仍箋按哀元年𫝊伍員曰昔有過澆殺斟灌以伐斟尋滅夏后相后緡方娠逃出自竇歸于有仍賈逵曰有仍后緡之國緡有仍之姓古今人表作有扔又昭二十八年𫝊昔有仍氏生女黰黒后䕫娶之此有仍氏之先也伯靡出奔鬲箋按杜預曰靡夏遺臣事羿者皇甫謐曰初夏之遺臣曰靡事羿羿死逃于有鬲氏今据竹書帝相八年寒浞殺羿至二十八年帝相被弑羿死二十一年矣而伯靡始奔有鬲靡豈因羿死而始奔乎安見其為夏臣事羿者葢靡乃夏之遺臣韜晦以事帝相者故相弑而遂奔有鬲耳應劭曰鬲偃姓臯陶之後斟灌之墟是為帝丘后緡方娠逃出自竇歸于有仍伯靡奔有鬲氏箋按杜預曰今平原鬲縣括地志故鬲縣在徳州安徳縣西北十五里夏世子少康生丙寅年少康自有仍奔虞乙酉年箋按哀元年𫝊曰后緡歸于有仍生少康焉為仍牧正澆使椒求之逃奔有虞為之庖正以除其害虞思于是妻之以二姚邑諸綸杜注虞舜後郡國志梁國虞縣有綸城少康邑水經注曰汳水東逕虞縣故城北古虞國也伯靡自鬲帥斟鄩斟灌之師以伐浞箋按襄四年𫝊曰靡自有鬲氏收二國之燼以滅浞而立少康杜注燼遺民胡氏曰少康靡鬲真人臣子哉經營四十年然後克殄元凶祀夏配天不失舊物世子少康使汝艾伐過殺澆甲辰年箋按哀元年𫝊使汝艾諜澆杜注汝艾少康臣諜候也伯子杼帥師滅戈箋按襄四年𫝊曰后杼滅豷于戈稱后杼者葢伯子杼也哀元年𫝊曰使季杼誘豷杜注豷澆弟也季杼少康子后杼也今据竹書伯子杼葢后杼也其帥師滅戈先使其弟季杼誘之耳時少康二子伯與季並名杼杜云季杼即后杼非也伯靡殺寒浞箋按浞所恃澆與豷耳澆豷既滅則寒浞勢孤故伯靡于是殺之少康自綸歸于夏邑乙巳年箋按已上繫年者皆紀年之本文也少康丙寅生乙酉奔虞年二十甲辰殺澆年三十九乙巳歸于夏邑年四十通典宋州虞城縣有綸城即少康邑在縣東南三十五里也方輿紀勝少康中興復遷安邑今平陽府解州安邑縣明年后緡生少康箋按附注稱明年以羿浞不當紀年故承上帝相二十八年乙丑浞使其子澆弑帝明年丙寅而少康生也既長為仍牧正箋按王肅曰牧正牧官之長也惎澆能戒之澆使椒求之箋按林堯臣曰椒澆臣將至仍少康逃奔有虞為之庖正以除其害虞思于是妻之以二姚而邑諸綸箋按杜預曰思有虞君也姚虞姓史記吴太伯世家伍員曰少康奔有虞有虞思夏徳不以虞思為虞君之名與此異也有田一成有衆一旅箋按賈逵曰方十里為成五百人為旅能布其徳而兆其謀以收夏衆撫其官職箋按為仍牧正以下皆哀元年左傳文夏之遺臣伯靡自有鬲氏收二斟之燼以伐浞箋按二斟謂斟灌斟尋浞恃澆皆康娱日忘其惡而不為備少康使汝艾諜澆初浞娶雄狐氏箋按楚辭天問曰浞娶雄狐眩妻爰謀何羿之射革而交吞揆之朱子集註曰言浞娶于雄狐氏女眩惑愛之遂與浞謀殺羿也有子早死其婦曰女岐寡居澆強圉往至其户陽有所求女岐為之縫裳共舎而宿箋按天問曰女岐縫裳而館同爰止王逸注曰女岐澆嫂也汝艾夜使人襲斷其首乃女岐也澆既多力又善告艾乃田獵放犬逐獸因嗾澆顛隕乃斬澆以歸于少康箋按天問曰何少康逐犬而顛隕厥首謂此于是夏衆滅浞奉少康歸于夏邑箋按帝王世紀曰禹自安邑都晉陽曾孫帝相遷帝丘子少康中興還乎舊都復禹之迹也河東安邑夏禹都故曰夏邑諸侯如聞之箋按如聞誤當作始聞葢少康復歸夏邑皆少康父子及伯靡二斟之所經營而諸侯不與故至是始聞之也立為天子祀夏配天不失舊物箋按哀元年𫝊伍員曰祀夏配天不失舊物帝少康箋按夏本紀帝相崩子帝少康立索隠曰帝相自被篡殺中間經羿浞二氏葢三數十年而此紀總不言之直云帝相崩子少康立葢疎畧之甚然按吴世家稱引伍子胥曰昔有過氏殺斟灌以伐斟尋滅夏后帝相帝相之妃后緡方娠逃于有仍而生少康為有仍牧正有過又欲殺少康少康奔有虞所載甚詳葢史公之意不與羿浞以代夏故詳于彼而畧于此也元年丙午帝即位諸侯來朝賔虞公箋按少康既歸于夏邑諸侯始聞故至是而來朝以共尊為天子也二年方夷來賓箋按後漢東夷𫝊有方夷注曰少康即位方夷來賓也三年復田稷箋按周本紀曰后稷之興在陶唐虞夏之際皆有令徳后稷卒子不窋立不窋末年夏后氏政衰去稷不務不窋以失其官而犇戎狄之間一綂志慶陽府禹貢雍州之域周之先不窟所居號北豳春秋時為義渠戎國海内經曰后稷是播百穀稷之孫曰叔均是始為牛耕是始為國郭璞曰得封為國當即謂復田稷之時也皇王大紀以公劉不遷豳附于少康之甲子未可據也文二年𫝊文武先不窟杜注不窟后稷子后稷之後不窋失官箋按括地志不窋故城在慶州𢎞化縣南三里是失官而自竄于戎狄以居此也至是而復十一年使商侯㝠治河箋按古今人表㝠根圉之子昌若之孫相土之曽孫也祭法㝠勤其官鄭注曰其官𤣥㝠宋衷曰㝠為司空十八年遷于原箋按郡國志河内軹縣有原鄉左𫝊杜注沁水西北有原城葢少康自夏邑遷原也二十一年陟箋按是年丙寅歴丁卯戊辰䘮畢而帝杼即位帝杼箋按夏本紀帝少康崩子帝子立索隠予音佇世本云帝佇作甲即帝杼也元年己巳帝即位居原箋按水經注濟有二源東源出原城今孟州西北有古原城路史曰帝杼即位居原即其地也五年自原遷于老丘箋按定十五年鄭罕達敗宋師于老丘杜注宋地一綂志老丘在開封府陳留縣北四十里有老丘城地名攷畧曰縣有老丘城見陳留風俗𫝊八年征于東海及三壽得一狐九尾箋按魯頌曰三壽作朋又曰遂荒大東至于海邦今据竹書征于東海及三壽則三壽疑東海古國名近魯者也瑞應圖曰六合一綂則九尾狐見十三年商侯㝠死于河箋按魯語展禽曰㝠勤其官而水死故商人郊㝠而宗湯韋昭曰㝠契後六世孫為夏水官勤于其職而死于水陳澔禮記集説曰㝠即𤣥㝠也水死未聞不有竹書烏從而証之又按漢禮樂志曰卨始生𤣥王師古曰毛鄭説詩以𤣥王即卨也此志既有卨又有𤣥王則𤣥王非卨一人矣十七年陟箋按是年己酉歴丙戌丁亥䘮畢而帝芬即位杼或作帝宇一曰伯杼箋按伯杼少康之元子帝宇宇乃宁譌也杼能帥禹者也故夏后氏報焉箋按魯語展禽曰杼能帥禹者也故夏后氏報焉韋昭曰杼禹後七世少康之子季杼也能興夏道者今据竹書伯子杼嗣少康為天子則已為夏后矣又何俟夏后始報之乎葢伯杼少康元子而季杼其少子也所注謂杼能帥禹者乃季杼耳左𫝊曰使季杼誘豷水經曰大越之國秦為山隂縣㑹稽郡治也夏后少康封少子季杼以奉禹祀則季杼與伯杼為二而休文附注乃係之伯杼之下混矣顔魯公吴興地記烏程有杼山言夏后七世主杼巡狩至此則亦臆度之辭耳葢以禹啓太康仲康相少康伯杼凡七世也帝芬箋按夏本紀帝杼崩子帝槐立世本作帝芬與紀年同元年戊子帝即位箋按帝芬即位不言居某者當亦嗣父居老丘也三年九夷來御箋按劉敞謂九夷在徐州莒魯之間爾雅疏後漢東夷傳夷有九種此東夷也戰國䇿張儀曰楚破南陽九夷内沛許鄢陵危又李斯曰恵王用張儀之計南取漢中包九夷此西南諸夷也又按周禮地官之屬師氏居虎門之左使其屬帥四夷之隸各以其兵服守王之門外則當日九夷來御亦或有使之環衛王宮者乎穆𫝊虞人次御郭氏曰以次侍御備有所問則來御亦謂來侍御也十六年洛伯用與河伯馮夷鬭箋按歸藏曰昔者河伯筮與洛戰而枚卜昆吾占之不吉當即為是時也河伯洛伯皆當時諸侯伯爵用與馮夷其名也穆天子𫝊曰天子西征騖行至于陽紆之山河伯無夷之所都居是惟河宗氏河宗伯天逆天子燕然之山郭璞注曰無夷馮夷也葢馮夷為伯夭之逺祖夏帝芬時諸侯也水經注曰竹書紀年洛伯用與河伯馮夷鬭葢洛水之神其説非矣三十三年封昆吾氏子于有蘇箋按韋昭曰蘇己姓國唐書世系表顓頊裔孫樊封于昆吾昆吾之子封于蘇其地鄴西蘇城是路史懷之武徳有蘇故城與世系表異二十六年作圜土箋按周禮大司寇以圜土聚敎罷民凡害人者置之圜土而施職事焉鄭氏注曰圜土者獄城也聚罷民其中困苦以敎之為善也水經注曰夏曰夏臺殷曰羑里周曰囹圄皆圜土也然則帝芬之圜土葢即夏臺也四十四年陟箋按是年為辛未而帝芒踰年改元芬或曰芬𤼵箋按世本作芬附注或曰芬𤼵也帝芒箋按夏本紀帝槐崩子帝芒立元年帝即位箋按是年為壬申以𤣥珪賓于河箋按堯八十六年司空入覲贄用𤣥圭瑞應圖曰王者勤苦以憂天下厚人薄己則𤣥珪出葢禹功既成天以賜禹至是而帝芒乃用以賓河也十三年冬狩于海獲大魚箋按星經曰天魚一星在尾後河中星明則海出大魚初學記引紀年曰后荒即位元年以𤣥璧賔于河狩于海獲大魚誤合為一年事也三十三年商侯遷于殷箋按商頌宅殷土芒芒鄭箋曰自契至湯八遷始居亳之殷地据竹書帝芒三十三年商侯遷于殷上距商侯㝠死于河八十有二年此遷殷葢𤣥㝠之子子亥也世本相土居商丘㝠往河治水子亥遷殷孔甲復歸商丘則此遷殷者正殷侯子亥也孔甲乃上甲之譌國語所謂上甲微能帥契者𤣥㝠之孫子亥之子也計夏后帝芒三十三年下距湯始居亳之殷地百六十年其時已先稱殷周氏曰商人稱殷自盤庚始自此以前惟稱商而已今据竹書商在夏已稱殷安在湯始居殷盤庚遷殷改商曰殷乎五十八年陟箋按是年為己巳芒或曰帝荒箋按史記索隠芒音亡鄒誕生又音荒也竹書綂箋卷三
