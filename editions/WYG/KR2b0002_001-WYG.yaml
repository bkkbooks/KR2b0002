body:
  text: 竹書綂箋卷首上翰林院檢討徐文靖撰雜述晉書束晳𫝊初太康二年汲郡人不凖盗𤼵魏襄王墓或言安釐王冡得竹書數十車其紀年十三篇記夏以來至周幽王為犬戎所滅以事接之三家分仍述魏事至安釐王之二十年葢魏國之史書大畧與春秋皆多相應其中經𫝊大異則云夏年多殷益干啓位啓殺之太甲殺伊尹文丁殺季歴自周受命至穆王百年非穆王壽百嵗也幽王既亡有共伯和者攝行天子事非二相共和也按幽王當作厲王共伯國即今之輝縣也其易經二篇與周易上下經同易繇隂陽卦二篇與周易畧同繇辭則異卦下易經一篇似説卦而異公孫段二篇公孫段與邵陟論易國語三篇言楚晉事名三篇似禮記又似爾雅論語師春一篇書左𫝊諸卜筮師春似是造書者姓名也𤨏語十一篇諸國卜夢妖怪相書也梁丘藏一篇先叙魏之世數次言邱藏金玉事繳書二篇論弋射法生封一篇帝王所封大歴二篇鄒子談天類也穆天子𫝊五篇言周穆王游行四海見帝臺西王母圗詩一篇畫贊之屬也又雜書十九篇周食田法周書論楚事周穆王美人盛姬死事大凡七十五篇七篇簡書折壞不識名題冡中又得銅劔一枚長二尺五寸漆書皆科斗字初𤼵冡者燒策照取寳物及官收之多燼簡斷札文既殘缺不復詮次武帝以其書付祕書校綴次第尋考指歸而以今文寫之晳在著作得觀竹書隨疑分釋皆有義證遷尚書郎按束晳𫝊云紀年述魏事至安釐王二十年葢因史記誤以魏恵王後元年為哀王元年也是當從孟子恵王之後即為襄王紀年終襄王二十年也王接𫝊時祕書丞衛恒考正汲冡書未訖而遭難佐著作郎束晳述而成之事多證異義時東萊太守陳留王庭堅難之亦有證據晳又釋難而庭堅已亡散騎侍郎潘滔謂接曰卿才學理議足解二子之紛可試論之接遂詳其得失摯虞謝衡皆博物多聞咸以為允當荀朂𫝊乃得汲郡冡中古文竹書詔朂撰次之以為中經列在祕書荀又嘗叙穆𫝊曰古文穆天子𫝊者太康二年汲縣民不凖盗𤼵古冡所得書也皆竹簡素絲編以臣朂前所考定古尺度其簡長二尺四寸以墨書一簡四十字汲者戰國時魏地也案所得紀年葢魏恵成王子令王之冡也於世本葢襄王也案史記六國年表自令王二十一年至秦始皇三十四年燔書之嵗八十六年及至太康二年初得此書凡五百七十九年按令王當作今王時作書者梁襄王時人書終于襄王未卒之時故曰今王庾開府滕王逌序魯壁魏墳倪注云郭璞穆天子𫝊曰所得紀年葢魏恵成王令王之冢仍以今譌為令又所引穆𫝊序文皆荀朂語倪以為郭氏亦誤劉知幾史通曰竹書紀年出于晉代學者始知后啓殺益太甲誅伊尹文王殺季歴鄭桓公厲王之子則與經典所載乖刺甚多李氏維禎曰群書蕪穢典訓凌遲殺益誅尹猶曰頗刑季歴之弑古今大惡而以之汚衊至聖不憂舌過鼻乎按紀年文丁紂祖父也囚季歴于塞庫季歴困而死故曰文丁殺季歴文丁史記作太丁竹書未出世不知有文丁事故誤以文丁為文王也知幾知紀年出于晉代而猶不知文王為文丁殆得之𫝊聞其實未見竹書也杜預左氏𫝊集解後序曰汲郡汲縣有𤼵舊冡者大得古書周易上下篇與今正同别有隂陽説而無彖象文言繫辭疑是時仲尼造之于魯而未播之于逺國也隋經籍志曰晉太康元年汲郡人𤼵魏襄王冡得古竹簡書字皆科斗𤼵冡者不以為意往往散亂帝命中書監荀朂令和嶠撰次為十五部八十七卷多雜碎怪妄不可訓知惟周易紀年最為分了其周易上下篇與今正同紀年皆用夏正建寅之月為嵗首起自夏殷周三代王事無諸侯國别唯特紀晉國起自殤叔次文侯昭侯以至曲沃莊伯盡晉國滅獨記魏事下至魏哀王謂之今王葢魏國之史記也其著書皆編年相次文意大似春秋經諸所記事多與春秋左氏扶同學者因之以為春秋則古史記之正法有所著述多依春秋之體今依其世代編而叙之以見作者之别謂之古史按竹書紀年魏恵王三十六年改元稱一年是年王與諸侯㑹徐州後十五年乃卒史記魏世家魏襄王元年與諸侯㑹徐州葢誤以恵王後元一年為襄王之元年也因誤以後十五年所卒為襄王而以紀年所稱今王為哀王隋志云哀王謂之今王又因史記而誤魏酈道元注水經河水注引紀年十汾水注引紀年三汲郡古文一澮水注引紀年三古文𤨏語一濟水注引紀年十二涑水注引紀年四洞渦水注引紀年一清水注引紀年一沁水注引紀年四淇水注引紀年四濁漳水注引紀年七滱水注引紀年二巨馬河水注引紀年一洛水注引紀年三伊水注引紀年二丹水注引紀年二汝水注引汲冢古文一紀年一潁水注引紀年一渠水注引紀年七汲郡古文一瓠子河注引紀年一泗水注引紀年三巨洋水注引汲郡古文一汶水注引紀年二粉水注引紀年一淮水注引紀年二青衣水注引紀年一合計所引竹書紀年者七十有六晉書儒林𫝊續咸字孝宗上黨人也𫝊春秋鄭氏易為東安太守著逺游志異物志汲冡古文釋皆十卷行於世戰國策田華之為陳軫説秦恵王曰夫晉獻公欲伐郭而憚舟之僑存荀息曰周書有言美女破舌乃遺之女樂以亂其政又欲伐虞而憚宫之竒存荀息曰周書有言美男破老乃遺之美男敎之惡宮之竒吳師道注曰汲冢周書美男破老美女破舌武之毁也注云所以毁敵也按美男破老美女破舌見汲冢書武稱篇郭古虢字見國䇿高誘注廣川書跋曰祕閣至和舊鼎其銘曰宋公䜌餗鼎少監羅畸摹其欵識以問廣川董某曰宋世家無公諱䜌者豈宋自為諡或以菜地舉耶某曰周初惟二王後稱公而微子啓實封于宋宋非畿内地且不為諡其曰宋公果商嗣也竹書有宋景公䜌而史為頭曼孫炎以䜌為頭曼合聲以辨周秦之語今考班固漢書猶有兜䜌葢亦著其聲如此按此言竹書有宋公䜌見汲冢師春書漢書作兜䜌見古今人表又彛器有䜌女鼎微䜌鼎字皆作䜌史記晉世家注引紀年四宋微子世家注引紀年二衛康叔世家注引紀年一燕世家注引紀年五魯周公世家注引紀年一魏世家注引紀年十五趙世家注引紀年一越世家注引紀年七田完世家注引紀年六韓世家注引紀年五孟嘗君列𫝊注引紀年四唐開元占經引紀年曰帝辛受時周大曀恵成王元年晝晦十六年邯鄲四曀室多壞晉定公二十五年西山女子化為丈夫與之妻能生子今王四年碧陽君之諸御産二龍今本無按吕氏春秋慎勢篇齊簡公有臣曰諸御鞅史記越世家諸御千人伐吳索隐曰諸御謂理事之官在軍有職掌者水經注引竹書紀年曰晉出公六年晉荀瑶城宅陽又梁恵成王元年鄴師邯鄲師于平陽今本無黄伯思東觀餘論云案晉太康二年汲郡民不凖盗𤼵魏襄王冡得古竹書凡七十五篇晉征南將軍杜預云别有一卷純集左氏𫝊卜筮事上下次第及其文義皆與左𫝊同名曰師春師春似是鈔集人名也今觀中祕所蔵師春乃與預説全異預云全集卜筮事而此乃記諸國世次及十二公嵗星所在并律呂諡法等末乃書易象變卦又非専載左氏𫝊卜筮事繇是知此非預所見師春之全也然預記汲冡他書中有易隂陽説而無象繫又有紀年三代并晉魏事疑今師春葢後人雜鈔紀年篇耳然預云紀年起自夏商周而此自唐虞以降皆録之預云紀年皆三代王事無諸國别而此皆有諸國預云紀年特記晉國起殤叔次文侯昭侯而此記晉國世次自唐叔始是三者又與紀年異矣及觀其紀嵗星事有杜征南洞曉隂陽之語繇是知此書亦西晉人集録而未必盡出汲冡也今据梁沈約附注定本紀年起黄帝終魏襄王二十年又晉荀朂曰和嶠云紀年起自黄帝終于魏之今王今王者魏恵成王子是又不起于唐虞也伯思雖見宋祕書所蔵紀年猶未審也漢書地理志注扶風栒邑瓚引汲郡古文晉武公滅荀文公城荀河南開封瓚引汲郡古文梁恵王𤼵逄忌之藪以賜民潁川父城應鄉古國周武王弟所封瓚引汲郡古文殷時已自有應國河東北屈瓚引汲郡古文翟章救鄭至于南屈北海平壽瓚引汲郡古文太康居㘰尋羿亦居之桀亦居之按所引汲郡古文皆紀年文也臣瓚薛姓資治通鑑晉穆帝永和八年稱太原薛瓚即是人也時竹書已出故瓚引紀年以釋史也方氏通雅曰汲冡楚冢今不能分故有𤨏語亂竹書之疑也書史云太康二年汲郡人不凖盗魏襄王墓或言安釐王竹書數十車漆書科斗武帝以付束晳隨疑分釋皆有義證又廣川書跋太公廟碑今在衛州共縣晉太康十年立碑曰太公望者此縣人太康二年縣之西偏有盗𤼵冡而得竹策之書書蔵之年當秦坑儒之前八十六嵗其周志曰文王夢天帝服𤣥禳以立於令狐之津許氏説文無此字惟曰漢令解衣耕謂之襄而衛宏字説與郭昭卿字指則有之知許慎所遺古文衆矣昭卿因宏以有記非得是碑豈知宏之為有據哉晉紀言咸寧五年盗𤼵汲郡冡與此碑太康二年異知史誤也胡元瑞據武帝咸寧五年譏升菴太康安釐之誤直未見廣川書跋與書史耶若淮海題跋言太康元年盗𤼵魏襄冡則少游誤記也不凖姓音彪陳鉅昌原治篇引作卞凖非少游又言齊文恵太子為雍州時盗𤼵楚王冡得竹簡書青絲綸簡廣數分長二尺皮節如新王僧䖍謂是科斗書記周官所闕文則皆倉頡遺法也法書苑則言楚昭王墓在習池北南齊建元中盗𤼵冡得古竹簡沈約得數篇示劉繪曰周禮逸文也智按南齊之雍州即襄陽此二條正是一事按南史王僧䖍𫝊齊文恵太子鎮雍州有盗𤼵古冡者相𫝊云是楚王冡大獲寳物玉履玉屏風竹簡書青絲綸簡廣數分長二尺皮節如新有十餘簡以示僧䖍云是科斗書考工記周禮所闕文也廣川書跋曰亞駝王存乂以亞為烏古文駝作馳周禮其川滹池池故沱也烏池在周為漚夷水起北地東入河顧野王考其地在靈丘竹書紀年穆公十一年取靈今本無陳明卿四書考曰竹書紀年外丙名勝不書陟年仲壬名庸四年陟而外丙遞至仲壬其間又有小庚小甲雍已太戊四君絶與孟子不合今按坊刻沈休文附注舊本誤于外丙元年後係以小庚五年小甲十七年雍巳十二年太戊三十五年作寅車之後即繼之曰二年陟其為外丙之陟年何疑陳氏謂其與孟子絶不相合是亦考之不詳耳余依史遷殷本紀序次甲子元歴校訂之其實絲毫不爽後又見漢魏叢書所刻有汲冢周書竹書紀年一一校訂無訛近刻秘書二十一種者尚仍舊本之誤則亦未校正漢魏叢書故也秦本紀孝公二十四年與晉戰鴈門索隠按紀年云與魏戰岸門今本無穆𫝊天子北征于犬戎注引紀年曰取其五王以東天子賔于西王母注引紀年曰穆王十七年西征毘侖丘爰有碩鳥物羽注引紀年曰行積羽千里乃里西土之數注引紀年曰穆王西征還里天下億有九萬里丁酉天子入于南鄭注引紀年曰穆王元年築祗宫于南鄭留昆歸玉百枚注留昆國見紀年按在穆王十五年天子飲于溫山口考鳥注引紀年曰穆王見西王母西王母止之曰有鳥􅀈人今本無史記孟嘗君列𫝊魏恵王㑹宣王東阿南索隠按紀年云恵王後元十一年㑹平阿十三年㑹齊威王于甄今本無田完世家齊威王三十三年殺其大夫牟辛索隠曰徐廣及年表並作夫人王邵按紀年云齊桓公十年弑其君母宣王八年殺其王后今本無文選吳都賦注引汲郡地中古文册書曰桀築傾宫飾瑶臺紂作瓊室立玉門班叔皮北征賦注引汲郡古文曰晉武公滅荀以賜大夫原氏黯木華海賦注引紀年曰周穆三十七年征伐大起九師東至于九江叱黿鼉以為梁賢良詔注引紀年曰成康之際天下安寧刑措四十年不用陸士衡豪士賦注引紀年曰太甲潛出自桐殺伊尹唐藝文志紀年十四卷汲冡書又古文𤨏語四卷汲冡周書十卷孔晁注周書八卷張南軒著經世紀年二卷自叙曰太史遷作十二國世表始紀甲子起于成周共和庚申之嵗庚申而上則莫紀焉歴世浸逺其事雜見於諸書靡適折𠂻則亦𫝊疑而已本朝嘉祐中康節邵先生雍出於河南窮往知來精極于數作皇極經世書上稽唐堯受命甲辰之元為編年譜如云外丙仲壬之紀康節以數知之乃合於尚書成湯既沒太甲元年之説成湯之後葢實𫝊孫孟子所説特以太丁未立而卒方是時外丙生二年仲壬生四年耳又正武王伐商之年葢武王嗣位十一年矣故書序稱十有一年而復稱十有三年者字之誤也是類皆自史遷以來𫝊習之謬一旦使學者曉然其真萬世不可改者也某不自揆輙因先生之歴考自堯甲辰至皇上乾道改元之嵗凡三千五百二十有二年列為六圗命之曰經世紀年以便觀覽間有鄙見則因而明之其大節目有六如孟子謂堯舜三年之喪畢舜禹避堯舜之子而天下歸之然後踐天子位此乃見帝王奉天命之大㫖其可闇而勿彰故於甲申書服堯之喪乙酉書踐位之實丙戌書元載格于文祖自乙酉至丁巳是踐位三十有三載也則書薦禹於天與尚書命禹之辭合自丁巳至癸酉是薦禹十有七年也與孟子之説合於禹受命之際書法亦然然而書稱舜在位五十載陟方乃死則是史官自堯崩之明年通數之耳夏后相二十有八載寒浞弑相明年少康始生于有仍氏凡四十年而後祀夏配天不失舊物寒浞豈可使間有夏之綂故缺此四十載不書獨書少康出處而紀元載於復國之嵗以見少康四十年經營宗祀絶而復續足以為萬代中興之冠冕此皆節目之大者其他如夏以上稱嵗商稱祀周始稱年皆攷之書可見而周書洪範獨稱祀者是武王不欲臣箕子尚存商歴箕子之志也按竹書堯元年實丙子非甲辰堯在位百年以乙卯陟非甲申舜避堯之子三年喪畢乃踐位舜元年己未非丙戌五十年陟方乃死則庚午也禹避舜之子三年喪畢乃踐位禹元年壬子是也舜薦禹十有七年據竹書則舜即位三十三年春正月夏后受命于神宗是至五十年帝陟十七年也嵗在戊辰非癸酉邵氏測之以數而無所攷据宋儒皆依之而不敢改遂羣致斯謬也陳氏書録解題曰經世紀年廣漢張欽夫用皇極經世譜編其言邵氏以數推知去外丙仲壬之年乃合於尚書成湯既沒太甲元年之説今按孔氏正義謂劉向班固不見古文謬從史記而章衡通載乃云以紀年推之外丙仲壬合於嵗次尚書殘缺而正義之説誤葢三代而上帝王歴年逺而難攷類如此朱子文集曰聞此間有竹書紀年須借讀半年方得爾雅疏引竹書紀年曰北唐之君來見驪馬是生緑耳注引逸周書曰文鶾若彩鷄成王時蜀人獻之邢昺曰云逸周書曰者今所謂汲冡周書也㢲岩李氏曰汲冡周書隋唐經籍藝文志皆稱此書得之晉太康中汲郡魏安釐王冢孔晁注解或稱十卷或八卷大抵不殊按此則晉以前初未有此也然劉向班固所録並著周書七十一篇且謂孔子刪削之餘而司馬遷記武王克殷事葢與此合豈西漢世已得入中秘其後稍隠學者不道及盜𤼵冢乃幸復出耶篇目比漢但闕一耳必班劉司馬所見者也繫之汲冢失其本矣書多駁辭宜孔子所不取抑戰國處士私相綴續託周為名孔子亦未必見章句或脱爛難讀更須考求别加是正云按晉荀朂校定穆天子𫝊云案所得紀年葢魏恵成王子今王之冢也於世本葢襄王也而坊本竹書誤以今王為令王矣又按和嶠曰竹書紀年起自黄帝終于魏之今王今王者魏恵成王之子時襄王未薨故稱今王明年王卒而此書及紀年並殉葬冡中故襄王不得稱諡若安釐王冢去襄王五十三年而卒是葢為襄王之孫安得無襄王二十一年事乎隋唐諸志皆誤王弇州四部稿曰竹書紀年云后桀命扁伐岷山氏岷山氏女于桀二人曰琬曰琰桀愛之斵其名于苕華之玉又云棄其元妃於洛曰妹喜氏以與伊尹交遂以亡夏則妹喜以棄而亡國非以嬖而亡國也按竹書原本無以與伊尹交遂以亡夏二句元美乃率意增之以國語有妹喜與伊尹比而亡夏句也讀者不可不知傅暢晉諸公讚曰荀朂領祕書監太康二年汲郡冢中得竹書朂躬自撰次注寫以為中經列于祕書經𫝊闕文多於證明孫奭孟子疏曰汲冡紀年梁恵成王九年四月甲寅徙都大梁今据竹書是六年漢書髙祖紀臣瓚引汲郡古文魏恵王六年自安邑遷于大梁與今本合焦氏筆乘曰和嶠竹書紀年沈約注稱舜父母憎舜使其塗廪自下焚之舜服鳥工衣服飛去又使浚井自上填之以石舜服龍工衣自旁而出不知何據以此見紀年低一字者皆沈約注也世以為竹書本文大謬顧寜人日知録曰据紀年周慎靚王之二年而魏恵卒其明年為魏襄王之元年又二年燕王噲讓國於其相子之又二年齊人伐燕取之又二年燕人畔而孟子之書先梁後齊其事皆合然孟子在二國皆不久書中齊事特多又嘗為卿于齊當有四五年若適梁在恵王之末而襄王立即行故梁事不多謂孟子以恵王三十五年至梁者誤以恵王後元年為襄王之元年也按紀年顯王三十四年為魏恵之三十六年改元稱一年顯王在位四十八年陟又慎靚王嗣立二年魏恵王薨明年襄王立若孟子以魏恵王三十六年至梁則見梁襄王之時當在梁十五六年何絶無他事可見史記誤以恵王後元年為梁襄王元年也而朱子集𫝊因之胡應麟筆樷曰汲冡四書皆史也紀年春秋也周書尚書也穆天子𫝊起居注也盛姬録逸事家也廣川書跋太公碑引紀年曰康王六年齊太公卒葢壽一百一十餘嵗按紀年西伯得呂尚在商紂三十一年時太公年八十矣後又二十二年而紂亡又六年而武王陟又三十七年而成王陟又康王六年而齊太公卒壽百五十有一春秋後𫝊曰惟王者改元諸侯改元自汾王以前未有也竹書紀晉國起自殤叔次文侯昭侯以至曲沃莊伯皆用夏正建寅之月按竹書帝顓頊十三年初作歴象唐大衍日度議曰顓頊歴上元甲寅辰初合朔立春七曜皆值艮維之首是紀年起黄帝至戰國皆用建寅之月為嵗首非謂晉始改用寅月也王山史撰山志引閻百詩曰史記六國表魏世家皆云恵王在位三十六年始辛亥終丙戌襄王十六年始丁亥終壬寅哀王二十三年始癸卯終乙丑竹書紀年則以襄王十六年上繫於恵成王以為其改元後之年而自癸卯以後紀二十年事謂之今王今王者杜預以為哀王是也是竹書紀年有哀王而無襄王史記有襄王又有哀王世本則又有襄王而無哀王通鑑從竹書紀年而不從史記故以恵王在位凡五十二年始辛亥終壬寅又不從杜預所云之哀王而從世本所有之襄王故以襄王在位為二十三年始癸卯終乙丑今愚以孟子證之史記為近是何也魏世家云恵王三十一年辛巳徙都大梁三十五年乙酉卑禮厚幣以招賢者孟軻等至梁故六國表於三十五年特書曰孟子來三十六年丙戌恵王卒子嗣立是為襄王孟子入而見王出而有不似人君之語必如通鑑五十二年始恵卒而襄立孟子入見豈孟子竟久淹于梁如是耶不然以襄王之庸豈能以禮聘孟子而復至梁耶朱子曰七篇之中無更與襄王言者葢孟子不特不久於梁亦生平未嘗復至梁也史記所以可信也或曰竹書紀年彼既魏史所書魏事必得其真故司馬公從之曰不然恵成王九年四月甲寅徙都大梁不知是年秦孝公始立衛公孫鞅未相魏公子卭未擄地不割秦不偪魏何遽徙都以避之耶即一徙都事如此尚謂其生卒年月盡可信耶又按六國表魏世家皆云子罃生於魏文侯二十五年辛巳三十八年文侯卒武侯立凡十六年而後恵王立是年已三十矣如紀年文侯五十年卒武侯二十六年卒以生辛巳計之恵王元年已五十三立三十六年卒已八十八更以襄王十六年為改元後之年不一百有四嵗乎紀年之不可信如此按竹書考王元年辛丑魏文侯立考王十五年陟子威烈王嗣二十四年陟子安王嗣安王十五年甲午魏文侯卒是文侯在位五十四年史記六國表及魏世家皆云子罃生於魏文侯二十五年辛巳三十八年文侯卒較竹書則文侯在位少十六年也且文侯元年辛丑則二十五年乙丑不得為辛巳也安王十六年乙未魏武侯元年烈王五年庚戌武侯卒在位十四年無二十六年明年辛亥梁恵王立至周顯王三十四年為梁恵王三十六年梁復改元稱一年又十六年為慎靚王之二年梁恵王薨共在位五十一年計生時值祖文侯二十五年則在位時四十三嵗矣又加五十一年共九十四嵗安得一百有四嵗乎若依史記魏世家恵王之後有哀王竹書今王即哀王何孟子見梁恵王之後即云見梁襄王無所謂哀王乎晉和嶠謂竹書今王者梁恵王子是也時紀年終襄王二十年襄王猶未薨無諡可紀故曰今王後世臣下稱上曰今上亦猶是也此竹書所可信者與孟子合與世本亦合亦可見孟子至梁當在恵王改元之十四五年其在梁無幾見襄王之後即去之齊司馬溫公作通鑑乃宗是説有以也山志引杜預説哀王為今王是亦仍史記年表之誤而轉以宜信者為不可信也至以梁恵王九年徙都大梁為不可信謂是時地不割秦不偪何遽徙都以避之今据竹書周顯王四年為梁恵王之六年夏四月甲寅徙都于大梁王𤼵逢忌之藪以賜民漢志陳留浚儀故大梁魏絳自魏徙安邑至恵王自安邑徙大梁臣瓚漢書注曰浚儀有逢陂忌澤此豈盡不可信者耶至誤六年為九年則但依孫奭孟子疏語而未見竹書故也竹書綂箋卷首上
