body:
  text: 竹書統箋卷十一翰林院檢討徐文靖撰匡王名班箋按周本紀頃王六年崩子匡王班立元年己酉箋按春秋魯文公十五年也六年晉靈公為趙穿所殺箋按左傳宣二年秋九月乙丑趙穿攻靈公于桃園宣子未出山而復太史書曰趙盾弑其君以示于朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰杜注穿趙盾之從父昆弟子乙丑九月二十七日趙盾使穿迎公子黑臋于周立之箋按僖公二十三年傳狄人伐廧咎如獲其二女叔隗季隗納諸公子公子取季隗以叔隗妻趙衰生盾杜注盾趙宣子又宣公二年傳宣子使趙穿迎公子黑臋于周而立之林氏曰黑臋晉文公子晉世家云迎㐮公弟黑臋于周也王陟箋按春秋宣二年冬十月乙亥天王崩舊本竹書以趙穿弑靈公係王陟之下今依春秋傳冬不當在秋前也故改正之定王名瑜箋按周本紀匡王六年崩弟瑜立是為定王元年己夘晉成公元年乙箋按已當作六年晉成公與狄伐秦獲秦諜殺之綘市六日而蘇箋按左傳宣八年春白狄及晉平夏㑹晉伐秦晉人獲秦諜殺諸綘市六日而蘇晉世家成公六年伐秦擄秦將赤索隐曰赤即斥謂斥堠之人宣八年傳晉伐秦獲秦諜殺諸綘市葢彼諜即此赤也晉成公六年與魯宣八年正同故知然也七年晉成公卒于扈箋按春秋宣九年秋九月晉侯宋公衛侯鄭伯曹伯㑹于扈辛酉晉侯黑臋卒于扈傳曰㑹于扈討不睦也陳侯不㑹晋荀林父以諸侯之師伐陳晉侯卒于扈乃還林注扈鄭地按郡國志卷縣有扈成亭八年壬戌晉景公元年箋按晉世家成公七年卒子景公據立十八年齊國佐来獻玉磬紀公之甗箋按左傳成公二年春齊侯伐我北鄙圍龍衛侯使孫良夫石稷寗相向禽將侵齊與齊師遇齊師乃止次于鞠居新築人仲叔于奚救孫桓子桓子是以免遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子晉侯許之七百乗請八百乗師從齊師于莘六月壬申師至于靡笄之下齊侯使請戰癸酉師陳于鞌邴夏御齊侯逢丑父為右晉解張御郤克鄭邱緩為右齊師敗績逐之三周華不注晉師從齊師入自丘輿擊馬陘齊侯使賔媚人賂以紀甗玉磬與地不可則聼客之所為賔媚人致賂晉人不可必以蕭同叔子為質而使齊之封内盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命于諸侯而曰必質其母以為信其若王命何且是以不孝令也晉人許之秋七月晉師及齊國佐盟于袁婁杜注媚人國佐也甗玉甑皆滅紀所得按廣川書䟦有方甗銘言古者謂鼎上下大小若䰝曰鬵亦鬻器類甗古文作鬳今仲信父之銘則作甗紀有甗齊晉以為重器然其用不過行于饗食今舉國為重號于天下則紀侯之甗必其尤異者也二十一年王陟箋按是年乙亥春秋成公五年十一月己酉天王崩簡王名夷箋按周本紀定王二十一年崩子簡王夷立元年丙子箋按是年夏四月丁丑晉遷于新田五年晉景公卒箋按晉世家景公十二年冬齊頃公如晉欲上尊晉景公為王景公譲不敢晉始作六卿十九年夏景公病立其太子夀曼為君是為厲公按景公名據春秋作儒厲公夀曼左傳作州蒲六年辛巳晉厲公元年箋按左傳魯成公十年晉侯有疾立太子州蒲以為君而㑹諸侯伐鄭十一年秦晉為成將㑹于令狐秦伯不肯渉河使史顆盟晉侯于河東晉郤犨盟秦伯于河西秦伯歸而背晉成十三年夏四月戊午晉侯使吕相絶秦秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉五月丁亥晉師以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差及不更女父師遂濟涇及侯麗而還十五年晉三郤害伯宗及欒弗忌伯州犁奔楚十六年夏四月晉侯將伐鄭鄭人聞有晉師使告于楚楚子救鄭五月晉師濟河六月晉楚遇于鄢陵及戰射共王中目王曰天敗楚也夫余不可以待乃宵遁十七年厲公反自鄢陵欲盡去羣大夫而立其左右壬午胥童夷羊五帥甲八百將攻郤氏長魚矯以戈殺駒伯苦成叔于其位温季趋矯及諸其車以戈殺之胥童以甲劫欒書中行偃于朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也皆再拜稽首曰君討有罪而免臣于死君之惠也乃皆歸十三年晉厲公卒箋按左傳成十七年厲公遊于匠麗氏欒書中行偃遂執公焉十八年春王正月庚午晉欒書中行偃使程滑弑厲公𦵏之于翼東門之外以車一乗晉世家厲公死十日公子周立是為悼公楚共王㑹宋平公于湖陽箋按楚世家莊王卒子共王審立宋世家平公三年楚共王㧞宋之彭城以封宋左師魚石四年諸侯共誅魚石而歸彭城于宋水經注泚水出泚陽東北太湖山又西至新野縣南其水西南流逕湖陽縣故城南竹書楚共王㑹宋平公於湖陽者矣十四年己丑晉悼公元年箋按悼公名周其大父㨗晉㐮公少子也號為桓叔子惠伯談生悼公周周語曰既殺厲公欒武子使如周迎悼公庚午大夫逆于清原乃盟而入辛巳朝于武宫二月乙酉公即位三年公始合諸侯四年諸侯㑹于雞丘五年諸戎来請服使魏莊子盟之於是乎始復伯王陟箋按春秋襄公元年九月辛酉天王崩杜氏曰辛酉九月十五日靈王名泄心箋按周本紀簡王崩子靈王泄心立又靈王生而有初定王六年秦人降妖曰周其有王亦能克脩其職諸侯服享故靈王亦稱王元年庚寅箋按通鑑綱目靈王元年冬吳夀夢来朝据吳越春秋夀夢元年朝周適楚觀諸侯禮樂魯成公㑹于鍾離深問周公禮樂成公悉為陳前王之禮樂因為詠歌三代之風夀夢因嘆而去曰嗚呼哉禮也左傳成公十五年冬十一月㑹吳于鍾離則夀夢来朝而問周公之禮樂正成公時也成公五年定王崩六年為簡王元年則㑹吳鍾離在簡王十年若靈王元年魯㐮公二年非成公也漢書郊祀志周靈王即位時諸侯莫朝周萇宏廼明鬼神事設射不来不来者諸侯之不来者也依物怪欲以致諸侯諸侯不從而周室愈㣲故知靈王元年無吴夀夢来朝之事也十四年晉悼公卒箋按春秋襄公十五年冬十有一月癸亥晉侯周卒晉世家悼公十五年卒子平公彪立十五年甲辰晉平公元年箋按左傳㐮公十六年春𦵏晉悼公平公即位羊舌肹為傅張君臣為中軍司馬祁奚韓㐮欒盈士鞅為公族大夫虞丘書為乗馬御改服修官烝于曲沃警守而下㑹于溴梁命歸侵田以伐魯故執邾宣公莒犁比公林注十二年十四年莒人侵魯前年邾人伐魯晉將為魯討之悼公卒不克㑹故平公終其事又按史記年表亦以是年為甲辰靈王二十一年魯㐮公二十二年孔子生嵗在己酉据竹書則己酉是靈王二十年魯㐮二十一年也公羊傳㐮公二十一年十月庚辰朔十有一月庚子孔子生何休註曰時嵗在乙夘又曰何氏自有長厯不得以左氏難之然据竹書則魯㐮公二十一年嵗在己酉何云乙卯當從竹書及年表孔子生己酉歳自文王既没至此共五百一十二年二十七年王陟箋按春秋㐮公二十八年十有二月甲寅天王崩林堯叟曰實十一月癸巳崩而以十二月甲寅告此緩告非有事宜直臣子怠慢皇覧曰周靈王葬于河南城西周山上景王名䝿箋按周本紀靈王崩子景王貴立韋昭曰太子晉之弟也元年丁巳十三年春有星出婺女箋按星傳婺女四星十一度在牽牛東北距西南星去極一百四度半漢書李尋傳臣聞五行以水為本元武婺女天地所紀終始所生孟康曰婺女須女也張揖廣雅曰須女謂之婺女荆州占曰彗星犯婺女其邦兵起左傳昭十年春王正月有星出于婺女鄭禆竈言于子産曰七月戊子晉君將死今兹嵗在顓頊之虚姜氏任氏實守其地居其維首而有妖星焉告邑姜也邑姜晉之妣也天以七紀戊子逢公以登星斯于是乎出吾是以譏之杜注客星出非其地故曰妖星也唐志嵗星差合術曰昭公八年十一月楚滅陳史趙曰未也陳顓頊之虚也嵗在鶉火是以卒滅今在析木之津猶將復由開元書在箕八度析木津也十年春進及婺女初在元枵之維首傳曰有星孛于婺女是也十月晉平公卒箋按十月誤春秋昭公十年秋七月戊子晉侯彪卒即用夏正亦當為九月非十月十四年庚午晉昭公元年箋按晉世家平公二十六年卒子昭公夷立河水赤於龍門三里箋按水經注河水南出龍門口汾水從東來注之魏土地記曰梁山北有龍門山大禹所鑿通孟津河口廣八十歩竹書紀年晉昭公元年河水赤于龍門三里郡縣志龍門山在同州韓城縣北五十里京房曰君湎于酒淫于色賢人潜國家危厥異流水赤又曰河水赤者邑有寃十九年晉昭公卒箋按春秋昭公十八年秋八月己亥晉侯夷卒冬十二月桃杏花箋按五行志僖公三十三年十二月李梅實劉向以為李梅當剥落今反華實近草妖也二十年晉頃公元年箋按晉世家昭公六年卒子頃公去疾立二十五年晉頃公平王室亂立敬王箋按春秋魯昭公二十二年夏四月乙丑天王崩六月叔鞅如京師葬景王王室亂周本紀景王十八年后太子聖而早卒二十年景王愛子朝欲立之㑹崩子丐之黨與争立國人立長子猛為王子朝攻殺猛猛為悼王晉人攻子朝而立丐是為敬王景王立二十三年崩自是而王室亂踰二年而立敬王故竹書總記為二十五年耳而史記云二十年誤也敬王名丐箋按丐一作匄春秋昭二十三年天王居于狄泉尹氏立王子朝林堯叟曰居于狄泉言未得京師也于是王猛卒敬王即位即王猛之母弟也居于狄泉謂之東王子朝入于王城謂之西王書曰天王居于狄泉出子朝也元年壬午箋按周本紀敬王元年晉人入敬王子朝自立敬王不得入居澤四年晉率諸侯入敬王于周子朝為臣諸侯城周十六年子朝之徒復作亂敬王犇于晉晉定公遂入敬王于周賈逵曰澤即翟泉地理通釋曰翟泉地在成周東北晉率諸侯之徒修繕其城以成周城小不受王都故壊翟泉以廣焉八年晉頃公卒箋按春秋昭公三十年夏六月庚辰晉侯去疾卒秋八月葬晉頃公晉世家頃公卒子定公午立九年庚寅晉定公元年箋按晉定公元年魏舒為政定三年舒卒范鞅為政定十四年晉逐范中行氏趙鞅歸于晉自是晉知氏韓氏趙氏魏氏並强分晉之勢成矣十四年漢不見于天箋按晉天文志曰天漢起東方尾箕之間謂之漢津乃分為二道其南經𫝊說魚天籥天弁河鼓其北經龜貫箕下次絡南斗魁左旗至天津下而合南道乃西南行又分夹匏𤓰絡人星杵造父騰蛇王良附路閣道北端大陵天船卷舌而南行絡五車經北河之南入東井水位而東南行絡南河闕丘天狗天紀在七星南而没詩倬彼雲漢昭囘于天葢謂此也敬王十四年漢乃不見于天所以紀異也二十六年晉青虹見箋按蔡邕月令曰虹見有青赤之色此有青無赤故曰青虹元命包曰世惑臣謀虹舒照二十八年洛絶于周箋按水經注周書稱周公將致政乃作大邑成周于土中南係于洛水北因于郏山竹書晉定公二十年洛絶于周三十六年淇絶于舊衛箋按水經注淇水出隆慮縣大號山又東逕逢都壘南世謂之淇陽城又東分為二水左為菀水右則淇水自元甫城東南逕朝歌城北竹書晉定公二十八年淇絶于舊衛三十九年晉城頓丘箋按水經注曰闞駰云頓丘在淇水南又屈逕頓丘西詩所謂送子渉淇至于頓丘竹書紀年晉定公三十一年城頓丘史記正義曰頓丘故城在衛州頓丘縣東北三十里輿地廣記頓丘本衛邑漢屬東郡四十三年宋殺其大夫皇瑗于丹水之上箋按哀十七年傳宋皇瑗之子麇有友曰田丙而奪其兄酁般邑以與之公執之皇瑗奔晉召之十八年春宋殺皇瑗公聞其情復皇氏之族使皇緩為右師丹水壅不流箋按水經注獲水出汳水于梁郡䝉縣北十三州志曰首受菑獲渠亦兼丹水之稱也竹書宋殺其大夫皇瑗于丹水之上又曰丹水三日絶不流葢汳水之變名也地鏡曰河大壅下臣執政或主大水又曰流水忽停天下飢四十四年王陟箋按左傳哀十九年冬叔青如京師敬王崩故也史記年表敬王四十三年崩則少一年徐廣曰嵗在甲子從史記也据竹書則在乙丑元王箋按周本紀敬王崩子元王仁立世本云元王名赤元年丙寅箋按太史公十二諸侯王年表始于周元王晉定公卒箋按晉世家定公在位三十三年卒子出公鑿立韋昭洞記曰周元王二年彗星見其年魯哀公卒三年晉出公元年据温公稽古錄補四年於越滅吳箋按地理通釋曰越見春秋凡六其三稱越皆在昭公之時其三稱於越二在定公一在哀公之時㑹稽記曰少康其少子號曰於越越國之稱始此吴太伯世家吳王夫差十八年勾踐率兵使伐吴敗吴師于笠澤二十年越復伐吴二十一年遂圍吳二十三年十一月丁卯越敗吴欲遷吴王于甬東予百家居之吴王曰孤老矣不能事君王也乃自刎死越王滅吳誅太宰嚭以為不忠而歸据左傳魯哀公十七年越伐吳吴禦之笠澤勾踐十九年也二十年越圍吳乃勾踐二十二年也二十二年越滅吳乃勾踐二十四年首尾葢三年矣國語曰居軍三年吳師自潰越世家亦曰留圍之三年吳師敗與左傳及太伯世家合吳越春秋曰勾踐二十一年七月越王復悉國中士卒伐吳遂圍吴守一年吴師累敗遂棲吴王於姑胥之山校左傳則事在勾踐十九年非二十一年且圍守三年非一年也俱誤又按建康志云越城在江寧縣尉廨後遺址猶存人呼為越臺宫苑記云周元王四年越相范蠡所築葢即是年也六年澮絶于梁箋按水經注澮水出河東絳縣東髙山又西南逕虒祁宫南其宫地背汾面澮西則兩川之交會也竹書晉出公五年澮絶于梁即此水也一統志虒亭在潞安府㐮垣縣西北五十里春秋昭公八年叔弓如晉注曰賀虒祁也虒祁宮名顔師古曰虒音斯今為虒亭鎮也丹水三日絶不流箋按地理志上黨髙都縣莞谷丹水所出東南入泫水水經注丹水東南流入丹谷又東南逕鄈城西又西逕苑鄉城北屈逕其城南流注于沁謂之丹口竹書晉出公五年丹水三日絶不流即此水也一統志丹水在澤州城東北三十里舊號泫水源出髙平縣西北仙公山南流合白水入沁河七年齊人鄭人伐衛箋按衛世家莊公出奔衛人立公子般師為衛君齊伐衛虜班師更立公子起為衛君左傳注班師㐮公孫服䖍曰起靈公子又按齊人鄭人時為鄭聲公齊平公也王陟箋按六國表起自元王皆云元王八年崩今据竹書是七年崩也貞定王箋按世夲貞王介崩子元王赤立周本紀元王崩子定王介立索隱曰如史記則元王是定王父依世本則元王是貞王子必有一乖誤皇甫謐見此疑而不决遂彌縫史記世本之錯謬因謂貞定王今据竹書已作貞定王乃元王子則世本與索隐並謬也元年癸酉於越徙都瑯琊箋按吴春秋越王勾踐二十五年徙都瑯琊立觀臺以望東海遂號令秦晉齊楚以尊輔周室挿血盟即勾踐起臺䖏括地志宻州諸城縣東南百七十里有瑯琊臺越王勾踐觀臺也瑯琊山在縣東南百四十里四年十一月於越子勾踐卒是為菼執次鹿郢立箋按禮坊記曰春秋不稱楚越之王䘮陳澔曰書卒不書𦵏夷之也史記索隐曰越在蠻夷少康之後地逺國小春秋之初未通上國史記㣲畧無世系故紀年稱為於越子又按越世家勾踐卒子王鼫與立樂資春秋後傳曰越語謂鹿郢為鼫與也六年晉河絶于扈箋按郡國志管縣有扈成亭水經注河水又東北逕卷之扈亭北左傳文公七年晉趙盾與諸侯盟于扈竹書晉出公二十二年河絶于扈即于是也又書傳多稱禹功告成之嵗下逮周定王五年己未當魯宣公之七年而河遂東徙凡一千六百六十餘嵗据竹書則定王五年為丁丑六年為戊寅河徙河絶皆在定王之世當魯哀公之時云宣公誤也七年晉荀瑶城南梁附注曰一本出公三十年箋按南誤當作髙郡國志平陽楊縣有髙梁亭水經注汾水西南逕髙梁邑西故高梁之墟也竹書晉出公三十年知伯瑶城髙梁今竹書是貞定王七年則是晉出公十三年也當是十三而訛為三十又按左傳哀二十七年晉荀瑶帥師伐鄭次于桐丘悼四年晉荀瑶帥師圍鄭韋昭曰智宣子晉卿荀躒之子申也瑶宣子之子智伯也諡曰㐮子郡國志河東解縣注引博物記曰有智邑括地志故智城在蒲州虞鄉縣西北四十里十年於越子鹿郢卒子不夀立箋按鹿郢立六年卒据吳越春秋勾踐子興夷孫不夀是鹿郢即興夷也十一年晉出公出奔齊箋按元王二年晉定公卒出公立則貞定王十一年正出公十七年也晉世家出公十七年智伯與趙韓魏共分范中行氏以為邑出公怒告齊魯欲以伐四卿四卿恐遂反攻出公出公奔齊一本作出公二十年非十二年河水赤三日箋按京氏别對災異曰河水赤者獄有寃恨誅殺不當則致河水赤也洪範五行傳曰赤者火色也水盡赤以火沴水也又張華博物志曰江河水赤名曰泣血荀瑶伐中山取窮魚之丘箋按左傳定四年荀寅曰中山不服中山名始見此史記索隐曰中山故鮮虞國姬姓也隋圖經曰中山城在今唐昌縣東北三十一里水經注淶水東逕廣昌縣故城南又東北逕西射魚城東南而東北流又逕東射魚城南竹書荀瑶伐中山取窮魚之丘窮射字相類疑即此城也十三年晉韓龎取秦武城箋按地理志武城縣屬左馮翊春秋文公八年秦人伐晉取武城豈秦先取之晉晉又復取之秦耶又按水經注洛水逕盧氏縣故城南竹書晉出公十九年晉韓龎取龍氏城有盧氏川水注之朱謀㙔箋云今竹書云晉韓龎取盧氏城則酈注龍氏乃盧氏之譌而此本作武城者誤也秦葢秦厲公也十六年晉出公二十二年箋按史記六國年表三晉滅知伯在周定王十六年上距獲麟二十七年皇甫謐曰元王十一年癸未三晉滅知伯据竹書則元王七年陟不得十一年也又按晉世家晉哀公四年趙㐮子韓康子魏桓子共殺知伯盡并其地索隐曰如紀年之說此乃出公二十二年事又按秦本紀厲共公二十四年晉亂殺知伯分其國與韓趙魏二十五年知開與邑人来奔正義曰開知伯子與從屬来奔秦晉世家及秦本紀互相矛盾皆誤十七年晉出公薨乃立昭公之孫是為敬公箋按晉世家出公奔齊道死知伯乃立昭公曾孫驕為晉君是為哀公趙世家知伯乃立昭公曾孫驕是為懿公年表出公十八年次哀公忌二年次懿公驕十七年皆自相矛盾今据竹書出公十七年奔齊又六年薨晉不應曠年無君年表晉世家皆有哀公忌是也此當是知伯所立定王十六年韓趙魏殺知伯于鑿臺之下明年立敬公則非知伯之所立明矣十八年己丑晉敬公元年箋按晉世家哀公大父雍晉昭公少子也號戴子生忌忌早死乃立忌子驕為君則世家懿公葢即紀年之敬公也二十年於越子不壽見殺是為盲姑次朱勾立箋按越世家王不夀卒子王翁立是朱勾即王翁也吴越春秋不夀之後為不揚是不揚又即朱勾也朱勾水經注作末勾誤二十二年楚滅蔡箋按蔡世家蔡侯齊四年楚惠王滅蔡蔡遂絶祀二十四年楚滅杞箋按杞世家杞簡公春出公子也在位一年楚惠王四十四年滅杞班固曰簡公為楚所滅弟他奔魯魯悼公給以采地為侯二十八年晉敬公十一年王陟箋按春秋成公五年冬十一月己酉定王崩考王箋按周本紀定王崩長子去疾立是為哀王哀王立三月弟叔㐮殺哀王而自立是為思王思王立五月少弟嵬攻殺思王而自立是為考王時考王封其弟于河南是為桓公以續周公之官職世本西周桓公名揭居河南東周惠公名班居洛陽葢平王東遷以豐鎬為西周洛邑為東周至考王之後更以河南為西周顯王二年西周惠公封其少子班于鞏號為東周於是有東西二周呂氏曰東西周各為列國不復相闗自是而後稱東西周者皆謂二周君也元年庚子晉敬公十二年魏文侯立箋按魏世家魏獻子生魏侈侈之孫曰魏桓子桓子之孫曰文侯都魏文侯元年秦靈公之元年也與韓武子趙桓子周威王同時國䇿吳師道注魏文侯名勘元年威烈王二年丁巳今据竹書魏文侯初立在考王元年庚子是在威烈王之前十五年也又按漢髙帝紀注臣瓉曰畢萬居魏昭子徙安邑文侯亦居之是文侯不都魏也呂氏春秋魏文侯勝齊天子賞文侯以上聞水經注鄴本齊桓公所置後屬晋魏文侯七年始封此地故曰魏漢髙帝十二年置魏郡治鄴縣以此也十年楚滅莒箋按世本莒己姓括地志宻州莒縣故國也楚世家簡王元年北伐滅莒十一年晉敬公卒箋按己丑元辛亥卒在位二十三年十二年晉幽公栁元年箋按通鑑謂考王元年庚子晉幽公立止有絳曲沃二邑餘皆入于韓趙魏今据竹書幽公之立在考王十二年壬子非考王元年也魯悼公卒箋接魯世家魯哀公二十七年三桓攻公公奔于衛去如鄒遂如越國人迎哀公復歸卒于有山氏子寧立是為悼公三十七年悼公卒十四年魯季孫㑹晉幽公于楚丘箋按僖二年城楚丘杜注楚丘衛邑不言城衛衛未遷程畏齋曰楚丘魯地子貢詩傳曰僖公城楚丘以備戎史克頌之賦楚宫知楚丘非漕地矣僖二年城楚丘魯自城之也與書城中丘城郎城小穀之云同又水經濮水逕葭宻縣故城北注曰竹書考王十四年魯季孫㑹晉幽公于楚丘即葭宻遂城之時魯元公三年也地理志濟陽葭宻縣一統志葭宻城在曹州曺縣西北三十里是也又有楚丘城在歸徳府城北四十里古戎州巳氏之邑春秋隠七年戎伐凡伯于楚丘即是戎也而范寗注穀梁曰戎者衛也戎衛者謂其伐天子之使貶而戎之也楚丘衛之邑也此大繆矣十五年王陟威烈王箋按周本紀考王崩子威烈王午立元年丙辰三年晉大旱地生鹽箋按水經注畦水耗竭土自成鹽亦是類也五年晉丹水出反潔箋按水經注引竹書曰晉幽公九年丹水出相反擊則㓗是擊之譌也又按地理志上黨髙都縣有莞谷丹水出此是晉丹水也上洛冡領山亦有丹水故以晉丹水别之六年晉大夫秦嬴賊幽公于髙寢之上箋按大夫當作夫人秦嬴秦女為晉夫人者晉世家幽公十八年幽公淫婦人夜竊出盗殺幽公索隱曰紀年云夫人秦嬴賊公于髙寢之上是今本大夫誤也又按春秋定公十五年公薨于髙寢榖梁傳曰髙寢非正也說苑曰春秋壬申公薨于髙寢傳曰髙寢者何正寢也諸侯正寢二一曰髙寢始封君之寢也二曰路寢繼體君之寢也其二何子不居父之寢故二寢繼體君世世不可居髙祖之寢故有髙寢名曰髙也又按周禮宫人掌王之六寢之修鄭注六寢者路寢一小寢五路寢以視事小寢以時燕息焉春秋書莊公薨于路寢僖公薨于小寢則諸侯不止于二寢矣魏文侯立幽公子止箋按晉世家魏文侯以誅晉亂立幽公子止是為烈公索隐曰系本幽公生烈成公止年表云魏誅幽公立其弟止是史表誤也七年壬戌晉烈公元年趙獻子城泫氏箋按温公通鑑曰趙㐮子封伯魯之子于代曰代成君早卒立其子浣為趙氏後㐮子卒弟桓子逐浣而自立一年卒趙氏之人曰桓子立非㐮主意乃共殺其子復迎浣而立之是為獻子地理志上黨泫氏縣應劭曰山海經泫水所出者也韓武子都平陽箋按地理志河東平陽縣韓武子元孫貞子居此世本作景子徙此又按韓世家韓之先曰韓武子得封韓原後三世有韓厥是為韓獻子其子宣子名起徙居州子貞子名頃徙居平陽又四傳至武子名啟章仍都平陽是韓之先後有兩武子讀漢志者易以滋疑也八年趙城平邑箋按地理志平邑屬代郡趙世家趙獻侯十三年城平邑後漢書注曰代郡有平邑今魏郡昌樂縣東北又有平邑城九年楚人伐我南鄙至于上洛箋按此云楚人楚簡王時也戰國策楚魏戰于陘山魏許秦以上洛以絶秦與楚地理志上洛縣屬𢎞農郡水經注晉分為郡地道記曰郡在洛上故以為名十一年田公子居思伐邯鄲圍平邑箋按風俗通曰陳完字敬仲陳厲公之子也厲公為蔡所滅殺國内亂完奔于齊始食田采姓田氏焉田居思疑即是齊䇿田臣思也水經注河水故瀆逕昌樂縣故城又東北逕平邑郭西竹書晉烈公四年趙城平邑五年田公子居思伐趙鄙圍平邑者也按是時齊為宣公十二年於越子朱勾伐郯以郯子鴣歸箋按左傳昭公十四年郯子来朝郯子曰吾髙祖少昊摯之立也杜注少昊金天氏黄帝之子巳姓之祖也索隐按紀年於粤子朱勾三十四年滅滕三十五年滅郯地理志東海郯縣故國十四年於越子朱勾卒子翳立箋按索隐曰紀年云朱勾三十七年卒又按淮南子曰越王翳逃山穴越人薰而出之遂不得已据莊子此乃越王無顓之事非翳也十六年齊田肹及邯鄲韓舉戰于平邑邯鄲之師敗逋遂獲韓舉取平邑新城箋按齊䇿聁子謂齊王注曰聁子田聁也威王臣葢即此田聁矣括地志平邑故城在魏州昌樂縣東北四十里後魏地形志髙陽郡有新城縣二漢晉曰北新城前漢屬中山後漢屬涿當即此新城也又漢地理志代郡平邑秦本紀莊㐮王三年䝉驁攻趙榆次新城括地志新城亦名小平城在朔州鄯陽縣西南四十里驁所攻也十七年魏文侯伐秦至鄭還築汾隂郃陽箋按括地志汾隂故城在蒲州汾隂縣北九里此汾隂誤汾當作洛魏世家魏文侯十七年西攻秦至鄭而還築雒隂郃陽正義曰雒漆沮水也城在水南郃陽郃水之北括地志雒隂在同州西郃陽故城在同州河西縣南地理志京兆鄭縣鄭桓公邑魏文侯伐秦至鄭而還即此按是時為秦簡公田悼子卒箋按田完世家田莊子卒子太公和立索隐按紀年齊宣公十五年田莊子卒明年立田悼子悼子卒乃次立田和是莊子後有悼子而世家不録據莊子及鬼谷子並云田成子殺齊君十二代而有齊國世家自成子至王建之滅秪十代若如紀年則悼子及侯剡即有十二代與莊子鬼谷說同明紀年非妄也紀年齊康公二十二年田侯剡立與悼子合數為十二也田布殺其大夫公孫孫公孫孫以廪丘叛于趙箋按水經注瓠河之北即廩丘縣也王隠晉書地道記曰廩丘者春秋之所謂齊邑矣實表東海者也竹書晉烈公十一年田悼子卒田布殺其大夫公孫公孫以廪丘叛于趙朱謀㙔曰今竹書作田布殺其大夫公孫孫公孫孫以廪丘叛于趙是皆誤也既云公孫孫見殺又何從復以廪丘叛于趙乎今据齊世家齊宣公五十一年田㑹反廪丘索隠引紀年宣公五十一年公孫㑹以廩丘叛于趙則下公孫孫乃公孫㑹之譌地理志東郡有廩丘縣田布圍廪丘翟角趙孔屑韓氏救廪丘及田布戰于龍澤田師敗逋箋按趙世家趙敬侯三年救魏于廩丘大敗齊人即是事也又按水經注河水東逕鐵丘南河之西岸有竿城郡國志曰衛縣有竿城者也河南有龍淵宫元光中河决濮陽武帝起宫于决河之旁龍淵之側故曰龍淵宮据此則龍澤葢即爲龍淵矣又按地里志廩丘濮陽並屬東郡十八年王命韓景子趙烈子及我師伐齊入長垣箋按王威烈王也外紀云威王十六年王命韓趙伐齊入長城据竹書則威王十八年也又按韓景子名䖍武子之子趙烈子名籍獻子之子敬侯之父也依此則上年救廪丘者乃趙烈侯世家云敬侯誤也長垣即長城蘇氏曰齊有長城巨防呂氏春秋曰魏文侯東勝齊於長城天子賞文侯以上聞葢即是年也又按通鑑綱目曰王命晉韓啟章趙浣伐齊入長垣不審啟章乃韓景子父浣乃趙烈子父以竹書較之葢皆誤也又按伐齊在齊康公之二年二十三年王命晉卿魏氏趙氏韓氏為諸侯箋按周本紀威烈王二十三年九鼎震命韓趙魏為諸侯葢春秋之季晉有范氏中行氏知氏是為六卿後三家為韓魏趙所滅三分晉地而有之至是魏斯趙籍韓䖍始請命于天子為諸侯司馬温公作資治通鑑始于是年胡三省曰上距春秋獲麟七十八年距左傳趙㐮惎知伯事七十一年二十四年王陟安王箋按周本紀威烈王崩子安王驕立古今人表云元安王駹元年庚辰九年晉烈公卒子桓公立附注曰韓非子作桓侯箋按晉世家烈公卒子孝公頎立世本云孝公傾欣綱目作孝公傾今紀年作桓公是與韓非子同也十年己丑晉桓公頃元年箋按漢紀髙祖曰命乃在天雖扁鵲何益李竒曰名越人魏桓侯時醫也臣瓉曰魏無桓侯師古曰瓉說是也今据竹書及韓子李竒諸說瓉云無桓侯非也十五年魏文侯卒附注在位五十年箋按考王元年庚子魏文侯初立安王十五年甲午文侯卒實在位五十五年晉世家文侯三十八年卒附注云在位五十年皆未詳也大風晝昏箋按荆州占曰凡霧氣四方俱起百歩不見人曰昏開元占經曰天色晦暝雲氣昏濁風聲寒慘是謂災風又曰魏惠成王元年晝晦十六年邯鄲四曀室多壊民多死然竹書在武侯元年之前一年安王十五年也晉太子喜出奔箋按晉太子喜當是晉桓公子也而世家年表不載十六年乙未魏武侯擊元年箋按韓詩外傳曰魏文侯有子曰擊次曰訴訴少而立之以為嗣封撃於中山三年莫往來其傅趙倉唐諫曰何不遣使乎則臣請使擊曰諾於是遂求北犬晨雁齎行倉唐至曰北藩中山之君再拜獻之文侯曰嘻撃知吾好北犬嗜晨雁也即見使者文侯曰中山之君亦何好乎對曰好詩文侯曰於詩何好對曰好晨風文侯曰晨風謂何對曰詩云鷸彼晨風鬰彼北林未見君子憂心欽欽如何如何忘我實多此自以忘我者也於是文侯大悦曰中山君不賢烏能得賢傅遂廢太子訴召中山君以為嗣劉向説􅁐曰文侯遣倉唐賜太子衣一襲令鷄鳴時至太子迎拜賜𤼵篋衣盡顛倒太子曰欲召撃也詩曰東方未明顛倒衣裳顛之倒之自公召之封公子緩箋按魏世家云公中緩中音仲二十一年韓滅鄭哀侯入于鄭箋按韓世家韓哀侯二年滅鄭曰徙都鄭索隠曰紀年魏武侯二十一年韓滅鄭哀侯入于鄭二十二年晉桓公邑哀侯于鄭今据竹書韓滅鄭在周安王二十一年魏武侯六年又按鄭世家鄭君乙二十一年韓哀侯滅鄭葢索隠誤記為魏武侯之二十一年也其云魏武侯二十二年晉桓公邑哀侯于鄭亦誤也二十三年於越遷于吴箋按索隐据紀年云越王翳三十三年遷于吴今考是三十二年二十六年王陟魏城洛陽及安邑王垣箋按洛陽疑當作汾陽地理志河南洛陽是為成周春秋昭二十一年晉合諸侯大成周之城以居敬王此豈待魏武侯始城者太原有汾陽當是其所城耳又河東有安邑縣魏絳自魏徙此有垣縣徐廣曰垣縣有王屋山故曰王垣魏世家武侯三年城安邑王垣括地志王垣在綘州垣縣西北二十里七月於越太子諸咎弑其君翳箋按索隐曰紀年云翳三十六年七月太子諸咎弑其君翳又按夏之符姑孰備攷安王二十六年越世子諸咎弑其君翳葬之大横山之下是時越遷于長干也十月越人殺諸咎越滑吳人立孚錯枝為君箋按越世家王翳卒子王之侯立是之侯即孚錯枝也烈王箋按周本紀安王崩子烈王喜立古今人表云夷烈王喜元安王子元年丙午魏公子緩如邯鄲以作難箋按魏世家初武侯卒也子罃與公中緩爭為太子公孫頎自宋入趙自趙入韓謂韓懿侯曰魏罃與公中緩爭為太子君亦聞之乎今魏王得王錯挟上黨固半國也因而除之破魏必矣懿侯說乃與趙成侯合軍并兵以伐魏戰于濁澤魏氏大敗胡三省注通鑑曰解縣濁澤近于魏都又按稽古録韓趙敗魏于濁澤遂圍魏趙欲弑罃立公中緩割地而退韓欲兩分之趙不可韓怒以其師夜去趙師亦歸魏罃遂滅緩於越大夫寺區定越亂立初無余是為莾安箋按索隐曰紀年大夫寺區定越亂立初無余是初無余即王之侯也据吳越春秋王侯自稱為君當即為王之侯也二年秦胡蘇帥師伐韓韓將韓襄敗胡蘇于酸水箋按胡蘇一作蘇胡是葢秦獻公時也水經注濮水逕酸棗縣故城南又東逕胙亭東南又東與酸棗故瀆㑹酸瀆首受河于酸棗縣東逕酸棗城北延津南竹書韓㐮敗秦蘇胡于酸水者也魏觴諸侯于范臺箋按魏策梁主魏嬰觴諸侯于范臺酒酣請魯君舉觴魯君興避席擇言梁主稱善相屬嬰史作罃諸侯索隐按紀年謂魯恭侯宋桓侯衛成侯鄭釐侯也晉桓公邑哀侯于鄭箋按韓滅鄭八年晉桓公始邑之于鄭資治通鑑曰烈王元年韓滅鄭因徙都之皆誤又按初學記注韓貞子初都河北之平陽哀侯徙焉東自豫許畧汝鄧而西得河南府之陽翟福昌新安盡韓地也韓山堅賊其君哀侯箋按六國表韓哀侯六年韓嚴殺其君資治通鑑烈王五年韓嚴遂弑哀侯國人立其子懿侯初哀侯以韓廆為相而愛嚴遂二人甚相害也嚴遂令人刺韓廆于朝走哀侯哀侯抱之刺韓廆兼及哀侯今据竹書韓嚴嚴遂即山堅實一人也六年辛亥梁惠成王元年韓共侯趙成侯遷晉桓公于屯留以後更無晉事箋按韓無共侯當即是懿侯年表懿侯作莊侯是皆譌也趙世家趙成侯十六年與韓魏分晉封晉君以端氏趙肅侯元年奪晉君端氏徙處屯留今据紀年徙屯留即趙成侯也地理志端氏屬河東屯留屬上黨趙成侯偃韓懿侯若伐我葵鄈城箋按世本趙成侯名種此云偃異又按水經注司馬彪曰山陽有鄈城京相璠曰河南山陽西北六十里有鄈城竹書魏惠成王元年趙成侯偃韓懿侯若伐我葵者也七年王陟箋按趙策周烈王崩諸侯皆弔齊後至周怒赴于齊我師伐趙圍蜀陽箋按伐趙當作伐韓地理志韓分晉得南陽郡及潁川之長社陽翟郏郡國志潁川長社有蜀城有蜀津水經注潩水枝渠東逕曲强東皇陂水注之皇陂即古長社縣之濁澤也其陂水北對鷄鳴城即長社縣之濁城也濁陽葢韓地故魏伐韓而圍之若伐趙何由圍蜀陽乎齊田夀帥師伐我圍觀觀降箋按田完世家齊威王九年敗魏于濁澤而圍惠王惠王請獻觀以和解徐廣曰年表云伐魏取觀今之衛縣也正義曰按濁澤葢誤當作觀澤年表云魏哀王二年齊敗我觀澤今据竹書是惠王二年非哀王也魏大夫王錯出奔韓箋按呂氏春秋吴起治西河王錯譛之魏武侯使人召起即是王錯也魏世家公孫頎謂韓曰魏罃得王錯徐廣引紀年惠王二年魏大夫王錯出奔韓是也竹書統箋卷十一
