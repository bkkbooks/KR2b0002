body:
  text: 竹書統箋卷十翰林院檢討徐文靖撰平王名宜臼箋按周本紀犬戎殺幽王於是乃即申侯而共立太子宜臼是為平王自東遷以後始紀晉事王即位皆不書箋按此休文附注元年辛未王東徙洛邑箋按史記正義曰雒邑即王城也平王以前號東都又按地道記王城去雒城四十里地理志河南郡有雒陽縣成周也有河南縣郟鄏王城也卜澗水東瀍水西平王居之王城是也又卜瀍水東是為成周故雒城是也郡國志河南周公所城雒邑也春秋謂之王城東城門名鼎門北城門名乾祭注引博物記曰王城方七百二十丈郛方七十里南望洛水北至郟山當平王東遷之初尚未有王城之名故竹書謂東徙洛邑也錫文侯命箋按書叙曰平王錫晋文侯秬鬯圭瓉作文侯之命王若曰父義和丕顯文武天子稱同姓伯父叔父晉於周同姓故以父稱之義和文侯字左傳晋穆侯之夫人姜氏以條之役生太子命之曰仇仇即文侯名也蓋文侯名仇字義和天子之於諸侯稱其名正也今稱其字蓋尊之而不名也馬融王肅徒見義和非晋侯名遂謂父能以義和諸侯此鑿說也晉侯㑹衛侯鄭伯秦伯以師從王入于成周箋按史記衛世家犬戎殺幽王武公將兵往佐周平戎甚有功周平王命武公為公鄭世家犬戎殺幽王并殺桓公鄭人共立其子掘突是為武公秦本紀襄公以兵送周平王平王封襄公為諸侯是當日晋侯所㑹從王入于成周者也二年秦作西畤箋按秦本紀祠上帝西畤索隱曰襄公始列為諸侯自以居西畤故作西畤祠白帝畤止也言神靈之所依止也魯孝公薨箋按魯世家孝公懿公弟立二十七年卒子弗湟立是為惠公世本作弗皇賜秦晋以邠岐之田箋按秦本紀襄公以兵送周平王平王賜之岐以西之地曰戎無道侵奪我岐豐之地秦能攻逐戎即有其地與誓封爵之襄公於是始國與諸侯通使林氏曰岐在邰西北無百里豳又在岐西北四百餘里三年齊人滅祝箋按周本紀武王封黃帝之後於祝服䖍曰東海郡祝其縣也至是齊人滅之王錫司徒鄭伯命箋按幽王八年錫桓公命為司徒後死於犬戎之難至平王復命其子掘突為司徒是為武公四年燕傾侯卒箋按燕世家作頃頃侯二十年幽王為犬戎所弒二十四年頃侯卒鄭人滅虢箋按左傳僖五年宫之竒曰虢仲虢叔王季之穆也賈逵曰虢仲封東虢制是也虢叔封西虢虢公是也孔仲達曰據傳鄭滅一虢晋滅一虢不知誰是仲後誰是叔後按漢志東虢在滎陽傳曰制巖邑也虢叔死焉是鄭所滅者虢仲之後别有虢君字叔者也五年秦襄公帥師伐戎卒于師箋按詩序曰小戎美襄公也秦本紀襄公十二年伐戎而至岐卒宋戴公薨箋按宋世家戴公二十九年周幽王為犬戎所殺三十四年戴公卒子武公司空立六年燕哀侯卒箋按燕世家頃侯二十年周幽王為犬戎所殺二十四年頃侯卒子哀侯立哀侯二年卒鄭遷于溱洧箋按詩鄭風譜曰幽王為犬戎所殺桓公死之其子武公與晋文侯定平王于東都王城卒取史伯所云十邑之地左洛右濟前華後河食溱洧焉鄭詩曰溱與洧方涣渙兮說文溱作潧水經注潧水出鄫城西北雞絡塢下入洧洧水出河南密縣西南馬領山又東過鄭縣南潧水從西北來注之潧水即溱水也通典鄭州新鄭有溱洧二水七年楚子儀卒箋按楚世家熊咢卒子熊儀立是為若敖若敖二十年幽王為犬戎所弒周東徙二十七年若敖卒八年鄭殺其大夫關其思箋按韓非子曰昔者鄭武公欲伐胡先以其女妻胡君因問于羣臣吾欲用兵誰可伐者大夫關其思對曰胡可伐武公怒而戮之曰胡兄弟之國也子言伐之何也胡君聞之以鄭為親己遂不偹鄭鄭人襲胡取之世本胡歸姓括地志胡城在豫州郾城縣界十年秦還于汧渭箋按還當作遷秦本紀文公三年以兵七百人東獵四年至汧渭之㑹曰昔周邑我先秦嬴于此後即獲為諸侯乃卜居之占曰吉即營邑之水經注渭水出首陽縣渭谷亭南谷東徑郁夷徑平陽故城南汧水入焉汧水出汧縣之蒲谷鄉弦中谷是汧渭之㑹也世紀文公徙汧括地志故汧城在隴州汧源縣西三里十三年魏武公薨箋按魏當作衛史記衛世家武公四十二年犬戎弒幽王五十五年卒又按楚語曰武公年九十五作懿以自警韋昭曰懿大雅抑之篇也毛序曰抑衛武公刺厲王亦以自警蓋王朝有雅列圃有風惟刺王所以列之于雅若僅為飲酒悔過之詩則當同淇澳列之於風烏在列之於雅哉考年表衛武公以宣王十六年即位其齒當四十餘厲王無道已熟悉之又厯五十餘年則幽平時也武公有感于時事不敢顯言王失追刺厲王以寓其意其在於今興迷亂于政顛覆厥德荒湛于酒非必睿聖武公身有是事當時必有所指可知天方艱難曰喪厥國取譬不逺昊天不忒豈非以厲王奔彘而欲後人之鍳之故以為刺王而列之于雅也紀年衛武公薨平王十三年與史記衛世家合十四年晋人滅韓箋按史記索隱曰左傳邘晋應韓武之穆也則韓是武王子詩稱韓侯出祖則是有韓而先滅也今据竹書成王十三年王師燕師城韓王錫韓侯命是時韓在北方與燕近宣王四年王命蹶父如韓韓侯來朝則又改封於韓原詩序曰韓奕尹吉甫美宣王也能錫命諸侯鄭箋韓姬姓之國也後為晋所滅故大夫韓氏以為邑名焉孔疏曰晋之滅韓未知何君之世蓋晋文侯輔平王為方伯之時滅之也晋世家文侯二十四年滅韓韓世家韓之先與周同姓其後苗裔事晋得封于韓原蓋考之不詳耳十八年秦文公大敗戎師于岐來歸岐東之田箋按秦本紀文公十六年以兵伐戎敗走於是文公遂收周餘民有之地至岐岐以東獻之周按稽古録以秦文公大敗戎師在平王二十一年誤二十一年晋文侯殺王子余臣于擕箋按事在晋文侯三十一年史記晋世家周作晋文侯命王若曰父義和丕顯文武能慎明德索隱曰尚書文侯之命是平王命晋文侯仇之語今此乃是襄王命文公重耳之事代數懸隔勳䇿全乖又按擕王虢公翰所立翰蓋虢石父子也二十三年宋武公卒箋按宋世家武公女為魯惠公夫人生魯桓公十八年武公卒二十四年秦作陳寶祠箋按秦本紀文公十九年得陳寶漢郊祀志云文公獲若石云于陳倉北阪城祠之其神來若雄雉其聲殷殷然野雞夜鳴以一牢祠之號曰陳寶韋昭曰在陳倉縣寶而祠之故曰陳寶括地志寶雞神在岐州陳倉縣東二十里故陳倉城中二十五年晉文侯薨箋按晋世家文侯六年犬戎殺幽王三十五年文侯仇卒秦初用族刑箋按秦本紀寧公生子三人長男武公為太子武公弟德公同母魯姬子生出子寧公卒大庶長弗忌威壘三父廢太子而立出子為君出子六年三父等復共令人賊殺出子復立故太子武公武公三年誅三父等而夷三族以其殺出子也二十六年丙申晉昭公元年晉封其弟成師于曲沃箋按襄公二十三年公羊傳曲沃者何晉之邑也晉世家文侯卒子昭侯伯立昭侯元年封文侯弟成師於曲沃詩序揚之水刺晉昭公也昭公分國以封沃沃盛强昭公微弱國人將叛而歸沃焉郡國志河東聞喜邑本曲沃劉昭曰曲沃在縣東北與晉相去六七百里据左傳在春秋前魯惠公二十四年三十二年晉潘父弒其君昭侯納成師不克立昭侯之子孝侯箋按左傳在魯惠公三十年晉人殺潘父箋按晋世家成師封曲沃號為桓叔靖侯庶孫欒賔相桓叔桓叔是時年五十八矣好德晉國之衆皆附焉七年晉大臣潘父弒其君昭侯而迎曲沃桓叔桓叔欲入晉晋人發兵攻桓叔桓叔敗還歸曲沃晋人共立昭侯子平為君是為孝侯誅潘父三十三年癸卯晉孝侯元年楚人侵申箋按杜預曰申今南陽宛縣是也三十六年衛莊公卒箋按衛世家武公卒子莊公揚立二十三年莊公卒太子完立是為桓公王人戍申箋按詩序揚之水刺平王也不撫其民而逺屯戍于母家周人怨思焉鄭箋曰平王母家申國在陳鄭之南迫近强楚王室微弱而數見侵伐王是以戍之四十年齊莊公卒箋按齊世家成公卒子莊公購立二十四年周東徙雒六十四年莊公卒晉曲沃桓叔成師卒子鱓立是為莊伯自是晉侯在翼稱翼侯箋按晉世家孝侯八年曲沃桓叔卒子鱓代桓叔是為曲沃莊伯稽古録平王四十一年曲沃莊伯鮮元誤据竹書鮮當作鱓少一年四十一年辛亥莊伯元年春大雨雪箋按爾雅曰雪與雨雜下曰霰春秋考異郵曰庚申大雪雪深七尺并者丈四尺謝惠連雪賦盈尺則呈瑞于豐年袤丈則表沴于隂德京房易傳曰凡雪者隂氣勝也四十二年狄人伐翼至于晉郊箋按索隱曰翼本晉都自孝侯已下一號翼侯平陽絳邑縣東翼城是也宋襄公薨箋按襄誤當作宣周平王二十三年宋武公卒宋世家武公卒子宣公力立宣公有太子與夷十九年宣公病讓其弟和和亦三讓而受之宣公卒弟和立是為穆公魯惠公使宰讓請郊廟之禮王使史角如魯諭止之箋按呂氏春秋曰魯惠公使宰讓請郊廟之禮于天子桓王使史角往惠公止之其後在于魯墨子學焉据本紀平王四十九年魯隱公即位五十一年平王崩太子泄父早死立其子林是為桓王桓王平王孫也魯惠公請郊廟之禮在平王四十二年下距桓王即位十一年吕氏說繆四十七年晉曲沃莊伯入翼弒孝侯晉人逐之立孝侯子郤箋按郤世本作郤他本亦作都是為鄂侯箋按左傳隱五年春曲沃莊伯以鄭人邢人伐翼王使尹氏武氏助之翼侯奔隨六年春翼九宗五正頃父之子嘉父逆晉侯于隨納諸鄂晉人謂之鄂侯春秋地名考略曰今介休縣東有隨城世本唐叔虞居鄂宋𠂻曰鄂地今在大夏括地志故鄂城在慈州昌寧縣東二里時晉人迎翼侯于隨納諸鄂後乃復入于翼也左傳謂在魯惠公四十五年四十八年戊午晉鄂侯元年無雲而雷箋按開元占經曰天書云無雲而雷是謂天狗所當之國必有甲兵洪範五行傳秦二世元年無雲而雷雷陽雲隂也有雲然後有雷有臣然後有君也無雲而雷示君獨處無人民也魯惠公卒箋按魯世家孝公卒子惠公立四十六年惠公卒庶長子息攝當國行君事是為隱公四十九年己未魯隱公元年春秋始此魯隱公及邾莊公盟于姑蔑箋按春秋隱公元年三月公及邾儀父盟于蔑杜預曰邾今魯國鄒縣也蔑姑蔑魯國卞縣南有姑城括地志姑蔑故城在兖州泗水縣東四十五里又按蔑公穀二傳作昧五十一年春二月乙巳日有食之箋按隱三年嵗在辛酉二月乙巳朔日有食之此不書朔失考也春秋日食三十六其不書朔者八左氏傳曰其不書朔官失之也公羊傳曰不言朔者二日也穀梁傳曰不言朔者食晦也隋律厯志曰今以甲子元厯推算俱是朔日隱公三年二月乙巳日有食之推合乙巳朔莊公十八年春三月日有食之推合壬子朔僖公十二年三月庚午日有食之推合庚午朔十五年夏五月日有食之推合癸未朔元郭守敬授時厯又推合宣十年四月丙辰朔襄十五年八月丁巳朔文元年二月癸亥朔皆闕朔字左傳以為官失之是也穀梁誤以為食晦如果為食晦僖十六年己卯晦成十六年甲午晦皆書此何以不書明是日食在朔而官失之耳公羊以為春秋不書晦尤謬三月庚戌王陟箋按是年辛酉春秋魯隱公三年春三月庚戌天王崩傳曰壬戌天王崩赴以庚戌故書之杜氏曰周平王也實以壬戌崩欲諸侯之速至故逺日以赴春秋不書實崩日而書逺日者即傳其僞以懲臣子之過也桓王名林箋按周本紀平王崩太子泄父早死立其子林是為桓王元年壬戌十月莊伯以曲沃叛伐翼箋按左傳隱五年夏六月曲沃叛王蓋先時曲沃伐翼王使尹氏武氏助翼侯至是而曲沃叛王不遵王命復伐翼也杜氏曰曲沃晉别封成師之邑莊伯成師子也翼晉舊都公子萬救翼荀叔軫追之至于家谷箋按水經注澮水出澮山西徑翼城南又西徑榮庭城南與乾河合即教水之林川也西北至澮交入澮又有女家水出于家谷竹書莊伯以曲沃叛伐翼公子萬救翼荀叔軫追之至于家谷翼侯焚曲沃之禾而還箋按水經注澮水西南合黑水流徑翼城北右引北川水亂流西南入澮澮水又西南與諸水合謂之澮交竹書莊伯十二年翼侯焚曲沃之禾而還翼侯伐曲沃大捷武公請成于翼至相而還附注相一作桐箋按水經注涑水又西徑仲郵􅀈北又西徑桐鄉城北竹書翼侯伐曲沃大捷武公請成于翼至洞庭乃返者也朱謀㙔曰洞一讀作桐又曰庭當作渦洞渦水出沾縣北山又西到晉陽縣南西入于汾武公莊伯子鱓也請成求成也二年王使虢公伐晉之曲沃箋按左傳隱五年秋王命虢公伐曲沃而立哀侯于翼杜注春翼侯奔隨故立其子光又六年傳鄂侯注前年桓王立翼侯之子於翼故不得復入翼别居鄂不知翼人迎晉侯于隨而納諸鄂事在春秋前二年故經不書杜謂晉不告亂故不書誤也又晉侯始納諸鄂因謂之鄂侯杜謂不得復入翼故別居鄂亦誤以史記世家合之竹書鄂侯卒而始立其子哀侯于翼非鄂侯不得復入翼也晉鄂侯卒曲沃莊伯復攻晉晉立鄂侯子光是為哀侯箋按晉世家鄂侯二年魯隱公初立鄂侯六年卒曲沃莊伯聞晉鄂侯卒乃興兵伐晉周平王使虢公將兵伐曲沃莊伯莊伯走保曲沃晉人共立鄂侯子光是為哀侯三年甲子晉哀侯光元年四年曲沃莊伯卒子稱立是為武公箋按林氏曰魯隱公七年晉哀侯二年曲沃莊伯卒子稱代立是為武公今据傳是魯桓公三年云隱公誤尚一軍箋按周禮大司馬序云凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍五年曲沃武公元年箋按竹書桓王五年虢公忌父始作卿士于周芮人乘京荀人董伯皆叛曲沃箋按地理志馮翊臨晉有芮鄉故芮國詹桓伯云駘芮吾西土是也此芮人乘京之芮漢河北縣地後周改芮城唐志陕州芮城縣是也臣瓉曰今河東有荀城古荀國左傳文公六年晉人改搜于董杜注河東汾隂有董亭是也十一年晉小子侯元年曲沃獲晉哀侯箋按桓三年春曲沃武公伐翼次于陘庭韓萬御戎梁𢎞為右逐翼侯于汾隰驂絓而止夜獲之及欒共叔晉人立哀侯子為小子侯箋按晉世家哀侯八年晉侵陘廷陘廷與曲沃武公謀九年伐晉于汾旁虜哀侯晉人乃立哀侯子小子為君是為小子侯小子元年曲沃武公使韓萬殺所虜晉哀侯賈逵曰韓萬曲沃桓叔之子莊伯弟芮伯萬出奔魏箋按桓三年傳芮伯萬之母惡芮伯之多寵人也故逐之出居于魏十二年王師秦師圍魏箋按詩魏國疏曰魏世家絶不知所封為誰故言周以封同姓子魯詩世學曰畢公髙文王庶子初封畢伯成王進為魏侯十餘世晉獻侯詭諸滅之畢萬降于晉為大夫得食邑于魏九傳生魏斯斯請周威王命為魏文侯而與趙籍韓䖍廢晉靖公為家人文侯孫則梁惠王罃也又六傳至魏王假為秦所滅取芮伯萬而東之箋按寰宇記陕州芮城縣北五里有魏城左傳桓四年秋秦師侵芮敗焉冬王師秦師圍魏執芮伯以歸杜氏曰三年芮伯出居魏芮更立君秦為芮所敗故以芮伯歸將欲納之左傳桓十年秦人納芮伯萬于芮十三年冬曲沃伯誘晉小子侯殺之箋按桓七年傳冬曲沃伯誘晉小子侯殺之林氏曰以計誘而殺之非用兵也晉世家小子之四年曲沃武公誘召晉小子殺之是也晉曲沃滅荀以其地賜大夫原氏黯是為荀叔箋按地理志扶風栒邑應劭曰荀侯賈伯伐晉是也臣瓚曰汲郡古文晉武公滅荀以賜大夫原氏黯是為荀叔又云文公城荀然則荀當在晉之境內不得在扶風也今河東有荀城古荀國師古曰瓉說是也戎人逆芮伯萬于郊箋按郊當作郟水經注戎人逆芮伯萬于郟斯城亦或伯萬之故疆也然則郊蓋為郟之訛矣十四年王命虢仲伐曲沃立晉哀侯弟緡于翼為晉侯箋按春秋桓八年冬王命虢仲立晉哀侯弟緡于晉杜氏曰虢仲王卿士虢公林父十五年晉侯緡元年十六年春滅翼箋按左傳桓八年春滅翼杜注曰曲沃滅之又水經注曰詩譜言晉穆侯遷都于絳孝侯改絳曰翼郡國志河東絳邑縣有翼城劉昭注城在縣東八十里至是為武公所滅十九年鄭莊公卒箋按鄭世家武公卒寤生立是為莊公莊公二十七年始朝周桓王桓王怒其取禾弗禮也三十七年莊公不朝周周桓率陳蔡虢衛伐鄭王師大敗祝瞻射中王臂四十三年鄭莊公卒二十三年三月乙未王陟箋按是年甲申春秋桓公十五年三月乙未天王崩林堯叟曰桓王至莊三年葬一統志桓王陵在澠池縣北九十七里桓王山上莊王名他箋按周本紀桓王崩子莊王他立稽古録作莊王仲字之訛也元年乙酉曲沃尚一軍異于晉箋按周禮大司馬職凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍晉土地雖大時曲沃初并晉國故尚一軍以别于晉也六年五月葬桓王箋按桓王之崩七年矣至是始葬林注謂桓王至莊三年葬者莊王之六年魯莊公之三年也十五年王陟釐王名胡齊箋按周本紀莊王崩子釐王胡齊立元年庚子春齊桓公㑹諸侯于北杏以平宋亂箋按莊王十二年齊桓公小白元年至是立五年矣春秋莊公十有三年春齊侯宋人陳人蔡人邾人㑹于北杏傳曰㑹于北杏以平宋亂林氏曰北杏齊地衣裳之㑹一序齊于諸侯之上而獨書爵始伯之辭也自是無特相㑹者矣王風之什絶筆于莊王而僖王之立齊桓之伯皆在是年此王伯興衰之機也又左傳疏曰平宋亂者宋萬已誅宋新立君其位未定齊桓欲修霸業為㑹以安定之地名考略曰北杏在東阿縣境三年曲沃武公滅晉侯緡以寶獻王箋按晉世家曲沃武公伐晉侯緡滅之盡以其寶器賂獻于周僖王王命武公以一軍為晉侯箋按左傳莊公十六年冬王使虢公命曲沃莊伯以一軍為晉侯林堯叟曰周制大國三軍次國二軍小國一軍晉本大國自曲沃武公覆滅宗國僖王命以一軍為晉遂從小國之制又按魯閔公元年晉始作二軍僖二十七年晉作三軍三十一年晉作五軍成三年晉作六軍遂僣王矣四年晉武公三十八年晉猶不與齊桓公之盟附注晉侯緡是年滅箋按春秋魯莊公十有五年書齊侯宋公陳侯衛侯鄭伯㑹于鄄十有六年冬十有二月書齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽魯莊公十五年十六年正僖王三年四年盟皆無晉是晉于是時猶不與齊桓公之盟也五年晉武公卒箋按晉世家武公卒子獻公詭諸立王陟箋按春秋魯桓十五年書桓王崩杜預曰自此以來周有莊王又有僖王崩葬皆不見經傳今据竹書莊王十五年陟僖王五年陟史記周本紀亦言釐王胡齊立五年崩杜云不見經傳非惠王名閬箋按周本紀釐王崩子惠王閬立世本名母凉韋昭注國語曰惠莊王之孫僖王之子惠王母凉也為子頽所篡出居于鄭鄭厲公納之元年乙巳晉獻公元年晉獻公朝王如成周箋按國䇿注洛陽周公所營下都以遷殷頑民是為成周然成周實東都之總名非專指雒邑也吕氏曰豐鎬宗廟之所在故曰宗周東都王道之所成故曰成周周陽白兔舞于市箋按水經注洓水出河東聞喜縣東山黍葭谷又西過周陽邑南其城南臨涑水北倚山原竹書晉獻公二十五年翟人伐晉周陽白兔舞于市即是邑也今据竹書周陽白兔舞于市事在晉獻公元年晉世家獻公二十五年晉伐翟翟亦擊晉于齧桑左傳作采桑杜氏曰平陽北屈縣西南有采桑津水經注以周陽兔舞在是時据竹書則晉獻公如成周時所見也二年王子頺亂王居于鄭箋按莊公十九年左傳初王姚嬖于莊王生子頺子頺有寵蒍國為之師及惠王即位取蒍國之圃以為囿邉伯之宫近於王宫王取之王奪子禽祝跪與詹父田而收膳夫之秩秋五大夫奉子頺以伐王不克出奔溫蘇子奉子頺以奔衛衛師燕師伐周冬立子頺二十年春鄭伯和王室不克夏鄭伯遂以王歸王處于櫟秋王及鄭伯入于塢遂入成周取其寶器而還冬王子頺享五大夫樂及遍儛鄭伯聞之見虢叔曰盍納王乎二十一年夏同伐王城鄭伯將王自圉門入虢叔自北門入殺王子頺及五大夫王乃入鄭人入王府多取玉玉化為蜮射人箋按鄭人溫人也周本紀邉伯等五人作亂伐惠王惠王奔溫已居鄭之櫟左傳溫蘇忿生邑桓王奪以豫鄭者是時溫已屬鄭雖居溫而直可言鄭也又王府當作玉府周禮天官之屬有玉府掌王之金玉玩好凡良貨賄之藏是也鄭人入玉府玉化為蜮射人春秋莊公十八年有蜮注云蜮短狐也蓋以含沙射人為災也五行傳曰詩云為鬼為蜮則不可得蓋氣精也然則玉化為蜮射人者亦氣精之類也九年晉城絳箋按左傳莊二十六年夏晉士蒍城絳以深其宫杜曰絳晉所都也今平陽絳邑縣水經注曰按詩譜言晉穆侯遷都于絳孝侯改絳曰翼獻公北廣其城方二里命之為絳是也晉世家謂獻公八年城聚都之命曰絳晉始都絳未足据也十六年晉獻公作二軍滅耿以賜大夫趙夙滅魏以賜大夫畢萬晉滅于大夫韓趙魏萌于此箋按閔公元年晉作二軍公將上軍太子申生將下軍趙夙御戎畢萬為右以滅耿滅霍滅魏還為太子城曲沃賜趙夙耿賜畢萬魏以為大夫地志河東河北縣詩魏國左傳晉賜畢萬魏卜偃曰魏大名也其地于今為河中永樂非元城之魏也漢以大名名此失矣又地志皮氏縣有耿鄉故耿國都城記曰耿嬴姓國也地理通釋耿在河中府龍門縣東南括地志晉州霍邑縣霍太山在東韋昭曰周文王子霍叔武之國也十七年衛懿公及赤翟戰于洞澤附注曰洞當作泂狄箋按春秋閔二年人伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰公及狄人戰于熒澤衛師敗績遂滅衛杜注曰此熒澤當在河北竹書泂澤即熒澤也又按宣十三年傳赤翟伐晉及清十五年晉師滅赤翟潞氏十六年晉士㑹帥師滅赤狄甲氏及留吁鐸辰成公三年晉郤克衛孫良夫伐牆咎如討赤翟之餘是赤翟種類甚多其伐衛戰洞澤者未審誰也周語史伯曰當成周者北有衛燕翟鮮虞路洛泉徐蒲韋昭注曰徐赤翟隗姓蒲赤翟隗姓則赤翟與衛近者乃徐蒲也後漢郡國志樂安臨濟本狄國劉昭注引地道記云狄伐衛懿公其說謬矣十九年晉獻公㑹虞師伐虢滅下陽箋按左傳僖二年晉荀息請以屈産之乘垂棘之璧假道于虞以伐虢虞公許之且請先伐虢宫之竒諫不聼遂起師夏晉里克荀息帥師㑹虞師伐虢滅下陽杜氏曰下陽虢邑在河東大陽縣虢公醜奔衛箋按僖五年晉侯復假道于虞以伐虢宫之竒諫弗聽許晉使八月甲午晉侯圍上陽問於卜偃曰吾其濟乎對曰克之公曰何時對曰童謠云丙之晨龍尾伏辰袀服振振取虢之旗鶉之賁賁天策焞焞火中成軍其九月十月之交乎丙子旦日在尾月在䇿必是時也冬十二月丙子朔晉滅虢虢公醜奔京師唐厯志日度議曰丙子旦日在尾月在策策入尾十二度新厯是嵗十月丙子定朔日月合尾十四度於黃道日在古厯尾而月在策故曰龍尾伏辰於古距張中而曙直鶉火之末始將西降故曰賁賁又紀年虢公奔衛左氏𫝊云奔京師史記晉世家晉獻公二十二年冬滅虢虢公醜奔周皇覽曰虢公冢在河內溫縣郭東濟水南其城南有虢公臺河內本衛地後乃屬周曰衛曰周曰京師一也公命瑕父吕甥邑于國都箋按國誤當作虢左傳僖十五年晉侯使郤乞告瑕吕飴甥且召之杜注瑕呂飴甥即吕甥也蓋姓瑕吕名飴甥字子金晉侯聞秦將許之平故告吕甥召使迎己据竹書瑕父吕甥甥先食采于瑕故曰瑕父不得以瑕吕為姓明矣文十三年晉使詹嘉處瑕杜氏曰賜其瑕邑亦猶是矣時獻公滅虢虢公奔衛命瑕父吕甥邑于虢都以鎮撫之僖五年𫝊注上陽虢國都在𢎞農陜縣東南二十五年春狄人伐晉箋按晉世家獻公二十五年晉伐翟翟以重耳故亦擊晉于齧桑王陟箋按僖公七年秋七月盟于寧母閏月惠王崩林氏曰惠王實以前年閏月崩以今年十二月丁未告傳曰王人來告喪難故也是以緩杜氏曰有叔帶之難襄王名鄭箋按周本紀惠王崩子襄王鄭立元年庚午箋按周語曰惠后之難王出在鄭韋昭曰惠后周惠王之后襄王繼母陳媯也陳媯有寵生子帶將立未及而卒子帶奔齊王復之又通于襄王之后隗氏王廢隗氏周大夫頺叔桃子奉帶以翟師伐周王出適鄭處于汜在魯僖二十四年史記鄭世家鄭文公三十七年襄王出奔鄭鄭文公居王于汜三十八年晉文公入襄王成周晉獻公卒箋按春秋僖公九年九月戊辰諸侯盟于葵丘甲子晉侯佹諸卒杜氏曰未同盟而赴以名甲子九月十一日戊辰十五日也書在盟後從赴按甲子不當在戊辰後榖梁傳亦作甲子惟公羊傳作甲戌是在戊辰後六日今當從之立奚齊里克殺之及卓子箋按莊子長梧子曰驪之姬艾封人之子也晉國之始得之也涕泣沾襟及其至于王所與王同筐床食芻豢而後悔其泣也左傳閔四年初晉獻公欲以驪姬為夫人立之生奚齊其娣生卓子及將立奚齊既與中大夫成謀姬謂太子曰君夢齊姜必速祭之太子祭于曲沃歸胙于公毒而獻之姬泣曰賊由太子太子奔新城十二月戊申縊于新城又僖九年傳九月晉獻公卒初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力其濟君之靈也不濟則以死繼之冬十月里克殺奚齊于次荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬十二月里克殺公子卓于朝荀息死之林堯叟曰卓子驪姬之娣所生子也又按卓子史記作悼子立夷吾箋按晉世家申生自殺于新城此時重耳夷吾來朝驪姬因譛二公子申生之藥胙二公子知之重耳走蒲夷吾走屈二十二年獻公乃使兵伐蒲重耳踰垣遂奔翟使人伐屈屈城守不可下二十三年獻公遂使賈華等伐屈屈潰夷吾遂奔梁二十九年獻公卒里克殺奚齊悼子列女傳曰鞭殺驪姬于市二年辛未晉惠公元年箋按晉世家里克等已殺奚齊悼子使人迎重耳于翟重耳謝曰大夫其更立他子里克迎夷吾于梁夷吾欲往乃使郤芮厚賂秦約曰即得入請以河西之地豫之秦穆公乃發兵送夷吾于晉是為惠公晉殺里克箋按春秋僖十年夏晉殺其大夫里克公羊傳曰里克弒二君則曷為不以討賊之辭言之惠公之大夫也然則孰立惠公里克也里克立惠公則惠公曷為殺之惠公曰爾既殺夫二孺子矣又將圖寡人為爾君者不亦病乎于是殺之三年雨金于晉箋按天鏡曰天雨金國有兵喪稽古録曰莊王三年夏戎伐京師王子帶召之也是亦有兵之應也七年秦伯涉河伐晉箋按僖十五年傳晉侯之入也賂秦伯以河內列城五東盡虢略南及華山內及解梁城既而不與故秦伯伐晉卜徒父筮之吉涉河侯車敗詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也三敗及韓晉侯謂慶鄭曰寇深矣若之何對曰君實深之可若何九月晉侯逆秦師使韓簡視師壬戍戰于韓原晉戎馬還濘而止秦獲晉侯以歸秦許晉平十月改館晉侯十一月晉侯歸于是秦始征晉河東置官司焉十五年晉惠公卒子懷公圉立箋按晉世家惠公八年使太子圉質秦十三年惠公病子圉遂亡歸晉十四年九月惠公卒太子圉立是為懷公時魯僖公二十三年也秦穆公帥師送公子重耳圍令狐桑泉臼衰皆降秦師箋按左傳僖二十四年春王正月秦伯納之濟河圍令狐入桑泉取臼衰闞駰曰令狐今猗氏也杜預曰桑泉在解縣西郡國志河東解縣有臼城狐尾與先軫禦秦至于廬栁箋按狐尾當作狐毛禦秦當作禦晉左傳僖二十三年懷公命無從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召冬懷公執狐突乃殺之僖二十四年甲午晉師軍于廬栁杜氏曰懷公遣軍拒重耳蓋是時狐毛先軫皆從重耳在秦至是聞晉師在廬栁故使禦之也春秋地名考略曰今解縣西北有廬栁城乃謂秦穆公使公子縶來與師言次于郇盟于軍箋按僖二十四年傳秦伯使公子縶如晉師師退軍于郇辛丑狐偃及秦晉之大夫盟于郇林堯叟曰晉師從秦命納文公故退師預注解縣西北有郇城公子重耳涉自河曲箋按郡國志河東有蒲坂沙丘亭韋昭曰即河曲左傳僖二十四年二月壬寅公子入于晉師丙午入于曲沃丁未朝于武宫賈逵曰文公之祖武公廟也十六年乙酉晉文公元年晉殺子圉箋按晉世家重耳即位為晉君羣臣皆往懷公圉奔髙梁戊申使人殺懷公杜氏曰髙梁在平陽楊縣西南時魯僖公二十四年也十七年晉城荀箋按桓王五年荀人叛曲沃十三年晉曲沃滅荀至是城之地理志注臣瓉曰文公城荀即謂此也二十年周襄王㑹諸侯于河陽箋按春秋僖二十八年冬天王狩于河陽壬申公朝于王所杜注河陽晉地今河內有河陽縣晉實召王為其辭逆而意順故經以王狩為辭壬申十月十日又按晉世家晉文公五年四月宋公齊將秦將與晉侯次城濮己巳與楚兵合戰楚兵敗甲午晉師還至衡雍作王宫于踐土五月丁未獻楚俘于周天子使王子虎命晉侯為伯癸亥王子虎盟諸侯于王庭壬午晉度河北歸國行賞冬晋侯㑹諸侯于溫欲率之朝周力未能恐其有畔者乃使人言周襄王狩于河陽壬申遂率諸侯朝王于踐土孔子讀史記至文公曰諸侯無召王王狩河陽者春秋諱之也郡國志河南卷縣有垣雍城或曰古衡雍括地志衡雍故城在鄭州原武縣西北七里郭緣生述征記曰踐土今治坂城是魏土地記治坂城南臨孟津河一統志河陽城在孟縣西南三十里春秋天王狩于河陽即此二十二年齊師逐鄭太子齒奔城張南鄭箋按水經注洓水又西南徑解縣故城南又西南徑瑕城又西南徑張陽城東竹書齊師逐鄭太子齒奔城張南鄭者也漢書之所謂東張矣涑水又西南屬于陂陂分為二東陂世謂之晉興澤西陂即張澤也西北去蒲坂二十五里二十四年晉文公卒箋按春秋僖三十二年冬十有二月己卯晉侯重耳卒晉世家文公卒子襄公歡立据僖二十八年傳楚子曰晋侯在外十九年矣而果得晉國杜氏曰晉侯生十七年而亡亡十九年而反凡三十六年至此四十矣是卒年四十四也二十五年甲午晉襄公歡元年箋按左傳僖三十三年夏四月辛巳晉敗秦師于殽獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晉于是始墨三十年洛絶于泂箋按水經注洛水又東過偃師縣南又北陽渠水注之竹書晉襄公六年洛絶于泂即此處也三十一年晉襄公卒箋按晉世家襄公七年八月襄公卒太子夷臯少晉人以難故欲立長君趙盾使士㑹于秦迎公子雍賈季亦使人召公子樂于陳太子母繆嬴日夜抱太子以號泣于朝曰先君何罪其嗣亦何罪舍適而外求君將安置此趙盾與諸大夫皆患繆嬴且畏誅乃背所迎而立太子夷臯是為靈公三十二年辛丑晉靈公夷臯元年三十三年王陟箋按春秋魯文公八年秋八月戊申天王崩冬十月公孫敖如京師不至以幣奔莒弔喪之禮缺矣至九年春毛伯來求金則魯不赴弔又幾三月頃王箋按周本紀襄王崩子項王壬臣立元年癸卯六年彗星入北斗箋按星傳曰北斗九星在紫微西垣外第一曰天樞去極二十三度半入張宿九度二曰天璇去極三十度入張宿十二度半三曰天璣去極三十度入翼宿十三度四曰天權去極二十三度入翼宿十七度五曰玉衡去極二十八度入軫宿十二度半六曰闓陽去極三十度入角宿四度少七曰搖光去極三十五度入角宿九度又一星曰弼在第七星右不見又一星曰輔在第六星左常見去極三十度入角宿三度宋玉九辨曰天有九星以正機衡謂此也春秋魯文十四年秋七月有星孛入于北斗周內史叔服曰不出七年宋齊晉之君皆將死亂後十六年宋襄夫人使召公田孟諸而弒之十八年齊閻職及邴歜弒懿公于申池宣公二年晉趙穿弒靈公于桃園以甲子計之魯文公元年乃周襄王二十六年也至于文公十四年則襄王崩後七年事矣羣昭洞記曰頃王六年彗星入北斗晉趙盾率諸侯平周亂立王子樊是為匡王時竹書未出而所云若是則紀年信不誣矣但匡王名班韋乃云樊未知何据又孝經鈎命决曰周襄王不能事其母孛入北斗不知為頃王六年事矣竹書統箋卷十
