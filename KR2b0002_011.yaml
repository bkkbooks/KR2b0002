body:
  text: 竹書統箋卷九翰林院檢討徐文靖撰宣王箋按周本紀厲王死于彘宣王即位名靖元年甲戌春正月王即位周定公召穆公輔政箋按周本紀宣王即位二相輔之修政法文武成康之遺風諸侯復宗周僖公二十四年傳注曰召穆公周卿士名虎扶風雍縣東南有召亭復田賦箋按周禮大司馬凡令賦以地與民制之上地食者參之二其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人令邦國之賦亦以地之美惡民之衆寡為制鄭司農曰上地謂肥美田也注曰賦給軍用者也周自厲王奔彘田賦廢弛宣王即位而復之作戎車箋按小雅戎車既飭鄭箋曰戎車革輅之等也其等有五孔疏曰春官掌王之五路革路以即戎故知戎車革路之等也漢志天子畿方千里提封百萬井定出賦三十四萬井戎車四萬匹兵車萬乗王明齋曰以王畿千里居民之數計之為田一千六百同每同除山澤邑居溝渠道路等三分之一為六千四百井每井以上中下三等一易再易計之一夫耕二夫之地實止四家以可任者三人至二人計之每井十人故每同二萬五千餘家可任者六萬四千人出車百乗徒萬人每五家而出二人可任者六人而用其一也是千里之地合有四千萬家為車十六萬乗矣燕惠侯薨箋按燕世家厲王在彘十五年燕惠侯卒竹書在宣王元年二年錫太師皇父司馬休父命箋按詩序曰白駒刺宣王也箋曰刺其不能留賢也其詩曰爾公爾侯逸豫無期正以命太師尹氏皇父為三公故賢者欲去之也楚語重黎氏世叙天地程伯休父其後也當宣王時失其官守而為司馬氏韋昭曰謂失天地之官而以諸侯為大司馬郡國志河南洛陽有上程聚古程伯休父之國也闗中更有程地帝王世記曰文王居程徙都豐故此加為上程魯慎公薨箋按慎史記作真魯世家獻公三十二年卒子真公濞立真公十四年厲王奔彘二十九年宣王即位三十年真公卒子武公敖立曹公子蘇弑其君幽伯疆箋按曹世家幽伯疆九年弟蘇殺幽伯代立是為戴伯戴伯元年周宣王立已三年三年王命大夫仲伐西戎箋按宣王時秦仲為西垂大夫水經注秦水出大隴山秦谷歴三泉合成一水而歴秦川川有秦亭秦仲所封也鄭語史伯曰秦仲齊侯姜嬴之儁也且大其將興乎韋昭曰秦仲嬴姓附庸秦公伯之子詩序曰車轔美秦仲大有車馬其詩曰有車轔轔有馬白顛小戎美襄公備兵甲討西戎其詩曰小戎俴收五楘良輈王氏維禎曰秦仲誅西戎即小戎之詩是也朱子乃屬之襄公誤矣齊武公壽薨箋按齊世家武公壽九年厲王奔彘二十四年宣王立二十六年武公卒四年王命蹶父如韓韓侯來朝箋按左傳曰韓武之穆也詩序曰韓奕美宣王也能錫命諸侯其詩曰蹶父孔武靡國不到為韓姞相攸莫如韓樂蹶父如韓之事也詩又曰韓侯入覲以其介圭入覲于王韓侯來朝之事也五年夏六月尹吉甫帥師伐玁狁至于太原箋按詩序曰六月宣王北伐也其詩曰薄伐玁狁至于太原文武吉甫萬邦為憲漢書陳湯傳劉向上疏曰吉甫之歸周厚賜之是其事也又按太原即涇陽後魏於此置原州非左傳杜注所謂太原即晉陽也一統志尹吉甫宅在鄖陽府房縣城南門外秋八月方叔帥師伐荆蠻箋按詩序曰采芑宣王南征也其詩曰蠢爾蠻荆大邦為讎方叔元老克壯其猶是其事也六年召穆公帥師伐淮夷箋按詩序曰江漢尹吉甫美宣王也能興衰撥亂命召公平淮夷其詩曰淮夷來鋪王命召虎是其事也僖公二十四年傳召穆公思周徳之不類杜注召采地扶風雍縣東南有召亭王帥師伐徐戎箋按詩序曰常武召穆公美宣王也其詩曰南仲太祖太師皇父整我六師以修我戎又曰王謂尹氏命程伯休父率彼淮浦省此徐土是其事也皇父休父從王伐徐戎次于淮箋按詩鐘鼓序曰刺幽王也歐陽永叔謂詩書史記皆無幽王東巡之事又自成王時淮夷不為周臣宣王時遣將征之亦不自往幽王何得作樂于淮上然則詩所云鐘鼓淮上果屬何代之王也今据竹書宣王六年王帥師伐徐戎皇父休父從王次于淮則作樂于淮上者葢宣王也歐公謂宣王未嘗至淮非也王歸自伐徐錫召穆公命箋按常武之詩曰徐方不回王曰旋歸是王歸自伐徐之事也江漢之詩曰王命召虎來旬來宣文武受命召公維翰是其錫命之事也西戎殺秦仲箋按秦本紀秦仲立二十三年死于戎有子五人其長者曰莊公宣王乃召莊公昆弟五人與兵七千使伐西戎破之於是復子秦仲後及其先大駱大邱并有之為西垂大夫楚子霜卒箋按楚世家熊霜元年周宣王初立熊霜六年卒七年王錫申伯命箋按詩序崧髙尹吉甫美宣王也天下復平能建國親諸侯褒賞申伯焉其詩曰王命申伯式是南邦因是謝人以作爾庸是其事也韋昭曰謝申伯之都今在南陽潛夫論曰申在宛北序山之下路史曰序即謝也王命樊侯仲山甫城齊箋按詩序烝民尹吉甫美宣王也其詩曰王命仲山甫城彼東方毛傳曰樊穆仲也東方齊也古者諸侯之居逼隘則王者遷邑而定其居葢去薄姑而遷于臨淄也孔疏曰以為宣王之時始遷臨淄齊世家周夷王之時哀公之同母少弟山殺胡公而立是為獻公因徙薄姑都治臨淄史記之文事多疏畧又按晉語倉葛曰陽人有樊仲之官守服䖍曰陽城樊仲山甫所居故名陽樊韋昭曰仲山甫王卿士食采于樊朱子詩集傳曰仲山甫樊侯之字也杜預曰野王西南有樊城路史曰陽樊在濟源縣東南三十八里其後出為樊侯而城齊故兖有樊城也括地志漢樊縣城在兖州瑕丘縣西南三十五里當是仲山甫城齊時所築也今据竹書獻公在位九年卒當周厲王之六年子武公立宣王四年卒子厲公立是山甫城齊當齊厲公之三年不得云獻公八年初考室箋按詩序斯干宣王考室也鄭箋曰考成也宣王築宮廟羣寢既成而釁之歌斯干之詩以落之此之謂成室儀禮下管新宫笙入三成葢即此詩也魯武公來朝錫魯世子戲命箋按周語魯武公以括與戲見王王立戲樊仲山甫諫曰不可立也夫下事上少事長所以為順也今天子立諸侯而建其少是教逆也若魯從之而諸侯效之王命將有所壅若不從而誅之是自誅王命也是事也誅亦失不誅亦失天子其圖之王卒立之九年王㑹諸侯于東都遂狩于甫箋按詩序車攻宣王復古也宣王能内修政事外攘夷狄復文武之竟土脩車馬備器械復㑹諸侯于東都因田獵而選車徒馬其詩曰四牡龎龎駕言徂東又曰東有圃草駕言行狩是其事也鄭箋曰東都王城也圃草圃田之草也鄭有圃田孔疏曰宣王之時未有鄭國圃田在東都畿内故宣王得往田焉今按穆傳曰庚午天子飲于洧上乃遣祭父如圃鄭用致諸侯丁丑天子里圃田之路東至于房西至于邱則是宣王前已先名圃鄭矣十二年魯武公薨箋按漢律厯志武公敖即位二年子懿公被立史記魯世家武公九年春與長子括少子戲西朝周宣王夏武公歸而卒今据竹書武公朝周在宣王八年卒于宣王十二年史記及漢志皆誤齊人弑其君厲公無忌立公子赤箋按齊世家厲公暴虐故胡公子復入齊齊人欲立之乃與攻殺厲公胡公子亦戰死齊人乃立厲公子赤為君而誅殺厲公者七十人按年表宣王十三年為齊文公赤元年十五年衞釐侯薨箋按衞世家釐侯二十八年周宣王立四十二年釐侯卒王錫虢文公命箋按賈侍中曰文公文王母弟虢仲之後為王卿士韋昭曰虢叔之後西虢也宣王都鎬在畿内括地志虢故城在岐州陳倉縣東南十里十六年晉遷于絳箋按史記周成王封弟叔虞于唐詩唐風譜曰太原晉陽是也唐叔子燮改為晉侯燮曽孫成侯南徙曲沃近平陽其孫穆侯又徙于絳云按漢志河東絳縣晉武公自曲沃徙此應劭曰絳水出西南今据晉世家穆侯費王立上距宣王之立十五年穆侯遷絳與紀年合是漢志誤也十八年蔡夷侯薨箋按蔡世家夷侯十一年周宣王即位二十八年夷侯卒二十一年魯公子伯御弑其君懿公戲箋按國語魯武公以括與戲見王韋昭曰括武公長子伯御也戲括弟懿公也宋庠曰今考魯世家宣王立戲為魯太子戲立是為懿公九年懿公兄括之子伯御與魯人攻弑懿公而自立則伯御乃括之子明矣又按班固人物表伯御懿公兄子與史記合今以括為伯御疑失之漢律志懿公九年正月癸巳朔旦冬至殷歴以為甲午葢即是年也二十二年王錫王子多父命居洛箋按左傳隠八年鄭伯請釋泰山之祀而祀周公以泰山之祊易許田杜注曰鄭桓公周宣王之母弟封鄭助祭泰山湯沐之邑在祊此以厲王之子宣王之弟故稱王子多父即鄭桓公友也世本鄭桓公居棫林徙拾左傳襄十四年鄭子蟜帥師至于棫林杜注棫林秦地是桓公初封京兆鄭縣後乃命之居洛也水經注曰竹書紀年晉文侯二年同王子多父伐鄶克之乃居鄭父之丘名之曰鄭是曰桓公皇甫士安曰或言鄭故有熊氏之墟黄帝之所都也鄭氏徙居之故曰新鄭是新鄭之名亦始于桓公竹書云王命居洛是矣注又曰渭水又東石橋水出馬嶺山北逕鄭城西東去鄭城十里而北流注于渭闞駟謂之新鄭水葢以桓公居洛為新鄭故以石橋水在鄭縣者亦謂之新鄭水也世本言宣王二十二年封庶弟友于鄭竹書言宣王二十二年錫王子多父命居洛是多父即友友時居洛已有新鄭之名其子武公襲封亦稱新鄭非武公遷洛乃稱新也古友字作㕛與多字相近或稱友也薛瓚言穆王已下都于西鄭不得以封桓公者非是二十四年齊文公赤薨箋按齊世家文公十二年卒子成公脱立二十五年大旱王禱于郊廟遂雨箋按詩序曰雲漢仍叔美宣王也宣王承厲王之烈内有撥亂之志遇災而懼其詩曰旱既太甚蘊隆蟲蟲不殄禋祀自郊徂宮上下奠瘞靡神不宗是其禱于郊廟之事也皇甫謐曰宣王元年不藉千畆虢公諫不聴天下大旱三年不雨至六年乃雨今据竹書大旱在宣王二十五年不藉千畆在二十九年亦併無積旱五年之事謐説非也二十七年宋惠公覸薨箋按宋世家惠公四年周宣王即位三十年惠公卒二十八年楚子狥卒箋按楚世家熊狥十六年鄭桓公初封于鄭二十二年卒二十九年初不藉千畝箋按周語曰宣王即位不藉千畝虢文公諫曰不可夫民之大事在農古者大史順時瓜見土農祥晨正先時九日太史告稷曰自今至于初吉陽氣俱烝上膏其動卒以告王乃使司徒咸戒公卿百吏庶民司空除壇於藉命農大夫咸戒農用及藉后稷監之膳夫農正陳藉禮太史贊王王敬從之王耕一墢班三之庶人終於千畝今天子欲修先王之緒而棄其大功匱神之祀而困民之財將何以求福用民王弗聴三十年有舞于鎬京箋按周禮服不氏掌養猛獸而教擾之注曰猛獸虎豹熊羆之屬擾馴也列子曰周宣王之牧正有梁鴦者能養野禽獸使毛丘圜傳之鴦曰且一言我養虎之法順之則喜逆之則怒汲冡瑣語曰幽王欲殺太子宜臼釋虎使執之宜臼叱之虎輒弭耳而服是周宣王養猛獸而幽王又尤而效之也舞鎬京豈亦有教之使舞者耶京房占曰止城上邑必虚初學記引紀年曰宣王三十年有舞鎬京漢五行志曰昭帝元鳳元年九月有黄䑕銜其尾舞王宫端門中亦是類矣三十二年王師伐魯殺伯御箋按周本紀伯御即位十一年周宣王伐魯殺其君伯御命孝公稱于夷宮箋按宣王既殺伯御而問魯公子能道順諸侯者以為魯後樊穆仲曰魯懿公弟稱肅恭明神敬事耆老賦事行刑必問于遺訓而咨于故寶宣王曰然乃立稱于夷宮韋昭曰夷宮者宣王祖父夷王之廟古者爵命必于祖廟又按唐孔氏詩正義曰宣王三十年伐魯諸侯從此而不睦葢周衰至此而漸也大局宣王之美詩多在三十年前事箴規之篇當在三十年之後王徳漸衰美刺並作其大雅六篇小雅自正月至鴻鴈及斯干無羊七篇皆宣王徳盛時作自庭燎盡我行其野是王徳衰乃作以前諸侯不睦各不朝宗沔水之詩或亦作也後則王政大衰刺詩為常故宜多也据竹書則伐魯在宣王三十二年詩疏少二年也陳僖公孝薨箋按陳世家釐公孝六年周宣王即位三十六年釐公卒有馬化為人箋按京房曰天子諸侯相伐民流百姓勞厥妖馬生人今馬之化人亦猶是也三十三年齊成公薨箋按齊世家成公脱立九年子莊公購立脱世本作説王師伐太原之戎不克箋按穆王十七年遷戎于太原故太原之戎日盛朱長孺曰詩薄伐玁狁至于太原後漢西羌傳夷王命虢公帥六師伐太原之戎至于俞泉宣王二十六年遣兵伐太原之戎不克諸所稱太原非禹貢之太原也後漢靈帝紀段熲破先零羌于涇注涇陽屬安定郡在原州郡縣志原州平凉縣本漢涇陽縣地然則太原當即今之平凉而後魏立為原州亦是取古太原之名爾計周人之禦玁狁必在涇原之間若晉陽之太原在大河之東距周京千五百里豈有寇從西來兵乃東出者乎長孺之言正非無見今竹書云厲王十四年玁狁侵宗周西鄙則詩云薄伐玁狁至于太原其不得在東明矣况玁狁侵鎬及方至于涇陽詩人已明言之矣詩又言整居焦穫括地志焦穫亦名刳口在雍州涇陽縣城北十數里則太原亦指涇陽從可知矣三十七年有馬化為狐箋按唐開元占經引紀年曰周宣王三十三年有馬化為狐令按是三十七年燕僖侯卒箋按燕世家釐侯宣王初即位三十六年釐侯卒楚子鄂卒箋按楚世家熊鄂立九年卒索隠曰鄂一作噩三十八年王師及晉穆侯伐條戎奔戎王師敗逋箋按桓二年左傳條之役杜注條晉地史記晉世家穆侯費王立七年伐條即是條也九域志蓧縣在冀州東北一百五十里樂史云即有條國也按穆傳曰有虎在乎葭中七萃之士髙奔戎乃生捕虎而獻之又曰天子賜奔戎佩玉一隻奔戎再拜䭫首或奔戎來服于周故仍以奔戎係之是時王師敗逋不言敗之者猶春秋曰王師敗績于茅戎以自敗為文尊尊之意也三十九年王師伐姜戎戰于千畝王師敗逋箋按周語曰宣王三十九年戰于千畝王師敗績于姜氏之戎韋昭曰姜氏之戎西夷别種四嶽之後也詩序曰祈父刺宣王也其詩曰予王之爪牙胡轉予于恤靡所止居鄭箋曰謂見使從軍與姜戎戰于千畆而敗之時也郡國志太原界休縣有千畝聚左傳曰晉有千畆之戰在縣南日知録曰穆侯時晉境不得至界按史記趙世家周宣王伐戎及千畆戰正義曰括地志千畆原在晉州岳陽縣北九十里是也又按晉世家穆侯十年伐千畆有功時亦惟王師敗御奄父脱王四十年料民于太原箋按周語曰宣王既喪南國之師乃料民于太原仲山甫諫曰民不可料也不謂其少而大料之是示少而惡事也臨政示少諸侯避之治民惡事無以賦令且無故而料民天之所惡也王卒料之又按春秋傳子産對叔向曰宣汾洮障大澤以處太原晉荀呉帥師敗狄于太原穀梁傳曰中國曰太原夷狄曰大鹵此太原在平陽東北也戎人滅姜邑箋按後漢西羌傳戎人滅姜侯之邑水經注曰岐水逕岐山而又屈逕周城南又東逕姜氏城南為姜水一統志姜氏城在鳳翔府寶岐縣西南七里杜預左傳注姜戎姜姓之戎居晉南鄙殆戎人滅姜之後姜遷晉南鄙也晉人敗北戎于汾隰箋按後漢西羌傳晉人敗北戎于汾隰注曰二水名非也左傳桓三年曲沃武公逐翼侯于汾隰林唐翁曰曲沃武公逐翼侯于汾水邊也下濕曰隰四十一年王師敗于申箋按後漢西羌傳宣王四十一年王師征申戎破之與此云敗于申者不同四十三年王殺大夫杜伯箋按顔介冤魂志引周春秋曰周杜國之伯名恒為宣王大夫宣王之妾曰女鳩欲通之杜伯不可女鳩訴之于王曰恒竊與妾交宣王信之囚杜伯于焦友左儒争之王不許曰女别君而異友也儒曰君道友逆則順君以誅友友道君逆則師友以違君王怒曰易而言則生不易則死儒曰士不枉義以從死不易言以求生臣能明君之過以正杜伯之無罪九諫而王不聴王使薛甫司工錡殺杜伯左儒死之杜伯既死即為人見王曰恒之罪何哉召祝而以杜伯語告之祝曰始殺杜伯誰與王謀之王曰司工錡也祝曰何不殺錡以謝之宣王乃殺錡使祝以謝杜伯錡又為人而至曰臣何罪之有宣王告皇甫曰祝也與我謀而殺人吾所殺者又皆為人而見奈何皇甫曰殺祝以兼謝焉又無益也皆為人而至祝亦曰我焉知之奈何以為罪而殺臣也後三年遊于圃田從人滿野杜伯乗白馬素衣司工錡為左祝為右朱衣朱冠起于道左執朱弓朱矢射王中心折脊伏于弓矢而死其子隰叔奔晉箋按左傳襄二十四年宣子曰昔匄之祖在周為唐杜氏杜預曰杜伯之子隰叔奔晉四世及士㑹食邑于范為范氏括地志下杜故城在雍州長安縣東南九里古杜伯國晉穆侯費生薨箋按晉世家晉釐侯十四年周宣王初立十八年釐侯卒子獻侯籍立十年卒子穆侯費王立二十七年卒索隠曰鄒誕生本作弗生或作㵒生今依紀年作費生弟殤叔自立世子仇出奔箋按晉世家穆侯四年娶齊女姜氏為夫人七年伐條生太子仇十年伐千畆有功生少子成師二十七年穆侯卒弟殤叔自立太子仇出奔四十四年箋按晉殤叔元年丁巳四十六年王陟箋按周語云杜伯射王于鎬韋昭注鎬鎬京也周春秋謂杜伯射王于圃田與國語異幽王箋按周本紀宣王崩子幽王宫涅立名涅元年庚申春正月王即位晉世子仇歸于晉殺殤叔晉人立仇是為文侯箋按晉世家殤叔四年穆侯太子仇率其徒襲殤叔而立是為文侯王錫太師尹氏皇父命箋按詩序曰節南山家父刺幽王也其詩曰赫赫師尹毛傳師太師周之三公也尹氏為太師則詩正作于是時宣王二年錫太師皇父至是尚在而幽王申錫之也二年箋按辛酉晉文侯元年涇渭洛竭箋按周語曰幽王三年西周三川皆震伯陽父曰昔伊洛竭而夏亡河竭而商亡今周徳若二代之季矣是嵗也三川竭岐山崩韋昭曰三川涇渭汭今据竹書乃涇渭洛也洛漆沮水也漢志曰涇水出安定涇陽縣笄頭山東南至馮翊陽陵縣入渭行千六十里渭水出隴西首陽縣西南鳥䑕同穴山東至船司空入河行千八百七十里水經注按尚書禹貢太史公禹本紀云導渭水東北至涇又東逕漆沮孔安國曰漆沮一名矣一曰洛水也山海經白於之山洛水出于其陽而東流注于渭漢書匈奴傳武王放逐戎夷涇洛之北注云洛即漆沮水也出上郡雕隂泰冐山東南入于渭周禮雍州之浸曰渭洛殷本紀西伯獻洛西之地于紂正義曰洛水一名漆沮水在同州是涇渭洛為三川韋昭以為涇渭汭非也岐山崩箋按地理志扶風美陽縣岐山在西北郭璞曰漆水出岐山地理通釋岐山亦曰天柱山一統志岐山在鳳翔府岐山縣北一十里初增賦箋按周禮太宰之職以九賦斂財賄一曰邦中之賦二曰四郊之賦三曰郊甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦七曰關市之賦八曰山澤之賦九曰幣餘之賦至是而悉增之不但田賦也故直曰增賦詩序曰楚茨刺幽王也政煩賦重田萊多荒序又曰甫田刺幽王也鄭箋曰政煩賦重農人失職是其事也晉文侯同王子多父伐鄶克之乃居鄭父之丘是為鄭桓公箋按鄭語桓公問於史伯曰王室多故余懼近焉其何所可以逃死史伯對曰其濟河洛潁之間乎是其子男之國虢鄶為大君若以周難之故寄孥與賄焉不敢不許周亂而弊是驕而貪必將背君君若以成周之衆奉辭伐罪無不克矣若克二邑鄢蔽補丹依㽥歴莘君之土也公説乃東寄帑與賄虢鄶受之十邑皆有寄地韋昭曰後桓公之子武公竟取十邑而居之今河南新鄭是也据竹書桓公時已克鄶而居于鄭父之丘故曰鄭桓公史記鄭世家桓公卒平王東徙其民雒東而虢鄶果獻十邑竟國之與紀年合韋昭注國語其時未見竹書故以取十邑為武公也又按周彞器有史伯碩父鼎銘曰維六年八月初吉已子史伯碩父追孝于朕皇考釐仲王母乳母尊鼎黄伯思東觀餘論曰史伯周宣王臣碩父其字也三年王嬖褒姒箋按後漢注無徳而寵曰嬖稽古録幽王三年王得褒姒嬖之詩人知其必亡刺之曰赫赫宗周褒姒滅之毛傳曰昔夏之衰有二龍之妖卜藏其漦周厲王𤼵而觀之化為元黿童女遇之當宣王時而生女懼而棄之後褒人有獻而入之幽王幽王嬖之是謂褒姒鄭箋曰褒姒褒人所入之女姒其字也今按太史公曰禹為姒姓其後分封以國為姓有褒氏葢褒姒為褒人所入因胃褒姓非字也穆天子傳曰赤烏之人丌好獻女于天子女聴女列為嬖人嬖人之名始此冬大震電箋按河圖曰隂陽相薄為雷元命包曰隂陽激為電開元占經曰冬三月有大雷聞千里者人君絶令又曰天冬雷地必震敕令撓則冬雷民饑四年秦人伐西戎箋按秦本紀莊公生子三人其長男世父曰戎殺我大父仲我非殺戎王則不敢入遂將擊戎讓其弟襄公襄公二年戎圍犬邱世父擊之為戎人所虜嵗餘復歸世父夏六月隕霜箋按詩序曰正月大夫刺幽王也其詩曰正月繁霜毛傳曰正月夏之四月鄭箋曰夏之四月建巳之月而多恒寒若之異京房易傳曰夏霜君死國亡又春秋命歴序曰桀無道夏隕霜亦是類也陳夷公薨箋按陳世家武公卒子夷公説立是嵗周幽王即位夷公三年卒据竹書是四年五年世子宜臼出奔申箋按小弁詩傳曰幽王娶申女生太子宜咎韋昭曰申姜姓之國平王母家史記褒姒生子伯服立以為后而放宜咎將殺之汲冡瑣語曰幽王欲殺太子宜臼釋虎使執之宜臼叱之虎輒彌耳而服是其欲殺之事也時申為太子母家故太子宜咎奔申稱世子者幽王立伯服為太子故此稱世子也皇父作都于向箋按詩序曰十月之交大夫刺幽王也其詩曰皇父孔聖作都于向孔疏引杜預曰河内軹縣西有地名向上六年王命伯士帥師伐六濟之戎王師敗逋箋按後漢西羌傳幽王命伯士伐六濟之戎王軍敗伯士死焉西戎滅葢箋按韓非子周公旦已勝殷將攻商葢辛公甲曰大難攻小易服不如勝衆小以劫大乃攻九夷而商葢服矣齊語曰桓公築五鹿中牟葢與牡丘以衞諸夏之地韋注四塞諸夏之關也是葢與戎近山海經葢國在鉅燕南冬十月辛卯朔日有食之箋按小雅十月之交朔日辛卯日有食之亦孔之醜毛傳曰之交日月之交㑹鄭箋曰周之十月夏之八月也八月朔日日月交㑹而日食隂侵陽臣侵君之象日辰之義日為君辰為臣辛金也卯木也又以卯侵辛故甚惡之孔疏曰古之歴書亡矣今世有周歴魯歴者葢漢初為之其交無遲疾盈縮考日食之法而其上年月已往參差是以漢世通儒未有以歴考此辛卯日食者而王基獨云以歴校之自共和以來當幽王世無周十月夏八月辛卯交㑹欲以此㑹為共和之前其在共和之前則信矣而校之則無術説者或據世以定義謬矣按孔疏以鄭箋為優不必據毛傳定在幽世未審紀年皆夏正無周正也梁虞􅒠推之謂在幽王六年乙丑者是也又劉向條災異封事曰幽厲之際日月薄蝕而無光其詩曰朔月辛卯日有蝕之亦孔之醜學齋佔畢曰注云朔日也而乃謂之朔月葢月朔之反辭猶書之月正元日乃正月元日也此説是矣魏了翁正朔考曰夫十月之交則十一月矣是周人朔月也故曰朔月辛卯正朔日食古人所忌故曰亦孔之醜今据竹書冬十月辛卯朔日有食之與毛傳合無用作朔月解也七年虢人滅焦箋按周本紀武王封神農之後于焦地理志云𢎞農陜縣有焦城故焦國也又按水經注上陽虢仲之所都為南虢其大城中有小城古焦國也按幽王七年虢人滅焦即虢石父之國也呂氏春秋幽王染于虢公鼓蔡公敦是石父名鼓也八年王錫司徒鄭伯多父命箋按鄭語韋昭曰鄭姬姓周厲王之子宣王母弟桓公友封于咸林今京兆鄭邑括地志故鄭城在華州鄭縣西北三里世本桓公居棫林徙拾宋忠曰棫林與拾皆舊鄭地疑棫林即咸林或字相近而譌也桓公名多父或一名友㕛與多字相近故也小雅十月之交曰番惟司徒鄭箋曰幽王時司徒乃鄭桓公友非此篇之所云番也因此知當為厲王時詩殊不審幽王八年始命多父為司徒八年以前猶是番為司徒也王立褒姒之子曰伯服為太子箋按周本紀幽王三年嬖愛褒姒生子伯服太子之母申侯女為后欲廢后并去太子用褒姒為后以其子伯服為太子至是立之九年申侯聘西戎及鄫箋按王符潛夫論申城在宛北序山之下漢地志東海繒縣故繒國禹後鄭語史伯曰申繒西戎方强周室方騷將以縱欲不亦難乎韋昭曰申姜姓幽王前后太子宜臼之舅也繒姒姓申之與國也西戎亦黨于申周衰故戎翟强也時太子宜咎在申申侯之聘西戎及鄫者正以為太子謀耳十年春王及諸侯盟于太室箋按杜預曰太室山在河南陽城縣西南戴延之述征記曰嵩髙山東謂太室西謂少室相去十七里嵩其總名也山海經曰太室之山也秋九月桃杏實箋按開元占經曰僖公即位隕霜不殺草梅李實梅李大樹此草為貴是君不能伐也此云九月桃杏實亦是類也王師伐申箋按晉語曰褒姒生伯服逐太子宜咎而立伯服太子出奔申韋昭曰幽王欲殺宜咎以成伯服求之于申申人弗予遂伐之十一年春正月日暈箋按是年為庚午石氏曰日旁有氣員而周匝名為暈又曰日暈者軍營之象周環匝日無厚薄敵與軍勢齊等若無軍在外天子失御民多反叛洪範五行傳曰周幽之敗也日暈再重中暈赤外暈青一墨盡上下通在日中是嵗有幽王之敗申人鄫人及犬戎入宗周弑王及鄭桓公箋按地理志東海繒縣故繒國禹後詩王風序曰黍離閔宗周也鄭箋宗周鎬京也謂之西周魯語里革對成公曰幽王滅于戲周本紀褒姒不好笑幽王欲其笑萬方故不笑幽王為熢燧大鼓有寇至則舉熢火諸侯悉至而無寇褒姒乃大笑幽王説之為數舉熢火其後不信諸侯益亦不至幽王以虢石父為卿用事國人皆怨石父為人巧佞善諛好利王用之又廢申后去太子也申侯怒與繒西夷犬戎攻幽王幽王舉熢火徵兵兵莫至遂殺幽王驪山下韋昭曰殺幽王驪山戲水桓公死之一統志鄭桓公墓在華州城西三里犬戎殺王子伯服執褒姒以歸箋按周本紀曰虜褒姒盡取周賂而去申侯魯侯許男鄭子立宜臼于申箋按時鎬京殘破宜臼在申因就而立之虢公翰立王子余臣于擕原注是為擕王二王並立箋按晉語曰褒姒有寵生伯服韋昭曰伯服擕王也又按昭二十六年傳幽王用愆厥位擕王奸命諸侯替之而建王嗣杜預曰擕王幽王少子伯服也今据竹書幽王十一年犬戎殺王子伯服虢公翰立王子余臣于擕是為擕王時伯服蚤已見殺而擕王乃余臣也韋杜注以擕王為伯服皆誤武王滅殷嵗在庚寅二十四年嵗在甲寅定鼎洛邑箋按㓕當作伐庚寅葢武王十一年也是年周始伐殷明年十二年辛卯滅殷十五年甲寅始遷鼎洛邑後二年王崩無二十四年又定鼎當作遷鼎成王十八年始如洛邑定鼎至幽王二百五十七年共二百八十一年自武王元年己卯已誤當作辛至幽王庚午二百九十二年箋按金仁山通鑒前編起武王之十三年己卯至幽王之十一年庚午共二百九十二年己卯葢辛卯之譌相距十有二年据竹書是辛卯至庚午二百八十一年也竹書統箋卷九
