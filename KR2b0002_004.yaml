body:
  text: 竹書統箋卷二翰林院檢討徐文靖撰帝堯陶唐氏箋按夏書曰惟彼陶唐有此冀方左𫝊范宣子曰祖自虞以上為陶唐氏孔氏書𫝊曰陶唐帝堯氏都許慎說文解字云陶丘再成也在濟隂顔師古曰陶丘有堯城堯嘗居之後居于唐故號陶唐氏据竹書帝堯八十九年作游宮于陶九十年帝游居于陶則臣瓚謂先居唐後居陶故號陶唐氏也世紀曰帝堯始封于唐中山唐縣是也唐水在西北入唐河後又徙晉陽詩唐風譜曰唐帝堯舊都之地今曰太原晉陽堯始居此後遷河東平陽括地志今晉州所治平陽故城是也又按陸氏釋文曰堯唐帝名史記索隱曰堯諡也放勳名姓伊祁氏一統志保定府完縣西三十里有伊祁山本堯母所居据舜典帝曰格汝舜禹謨帝曰格汝禹堯舜禹宜皆是名雖周書諡法有翼善傳聖曰堯仁義盛明曰舜淵源流通曰禹蓋因上世之名號陳之為諡為後世所取法耳豈君之命臣不呼其名而有豫呼其諡之理母曰慶都生于斗維之野常有黃雲覆其上箋按春秋合誠圗曰堯母慶都生而神異常有黃雲覆上及長觀于三河常有龍隨之一旦龍負圖而至其文要曰亦受天祐箋按亦疑作赤許慎說文曰慶都出觀于河有赤龍負圖而至曰赤龍受天之圖眉八彩鬚髮長七尺二寸箋按春秋元命包曰堯眉八彩是謂通明歷象日月璇璣玉衡面鋭上豐下足履翼宿箋按春秋感精符曰堯翼之精星在南方既而隂風四合赤龍感之孕十四月而生堯于丹陵箋按四書考曰高辛丁亥嵗生堯于丹陵異紀曰堯母慶都孕十四月而生堯其狀如圖及長身長十尺有聖德封于唐箋按漢中山國唐縣也夢攀天而上箋按後漢書和熹鄧后紀后嘗夢捫天占夢者言堯夢攀天而上即此也元年丙子帝即位箋按晦菴朱子曰溫公初作編年起于威烈王後又添至共和後又作稽古録始自上古然共和已上之年已不能推矣獨康節却推至堯元年皇極經世書中可見今考皇極經世書堯元年甲辰又歷甲辰至乙卯在位七十二年以竹書紀年校之堯元年丙子則九年甲申十九年甲午二十九年甲辰堯元年不得為甲辰也居冀箋按夏書曰維彼陶唐有此冀方孔𫝊曰陶唐帝堯氏都禹貢冀州既載孔𫝊曰堯所都也堯即帝位都平陽乃冀州地也故竹書曰居冀命羲和歷象箋按堯典曰乃命羲和欽若昊天歷象日月星辰敬授人時分命羲仲宅嵎夷曰𤾉谷寅賔出日平秩東作日永星鳥以殷仲春申命羲叔宅南交平秩南訛敬致日中星火以正仲夏分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬孔傳曰星四方中星辰日月所㑹歷象其分節賈公彥周禮疏曰楚語堯復育重黎之後重黎之後即羲和也春秋文耀鈎曰唐堯即位羲和立渾儀唐大衍日度議曰古歷日有常度天周為嵗終故係星度于節氣其說似是而非故久而益差虞喜覺之使天為天嵗為嵗乃立差法追其變使五十年退一度何承天以為太過乃倍其年而反不及皇極取二家中數為七十五年蓋近之矣考古史及日官候簿以通法之三十九分半為一嵗之差自帝堯演紀之端在虛一度及今開元甲子却三十六度而乾䇿復初矣日在虛一則鳥火虛昴皆以仲月昏中合于堯典劉炫依大明歷四十五年差一度則冬至在虛危而夏至火已過中矣梁武帝據虞􅒠歷百八十六年差一度則唐虞之際日在斗牛間而冬至昴尚未中以為皆承閏後節前月却使然而此經終始一嵗之事不容頓有四閏故淳風因為之說曰若冬至昴中則夏至秋分星火星虛皆在未正之西若以夏不至火中秋分虛中則冬至昴在巳正之東互有盈縮足以為嵗差證是又不然今以四象分天北正元枵中虛九度東正大火中房二度南正鶉火中七星七度西正大梁中昴七度總晝夜刻以約周天命距中星則春分南正中天秋分北正中天冬至之昏西正在午東十八度夏至之昏東正在午西十八度晷漏使然也冬至日在虛一度則春分昏張一度中秋分虛九度中冬至胃二度中昴距星直午正之東十二度夏至尾十一度中心後星直午正之西十二度四序進退不踰午正間而淳風以為不叶非也五年初巡狩四嶽箋按堯典帝曰咨四嶽𫝊曰四嶽即上羲和之四子分掌四嶽之諸侯舜典五載一巡狩羣后四朝𫝊曰各會朝于方嶽之下凡四處故曰四朝堯舜同道舜攝則然堯又可知王制天子五年一巡狩鄭氏曰五年者虞夏之制也周則十二嵗一巡狩白虎通曰巡者循也狩者牧也王者為天循行以牧人也五年再閏天道大備故五年一巡狩今据竹書五年一巡狩自堯昉也王韶之始興記曰含洭縣有堯山堯巡狩至于此立行臺也是堯巡狩之事也七年有麟箋按春秋斗運樞曰衡星得則麒麟生萬人壽公羊𫝊曰麟者仁獸也有王者則至何休曰狀如麕一角而戴肉設武備而不為害所以為仁也上有聖帝明王天下太平乃至孔叢子曰鉏商獲麟孔子觀之乃歌曰唐虞之世麟鳳遊今非其時來何求麟兮麟兮使我心憂蓋謂此也十二年初治兵箋按爾雅曰出為治兵尚威武也周禮大司馬職中秋教治兵隱五年傳三年而治兵春秋提要曰浩兵習戰也申明軍法以整齊之也莊子曰昔者堯攻叢枝胥敖國為虛厲身為刑戮又曰昔者堯問于舜曰我欲伐宗膾胥敖南面而不釋然其故何也又六韜曰堯與有苗戰于丹水之陽此堯之治兵蓋有以用之也十六年渠搜氏來賔箋按禹貢織皮昆侖析支渠搜武帝紀北發渠搜晉灼曰地理志朔方有渠搜縣臣瓚曰禹貢渠搜在雍州西此渠搜在朔方又按揚雄曰大漢左東海右渠搜前番禺後陶塗東南一尉西北一候注㑹稽東部都尉燉煌玉門關候則渠搜在西為右不在北凉土異物志古渠搜國在大宛北界隋書西域𫝊撥汗國都葱嶺之西五百餘里古渠搜國也東去疏勒千里去瓜州五千五百里大業中遣使朝貢則禹貢時之渠搜不在朔方陸氏禹貢釋文亦引漢志在朔方非也十九年命共工治河箋按堯典帝曰疇咨若豫來歡兜曰共工方鳩僝功鄭氏曰共工水官名馬融曰僝具也据竹書共工治河錫命在堯十九年改命伯鯀治河在堯六十一年則此四十餘年中皆共工治河而靜言庸違象恭滔天莊子釋文曰堯六十四年流共工于幽都則共工之流抑已晚矣乃既流之後依然怙惡不悛左氏傳謂其靖言庸回服讒搜惡天下之民謂之窮竒山海經有禹攻共工國山周左史戎夫記曰昔有共工自賢自以無臣久空大官下官交亂民無所附唐氏伐之共工以亡荀子曰禹伐共工是也今順天府密雲縣東北五十里有共城蓋舜流共工處也二十九年春僬僥氏來朝貢沒羽箋按魯語仲尼曰僬僥氏三尺短之至也山海經曰有小人名曰僬僥之國幾姓馬融廣成頌納僬僥之珍羽庾信哀江南賦西賮浮玉南琛沒羽謂此也四十二年景星見于翼箋按孫氏瑞應書曰景星者天暒也狀如半月生于晦朔助月為明王者不私人則見星𫝊曰翼二十二星二十度秒在太微垣南史記律書曰翼者言萬物皆有羽翼也春秋感精符曰堯翼之精故是時景星見于翼也五十年帝遊于首山乘素車𤣥駒箋按沈約宋書曰堯升首山遵河渚有五老遊焉宣二年𫝊曰初宣子田于首山杜注首山在河東蒲坂縣東南即是山也後世因名為堯山地理志蒲坂有堯山也五帝紀帝放勳富而不驕貴而不舒彤車乘白馬此云乘素車元駒亦是類也五十三年帝祭于洛箋按通鑑注曰洛水源出西安府洛南縣冢嶺山東流經盧氏永寧宜陽洛陽偃師鞏等縣入河尚書中候曰帝堯修壇河洛昧爽禮備榮光出河休氣四塞又東沉璧于洛日稷赤光起元龜負書背甲赤文成字遂禪于舜五十八年帝使后稷放帝子朱于丹水箋按帝王世紀曰堯娶散宜氏女曰女皇生丹朱荆州記曰丹水縣在丹州堯子朱之所封也漢志曰陶唐氏讓天下于虞使子朱處于丹淵為諸侯尚書益稷篇禹曰無若丹朱傲惟慢遊是好傲虐是作罔晝夜額額罔水行舟朋淫于家用殄厥世此丹朱之所以見放也括地志丹朱故城在鄧州內鄉縣西南百三十里賈公彥周官序曰初堯天官為稷据此則稷為天官故放帝子朱命之六十一年命崇伯鯀治河箋按史記索隱曰鯀帝顓頊之子字熙堯典曰帝曰咨四嶽湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨有能俾又僉曰於鯀哉帝曰吁咈哉方命圮族嶽曰异哉試可乃已帝曰往欽哉孔𫝊曰堯知其性狠戾圮族未明其所能而據衆言可試故遂用之何孟春曰堯之用鯀九載之民命亦可試乎宋初試䇿以發問而不能答豫曰後漢鄭興𫝊有言堯知鯀不可用而用之者是屈己之明因人之心也又張華博物志曰昔鯀莖注洪水而枚占大明曰不吉有初無後蓋謂此也今按竹書紀年顓頊三十載産鯀似鯀為顓帝子矣然産鯀之後四十八年而顓帝陟又歷高辛氏六十三年摯九年堯即位六十一年始命崇伯鯀治河計前後相距一百八十一年而堯始命之治河無是理矣漢書律歷志顓頊五代而生鯀是為得之又世紀鯀封崇伯國在秦晉之間王伯厚曰趙穿侵崇是也寰宇記垞城臨泗水秦地志云垞城古崇國未知執是六十九年黜崇伯鯀箋按周語太子晉曰其在有虞有密伯鯀播其滔心稱遂共工之過堯用殛之于羽山連山易曰有崇伯鯀伏于羽山之野又按一統志羽山在淮安府贑榆縣西北八十里即舜殛鯀處山下有羽潭左𫝊鯀為黃能入于羽淵即此孔安國舜典𫝊曰羽山東裔在海中今登州府蓬萊縣有羽山寰宇記云在縣東十五里即殛鯀處有鯀城在縣南六十里七十年春正月帝使四嶽錫虞舜命箋按堯典曰帝曰咨四嶽朕在位七十載汝能庸命㢲朕位嶽曰否德忝帝位曰明明揚側陋師錫帝曰有鰥在下曰虞舜帝曰俞豫聞五帝本紀曰堯立七十年得舜是矣帝在位七十年景星出翼鳳凰在庭箋按風俗通曰景星者太星也月或不見景星常見可以夜作有益于人民也尚書中候握河紀堯即位七十年鳳凰止庭伯禹拜曰昔帝軒提象鳳凰巢阿閣又荀子解蔽篇詩曰鳳凰秋秋其翼若干其鳴若簫有鳳有鳳樂帝之心注曰逸詩也帝蓋謂堯也朱草生箋按續博物志朱草狀如桑栽長三四尺枝葉皆丹汁如血朔望生落如蓂莢周而復始嘉禾秀箋按春秋感精符曰德淪于地則嘉禾生廣志曰堯時嘉禾生七莖連三十五穗甘露潤醴泉出箋按列星圖曰天乳一星在氐北主甘露占明潤則甘露降尚書中候曰帝堯即政七十載甘露潤澤醴泉出山日月如合璧五星如聨珠箋按尚書中候曰天地開闢甲子冬至日月若懸璧五星若編珠易川靈圖曰至德之萌日月若連璧五星若貫珠厨中自生肉其薄如箑搖動則風生食物寒而不臭名曰箑脯箋按脯一作蒲白虎通曰孝道至則箑蒲出庖廚不搖自扇于飲食清凉助供養也宋書符瑞志箑脯一名倚扇帝王世紀作箑脯又有草夾階而生月朔始生一莢月半而生十五莢十六日以後日落一莢及晦而盡月小則一莢焦而不落名曰蓂莢一曰歷莢箋按田俅子曰堯為天子蓂莢生于庭為帝成歷洪水既平歸功于舜將以天下禪之乃潔齊修壇場于河洛擇良日率舜等升首山遵河渚有五老遊焉蓋五星之精也相謂曰河圗將來告帝期知我者重瞳黃姚箋按史記正義曰舜生于姚虛故姓姚目重瞳子故曰重華五老因飛為流星上入昴箋按論語比考䜟仲尼曰吾聞帝堯率舜等升首山觀河渚乃有五老游渚五老曰河圖將浮云云視五老飛為流星上入昴注曰入昴宿則復為星二月辛丑昧明禮備至于日昃榮光出河休氣四塞箋按尚書中候曰帝堯即政七十載修壇河洛仲月辛日昧明禮備榮光出河休氣四塞注曰榮光五色休美也按在帝堯七十載即是年事也白雲起回風搖箋按尚書中候曰堯沉璧于河白雲起回風搖落乃有龍馬銜甲赤文緑色緣壇而上箋按宋志作臨壇而上吐甲圖而去甲似龜背廣九尺其圖以白玉為撿箋按書卷之袠簽謂之曰撿漢武紀金泥玉撿注撿一曰燕尾今世書帖簽也赤土為口泥以黃金約以青繩箋按河圖曰舜以太尉即位與三公臨觀于河黃龍五采負圖出置舜前黃玉柙白玉撿黃金繩黃芝泥文曰黃帝符璽文曰闓色授帝舜言虞夏當受天命箋按宋志曰闓色授帝舜言虞夏殷周秦漢當受天命比此本多殷周秦漢四字知此為沈約附注非竹書本文也帝乃寫其言藏于東序後二年二月仲辛率羣臣沉璧于洛禮畢退俟至于下昃赤光起元龜負書而出背甲赤文成字止于壇箋按尚書中候曰堯沉璧于洛元龜負書出背甲赤文朱字上壇場沉璧于河黑龜出赤文題其書言當禪舜遂讓舜箋按帝王世紀曰堯率羣臣刻璧為書東沉洛水言天命當禪舜之意今中候運衡之篇是也七十一年帝命二女嬪于虞箋按堯典釐降二女于媯汭嬪于虞孔疏曰媯水在河東虞鄉縣歷山西西流至蒲坂南入河舜居其旁周武王賜陳胡公之姓為媯為舜居媯水故也舜仕堯朝不家于京師而令二女歸虞者蓋舜以大孝示法使妻歸事于其親以帝之賢女事頑嚚舅姑美其能行婦道故云嬪于虞又按列女𫝊二女長曰娥皇次曰女英世本作女瑩大戴禮作女匽七十三年春正月舜受終于文祖箋按舜典曰正月上日受終于文祖孔𫝊曰上日朔日也終謂堯終帝位之事文祖者堯文德之祖廟史記索隱曰尚書帝命驗曰五府五帝之廟蒼曰靈府赤曰文祖黃曰神斗白曰顯紀黑曰𤣥矩唐虞謂之五府夏謂之世室殷謂之重屋周謂之明堂皆祀五帝之所也七十四年虞舜初巡狩四嶽箋按尚書大𫝊曰維元祀巡狩四嶽八伯樂正定樂名元祀代泰山貢兩伯之樂焉東嶽陽伯之樂舞侏離其歌聲比余謡名曰晳陽羲伯之樂舞鼚哉其歌聲比大謡名曰南陽中祀大交霍山貢兩伯之樂焉夏伯之樂舞謾或其歌聲比中謡名曰初慮羲伯之樂舞將陽其歌聲比大謡名曰朱于秋祀柳榖華山貢兩伯之樂焉秋伯之樂舞蔡俶其歌聲比小謡名曰零落和伯之樂舞𤣥鶴其歌聲比中謡名曰歸來冬祀幽都𢎞山貢兩伯之樂焉冬伯之樂舞齊落歌曰縵縵并論八音四㑹歸格于禰祖用特按元祀春之首祀非元年之謂文中子曰舜一嵗而巡五嶽國不費而民不勞何也兵衛少而徵求寡也七十五年司空禹治河箋按舜典曰僉曰伯禹作司空孔𫝊曰禹代鯀為崇伯入為天子司空鄭注曰初堯冬官為共工舜舉禹治水堯知其有聖德必成功故改命司空以官名寵異之非常官也禹貢導河積石至于龍門東至于華隂東至于底柱又東至于孟津東過洛汭至于大伾北過降水至于大陸又北播為九河同為逆河入于海宋易襏禹貢疆理考曰河自廓州積石軍北東北流一百五十里至化成縣南八十步東流一百四十里至鄯州龍支縣西南六十里積石山在縣西九十八里又三百九十里至河州枹罕縣南五十里積石在縣西北七十里一名唐述山今人目龍支縣山為大積石此山名小積石又三百里至蘭州五泉縣北二十里東北流三百八十里至㑹州之㑹寧縣西北有黃河堰又五百三十里至靈州之回樂縣枕黃河後魏刁雍開富平艾山舊渠通河溉田之地又經靈武縣又一千餘里至西受降城東流一百八十里至天德軍又二百里至中受降城又三百里至東受降城三城皆唐張仁願所築並在河岸以遏突厥河轉南流三百五十里至朔方之鄯陽縣西三十里又三百七十四里至嵐州之合河縣西二里又七十里至石州之臨泉縣北二十里又經定胡縣西二百步孟門關在縣西一百步又經平夷縣五十里又四百二十里至隰州之永和縣六十里又經大寧縣又二百里至慈州之吉昌縣北六十里又經文城縣孟門山在縣西南三十六里河中有山如槽水流懸注七十餘尺俗名石槽與龍門相對即龍門之上口為河之巨厄又一百八十里至河中府之龍門縣北二十五里乃龍門口河自積石至龍門計四千七百二十三里又二百里至陜州之西北對河為華州華隂縣河經太華之北故曰華隂河至此東流經陜州之芮城縣又五十里至陜石縣有底柱山在河中又三百五十里至河南府王屋縣南五十里又至河陽縣後為孟州南城四面臨河謂之富平津古謂之孟津東百里至今鞏縣有五社渡洛水入河謂之洛口亦名什谷張儀所謂下兵三川塞什谷之口者也又經汜水縣本漢成臯縣一名虎牢三百九十里至衛州汲縣南五十里謂之棘津亦謂之石濟津東北流至黎陽縣大伾山在縣南七里俗號為黎山二百五十里至相州臨河縣南五里又八十里至澶州頓邱縣南二十五里北流一百二十里至魏州之貴鄉縣大河故瀆在縣西三里俗云王莽河東北流二百一十里至貝州經城縣枯河在縣東十里又二百一十里至冀州南宫縣洚水故瀆在縣東南六里又北二三百里至趙州之隆平舊為大陸縣孔𫝊曰大陸澤名北分為九河以殺其溢同合為一大河名逆河而入海也董鼎曰天下大勢西北髙而東南下九水惟河為大水患惟河為急河始入于雍而經于冀則冀當河之下流而兗又其下流之入海處所以禹之功役自冀而兗則疏濟之下流也自青而徐則疏淮之下流也自揚而荆則疏江漢之下流也河濟淮江漢五水之下流既通水患平已十之七八矣然上流不濬則猶有壅塞於是自荆而豫以濬伊洛之源自豫而梁以濬江漢之源自梁而雍以濬河渭之源從北而東從東而南從南而西從西而又北治水之功畢矣七十六年司空伐曹魏之戎克之箋按古今人表陸終妃女潰生六子五曰曹姓韋昭曰曹祝融之後左𫝊詹桓伯曰魏吾西土也盟㑹圖曰魏嬴姓吕氏春秋曰堯戰于丹水之浦以服南蠻舜却苗民更易其俗禹攻曹魏屈鷔以行其教高誘曰屈鶩不知出何書也八十六年司空入覲贄用𤣥圭箋按尚書璇璣鈐曰𤣥圭出刻曰延喜之玉注曰禹功既成天佩以𤣥圭也是時𤣥圭出而禹得之因以為贄禹貢曰禹錫𤣥圭告厥成功爾雅曰錫與也則禹錫猶堯典師錫之錫謂入覲而以圭與帝為贄也孔𫝊曰禹功盡加于四海故堯賜𤣥圭以彰顯之則是當言錫禹矣何言禹錫竹書稱贄用𤣥圭其義自明白虎通曰臣見君所以有贄何贄者質也質己之誠致己之悃幅也八十七年初建十有二州箋按周公職録曰黃帝受命風后受圖割地布九州祭法共工氏之霸九州也其子曰后土能平九州則自古止有九州無十二州尚書大𫝊云兆十有二州注兆域也為營域以祭十有二州之分星也舜典肇十有二州孔𫝊曰禹治水之後舜分冀州為幽州并州分青州為營州始置十有二州陸氏釋文曰十有二州謂冀兗青徐荆揚豫梁雍并幽營也時舜以冀青地廣始分衛水西北為并州燕以北為幽州青州東北跨海為營州故竹書謂初建十有二州也世史類編曰堯甲子八十一載分十二州封十二山濬川舜攝政九載也据竹書在堯八十七載舜受終之五載也八十九年作游宫于陶箋按史記曰堯作游成陽漢志曰濟隂定陶詩風曹國也昔堯作游成陽舜漁雷澤故其民猶有先王之遺風如淳曰作起也成陽在定陶師古曰作游者言為宫室游止之處也九十年帝游居于陶箋按郡國志濟隂定陶縣古陶堯所居又臣瓚注漢書曰堯初居唐後居陶故曰陶唐顔師古非之以為堯嘗居陶後居唐今据竹書堯九十載始居陶瓚說是也九十七年司空巡十有二州箋按堯即位五年初巡狩四嶽七十四年虞舜初巡狩四嶽是以舜代堯巡也堯八十七年初建十有二州後十年司空巡十二州是以禹代舜巡也舜典肇十有二州以舜攝位時事也故係之舜漢書谷永𫝊堯遭洪水之災天下分絶為十二州制逺之道微以其本堯時事也故係之堯其說與竹書同一百年帝陟于陶箋按堯元丙子終乙卯凡一百年異苑晉太康三年冬大寒南州人見二鶴語曰今嵗不減堯崩年吕氏春秋曰堯葬榖林帝王世紀曰堯在位九十八年年一百一十八嵗乃殂葬于濟隂之成陽西北四十里是為榖林堯娶散宜氏女曰女皇生丹朱又有庶子九人皆不肖故以天下命舜今据竹書堯在位百年世紀少二年也帝子丹朱避舜于房陵舜讓不克箋按地理志房陵縣屬漢中郡顔師古曰今謂之房州此丹朱所避也附注云房陵是据世本舜封丹朱于房一統志房縣在鄖陽府城西南三百一十里舜封堯子丹朱于房即此朱遂封于房為虞賔三年舜即天子之位箋按春秋為房子國後漢獻帝紀贊曰永作虞賔注虞賔謂舜以堯子丹朱為賔尚書曰虞賔在位是也帝舜有虞氏箋按帝王世紀曰舜嬪于虞因以為虞氏今河東太陽西山上虞城是母曰握登見大虹意感而生舜于姚虛箋按帝王世紀曰舜姚姓也其先出自顓頊顓頊生窮蟬窮蟬子敬康敬康生勾芒勾芒子橋牛橋牛生瞽瞍瞽瞍妻曰握登見大虹意感而生舜于姚虛故姓姚氏字都君括地志姚虛在濮州雷澤縣東十三里目重瞳子故名重華箋按春秋孔演圗曰舜重瞳子是謂重明上應攝提以象三光又後漢郅惲𫝊曰步重華于南野太子賢注重華舜字也龍顔大口黑色箋按孝經援神契曰舜龍顔重瞳大口手握褒身長六尺一寸舜父母憎舜使其塗廩自下焚之舜服鳥工衣服飛去箋按通史曰瞽瞍使舜滌廩舜告堯二女女曰時其焚汝鵲汝衣裳鳥工往舜既登廪得免去也又使浚井自上填之以石舜服龍工衣自旁而出箋按通史曰舜穿井又告二女女曰去汝裳衣龍工往入井瞽瞍與象下上實井舜從他井出去也郭璞山海經注曰二女靈達尚能以鳥工龍裳救井廪之難又南史江斆辭婚表曰何瑀闕龍工之姿而捐軀于深井蓋謂此也耕于歷箋按史記舜耕于歷山漁于雷澤陶于河濵作什器于壽丘就時于負夏郡國志河東蒲坂有雷首山亦名歷山舜所耕處括地志歷山南有舜井夢眉長與髮等遂登庸箋按世紀曰堯見舜于二宫南面而問政乃試以五典舜有大功二十故夢眉與髮等堯乃賜舜以昭華之玉老而命舜代己攝政元年己未帝即位箋按舜元年即位世史以為甲申袁史以為丙辰紀政綱目以為丙戌惟竹書以為己未蓋帝堯崩于乙卯舜避朱南河雖三年喪畢不遽即位至四年己未乃即位者孟子所謂然後之中國踐天子位焉又按帝王世紀曰舜攝政二十八年而堯崩三年喪畢舜年八十一以仲冬甲子月次于畢始即真以土承火色尚黃以正月元日格于文祖年百嵗也据孔安國注通服堯喪三年在位共三十年之數凡壽一百一十一嵗後漢書襄楷𫝊注舜年一百一十二嵗則世紀言百嵗者非也居冀箋按舜都蒲坂今平陽府蒲州也亦禹貢冀州之地故曰居冀作大韶之樂箋按尚書大𫝊虞夏𫝊曰維五紀奏鍾石論人聲及乃鳥獸咸變于前秋養耆老而春食孤子乃勃然韶樂興于大麓之野執事還歸二年􅨳然作大唐之歌此蓋原大韶所由作也五紀者十二年為一紀舜三十徵庸三十在位是五紀也即帝位蓂莢生于階鳳凰巢于庭擊石拊石以歌九韶百獸率舞景星出于房箋按石氏曰房四星為天子明堂嵗始布政之堂也地出乘黃之馬箋按管子小匡篇昔人之受命者河出圗洛出書地出乘黃房𤣥齡注曰乘黃神馬也又周書王㑹解云白民乘黃乘黃似騏背有兩角三年命臯陶作刑箋按舜典曰帝曰臯陶汝作士五刑有服五服三就五流有宅五宅三居惟明克允王肅曰惟明其罪能使之信服是施信于彼也九年西王母來朝箋按地理志金城臨羌縣西北至塞外有西王母石室仙海鹽池西有須抵池有弱水昆侖山祠大戴記曰舜以天德嗣堯西王母獻其白琯世本曰舜時西王母獻白環及珮雒書靈准聽曰舜受終西王母獻益地圗歐陽詢曰西王母得益地之圗來獻西王母來朝獻白環玉玦箋按瑞應圖曰黃帝時西王母獻白環舜時又獻之晉志曰舜時西王母獻朝華之琯以玉為之及漢章帝時零陵文學奚景于泠道舜祠下得白玉琯一枚咸以為舜時西王母所獻云意是時王母以玉琯獻舜舜或賜象鼻亭去泠道不逺故于舜祠下得此十四年卿雲見箋按晉天文志曰慶雲亦曰景雲即卿雲也帝舜卿雲之歌曰卿雲爛兮糾縵縵兮糾聚也言慶雲叢聚也後世不知多有訛糾為禮者宋陳騤文則引卿雲之歌作禮縵縵沈約宋書符瑞志亦作禮字皆誤以糾為禮也惟吳淑雲賦或申歌于虞舜注引尚書大𫝊曰糾縵縵兮止此作糾可證書傳之誤命禹代虞事箋按帝王世紀曰禹在位七十四年舜始薦之于天舜在位十有四年奏鐘石笙管未罷而天大靁雨疾風登屋拔木箋按登誤宋志作發桴鼓播地鐘磬亂行舞人頓伏樂正狂走舜乃擁堵持衡而笑箋按堵一本作磬宋志作璿擁璿持衡据周禮凡懸鐘磬之全為堵半為肆謂鐘磬各八共十六枚而在一簴則此作堵者是也曰明哉天下非一人之天下也亦乃見于鐘石笙管乎乃薦禹于天使行天子事于時和氣普應慶雲興焉若烟非烟若雲非雲郁郁紛紛蕭索輪囷百工相和而歌卿雲帝乃倡之曰卿雲爛兮禮縵縵兮箋按尚書大傳冬伯之樂舞齊落歌曰縵縵不知即此否禮亦糾訛日月光華旦復旦兮羣臣咸進稽首曰明明上天爛然星陳日月光華𢎞豫一人帝乃再歌曰日月有常星辰有行四時從經萬姓允誠於豫論樂配天之靈遷于聖賢莫不咸聽鼚乎鼓之軒乎舞之箋按大𫝊羲伯之樂舞鼚哉精華以竭褰裳去之於是八風循通箋按循宋志作修慶雲叢聚蟠龍奮迅于其藏鮫魚踊躍于其淵龜鱉咸出其穴遷虞而事夏舜乃設壇于河依堯故事至于下昃榮光休氣至黃龍負圗長三十二尺廣九尺出于壇畔赤文緑錯其文言當禪禹箋按春秋運斗樞曰舜為天子東巡臨觀黃龍五采負圗出置舜前十五年帝命夏后有事于太室箋按水經注曰河南陽翟縣有夏亭城夏禹始封于此為夏國是禹以司空受封于夏故至是改稱為夏后也山海經曰半石山東五十里曰少室山又東三十里曰太室山郭注曰即中嶽嵩高山也孔氏書疏曰有事祭也禮器曰齊人將有事于泰山是亦以有事為祭也十七年春二月入學初用萬箋按夏小正曰二月丁亥萬舞入學丁亥者吉日也萬舞者干戚舞也入學也者大學也詩簡兮簡兮方將萬舞毛𫝊曰以干羽為萬舞是萬舞兼用干羽乃夏制也仲尼燕居曰夏籥序興陳氏曰夏籥禹大夏之籥曲以籥吹之也据此則是所吹者籥而所舞者干羽也虞書舞干羽于兩階亦兼干羽而言也左𫝊隱五年考仲子之宫將萬焉公問羽數于衆仲對曰天子用八諸侯用六是萬舞不専用干兼用羽也孔氏詩疏曰萬舞名也萬舞為干舞不兼羽籥以春秋云萬入去籥别文公羊𫝊曰籥者何籥舞萬者何干舞言干則有戚矣禮記曰朱干玉戚冕而舞大武言籥則有羽矣籥師曰教國子舞羽吹籥是干羽之異也然籥可吹不可舞既云文舞即當舞羽何又舍羽而舞籥是則公羊之誤也樂師舞羽吹籥蓋教國子以舞羽不言舞干羽者省文也隱公因萬而専問羽豈萬舞不用干乎又萬入去籥乃是干羽既入則止籥不吹故云去籥若萬不用籥已無籥矣何待去乎二十五年息慎氏來朝貢弓矢箋按鄭康成曰息慎或謂之肅慎東北夷山海經大荒之中有山名曰不咸有肅慎氏之國郭璞曰今肅慎國去襄平三千餘里其人皆工射弓長四尺徑彊箭以楛為之長尺五寸青石為鏑二十九年帝命子義均封于商箋按世紀曰娥皇無子女英生商均据竹書則本名義均以封于商曰商均呂氏春秋去私篇舜有子九人高誘曰國語云舜有商均此曰九子不知出何書也又按山海經曰帝俊生季釐是與均為二也其他七人無聞焉三十年葬后育于渭附注曰后育娥皇也箋按地理志扶風陳倉縣有黃帝孫舜妻育冢祠蓋即舜后育冢也漢志注誤育為肓酈元渭水注引此亦作舜妻肓冡千數百年無辨其非者不有竹書何由知其為育哉楚辭湘君湘夫人君不行兮夷由帝子降兮北渚朱子集注曰君謂湘君堯之長女娥皇為舜正妃者也帝子謂湘夫人堯之次女女英舜次妃也今据竹書云堯七十一年二女嬪虞其後三十年堯崩舜在位又五十年崩于蒼梧之野計二女二十而嫁已並百嵗何有百嵗之妃后從行巡省溺死湘江而世仍稱之為帝子乎况檀弓有曰舜崩于蒼梧之野蓋三妃未之從其不得溺于湘江明矣今竹書載帝舜三十年葬后育于渭班志載舜妻育冢劉向𫝊舜葬蒼梧二妃不從皆與竹書合則從行而溺于湘江者又何人乎王逸注以娥皇女英墮湘水溺焉其貽誤後學為不少矣三十二年帝命夏后總師遂陟方嶽箋按大禹謨帝曰格汝禹朕宅帝位三十有三載髦期倦于勤汝惟不怠總朕師孔𫝊曰稱總我衆欲使攝至于遂陟方嶽者正以見禹之不怠遍歷四方以朝諸侯也若謂付托得人舜遂可巡陟方嶽又何謂倦于勤乎周書立政曰以陟禹之迹方行天下至于海表罔有不服則陟方屬禹可知爾雅釋詁格陟躋登升也文選吳都賦注劉淵林曰陟升也方道也則是方嶽者四方之嶽如東方岱西方華南方衡之類陟則升于四方之嶽也三十三年春正月夏后受命于神宗箋按大禹謨曰正月朔日受命于神宗率百官若帝之初孔傳曰受舜終事之命神宗文祖之宗廟言神尊之尚書帝命驗帝者承天立五府赤曰文祖黃曰神斗則舜受終于文祖即赤府也禹受終于神宗即黃府也神宗蓋神斗與遂復九州箋按襄四年𫝊虞人之針曰芒芒禹跡畫為九州禹貢冀州既載濟河惟兖州海岱惟青州海岱及淮惟徐州淮海惟揚州荆及衡陽惟荆州荆河惟豫州華陽黑水惟梁州黑水西河惟雍州王伯厚地理通釋曰孔氏云禹治水之後舜分冀為幽并分青為營馬氏云禹平水土置九州舜以冀州之北廣大分置并州燕齊遼逺分燕為幽齊為營漢地理志云堯遭洪水天下分絶為十二州禹平水土更置九州列五服與孔馬之說異愚謂舜典言肇十有二州咨十有二牧而後命禹平水土當以漢志為正今据竹書堯七十五年司空禹治河八十六年司空入覲贄用𤣥圭八十七年初建十有二州九十七年司空巡十有二州舜三十三年夏后受命于神宗遂復九州則是禹平水土舜始分十有二州尚書封十有二山濬川川但言濬則是水土之既平可知若禹未治水之前洪水滔天懷山襄陵何從而封山濬川此當以孔氏之傳為正若馬氏禹平水土置九州舜始分十有二州則謬矣周公職録黃帝割地布九州杜佑通典顓頊置九州世紀言九州顓頊所建帝嚳受之則堯嗣位時本是九州至舜分十二州故曰肇禹受命遂復九州以前原有九州故曰復又按世紀云禹平水土還為九州今禹貢是也其時九州之地凡二千四百三十萬八千二十四頃定墾者九百一十萬八千二十四頃不墾者一千五百萬二千頃四海之內東西二萬八千里南北二萬六千里出水者八千里受水者八千里名山五千三百五十徑六萬四千五十六里出銅之山四百六十七出鐵之山三千六百九以供財用三十五年帝命夏后征有苗箋按大禹謨帝曰咨禹惟是有苗弗率汝徂征禹乃㑹羣后誓于師曰蠢兹有苗昏迷不恭侮慢自賢反道敗德肆豫以爾衆士奉辭代罪三旬苗民逆命益贊于禹曰至諴感神矧兹有苗禹拜昌言班師振旅帝乃誕敷文德舞干羽于兩階七旬有苗格孔𫝊曰三苗國名縉雲氏之後為諸侯號叨餮左𫝊文十八年史克曰縉雲氏有不才子貪于飲食胃于貨賄天下之民以比三凶謂之叨餮山海經苗民釐姓魏䇿吳起曰昔者三苗之居左有彭蠡之波右有洞庭之水汶山在其南而衡山在其北恃此險也有苗氏來朝箋按夏本紀三危既度三苗大序索隱曰鄭氏引河圗及地說云三危山在鳥鼠西南與㞶山相連後漢郡國志隴西首陽縣鳥鼠同穴山渭水出劉昭引地道記曰有三危山三苗所處水經注曰渭水東歷大利又東南流苗谷水注之三苗所居故有苗谷通鑑前編堯七十六載竄三苗于三危當猶是竄之隴西之地舜三十五載有苗氏來朝其在于羣后之例可知山海經苗民釐姓顓頊後昭九年𫝊曰允姓之姦居于瓜州杜氏曰允姓之祖與三苗俱放于三危瓜州今燉煌也穆天子𫝊曰乙丑天子東征送天子至于長沙之山伯夭曰重氏之先三苗氏之處郭璞曰三苗舜所竄于三危者是則長沙之山即後漢書注三危山在沙州東南者也韓非子曰三苗有成駒亡國之臣也其逺竄于瓜沙者蓋此輩耳四十二年𤣥都氏來朝貢寶玉箋按汲冢周書曰昔𤣥都賢鬼道廢人事天謀臣不用龜䇿是從神巫用國哲士在外𤣥都以亡又按春秋定八年榖梁𫝊注寶玉者封圭也范寧曰始封之圭也据書叙湯伐三朡俘厥寶玉則美玉皆謂之寶玉也四十七年冬隕霜不殺草木箋按春秋僖三十三年十有二月隕霜不殺草五行𫝊曰劉歆以為草妖也四十九年帝居于鳴條箋按郡國志河東安邑帝王世紀曰縣西有鳴條陌括地志高涯原在安邑縣北其南坂口即古鳴條陌按舜都蒲坂距鳴條二百餘里舜居鳴條亦如堯居城陽也又困學記聞以舜卒鳴條在今陳留之平丘五十年帝陟箋按舜典曰舜五十載陟方乃死蔡𫝊曰陟方猶言升遐也韓昌黎曰竹書紀年帝王之沒皆曰陟陟升也謂升天也書曰殷禮陟配天言以道終其德協天也故書紀舜之末曰陟其下言方乃死者所以釋陟為死也地之勢東南下如言舜巡狩而死宜言下方不得言陟方也按此得之但不當以陟為絶句耳方猶云徂乎方之方陟方而死猶云徂落而死也史記言舜巡守崩于蒼梧之野孟子言舜卒于鳴條未知孰是今据竹書四十九年舜居于鳴條五十年帝陟則是與孟子合也書所言陟方蓋鳴條有陟方之館耳竹書舜三十三年命夏后總師遂陟方嶽可謂遂徂落于四嶽乎宋顔延之祭虞帝文百齡厭世萬里陟方後魏溫子升舜廟碑陟方之駕遂往蒼梧之窆不歸則陟方非徂落之謂可知矣義均封于商是謂商均箋按史記曹相國世家攻下邑以西至虞正義曰虞城縣在宋州北五十里古虞國商均所封一統志虞城縣在歸德府城東北六十里當時并商丘皆在國內故曰商也后育娥皇也箋按地理志扶風陳倉縣有舜妻育冡竹書后育葬于渭是也鳴條有蒼梧之山帝崩遂葬焉今海州箋按帝王世紀曰舜薦禹于天使禹攝政有苗氏叛南征崩于鳴條殯以瓦棺葬于蒼梧九疑山之陽是為零陵方輿紀勝曰蒼梧山山海經注即九疑也在今永州府道州寧逺縣南六十里湘中記曰九山相似行者疑惑故曰九疑据世紀則舜以征有苗道死何三十五年命夏后征有苗至十五年後舜年百有十嵗轉又自征有苗何舜之不憚煩耶司馬溫公詩虞舜在倦勤薦禹為天子豈有復南巡迢迢渡湘水蓋以此也王應麟困學紀聞曰世𫝊舜葬蒼梧之野孟子以為卒于鳴條吕氏春秋舜葬于紀蒼梧山在海州界近莒之紀城鳴條在陳留之平丘今考九域志海州東海縣有蒼梧山與休文附注正同則舜不當逺葬于零陵庶為得之竹書統箋卷二
