body:
  text: 竹書統箋卷七翰林院檢討徐文靖撰周武王名發初髙辛氏之世妃曰薑嫄助祭郊禖見大人迹履之當時歆如有人道感己遂有身而生男以為不祥箋按元命包曰薑嫄遊閟宮地扶桑履大人迹生稷棄之厄巷牛羊避而不踐又送之山林之中會伐林者箋按宋志者下有薦覆之三字又取而置寒冰上大鳥以一翼藉覆之薑嫄以為異乃收養焉名之曰棄枝頤有異相長為堯稷官有功於民箋按詩大雅厥初生民時維薑嫄鄭箋曰薑姓者炎帝之後有女名嫄當堯之時為髙辛氏之世妃禋祀上帝於髙禖以祓除其無子之疾時則有大人之迹薑嫄履之歆歆如有人道感己也於是遂有身後生子而名之曰棄后稷之孫曰公劉有德諸侯皆以天子之禮待之箋按大雅篤公劉鄭箋曰后稷之曾孫也吳越春秋曰堯拜棄為農師封之台號為后稷姓姬氏后稷卒子不窋立遭夏氏世衰失官奔戎狄之間其孫公劉避夏桀於戎狄變易風俗民化其政則公劉去不窋凡四五百年矣周本紀以公劉為鞠之子不窋之孫止三代殊失考也初黃帝之世讖言曰西北為王期在甲子昌制命發行誅旦行道及公劉之後十三世而生季歷季歷之十年飛龍盈於牧之野此蓋聖人在下位將起之符也季歷之妃曰大任夢長人感己􅘞于豕牢而生昌是為周文王箋按晉語曰太任震文王不變少溲於豕牢而得文王不加病馬龍顔虎肩身長十尺胸有四乳箋按禮别名記曰文王四乳是謂至仁天下所歸百姓所親太王曰吾世當有興者其在昌乎季歷之兄曰太伯知天命在昌適越終身不返弟仲雍從之箋按史記正義曰太伯居梅里在常州無錫東南六十里故季歷為嗣以及昌昌為西伯作邑于豐文王之妃曰太姒夢商庭生棘太子發植梓樹于闕間化為松柏棫柞以告文王文王幣率羣臣與發並拜吉夢箋按尚書中候曰文王廢伯邑考立發為太子又張華博物志曰太姒夢見商庭生棘乃小子發取周庭梓樹樹之于闕間梓化為松柏棫柞覺驚以告文王文王曰慎勿言冬日之陽夏日之隂不召而萬物自來汲冢周書曰太姒夢周梓化為松季秋之甲子赤雀銜書及豐置于昌戶箋按置志作止昌拜稽首受之其文要曰姬昌蒼帝子亡殷者紂箋按尚書中候曰季秋赤雀銜丹書入豐止于昌户昌拜稽首受最曰姬昌蒼帝子注曰最要者也王將畋史編卜之箋按古今人表作史扁師古音編曰將大獲非熊非羆天遣太師以佐昌箋按宋志作天遺汝師臣太祖史疇為禹卜畋得臯陶其兆類此箋按漢書律歷志三代既沒史官喪紀疇人子弟分散李竒曰疇人同類之人俱明歷者如淳曰家業世世相承為疇師古曰如説是也今據周文王時史編曰臣太祖史疇為禹卜畋得臯陶其兆類此則是史疇之子孫世掌天官故以明歷者為疇人子弟也竒淳諸注皆非王至于磻溪之水箋按一統志磻溪在鳳翔府寶雞縣東南八十里磻溪谷中石壁深邃東南隅有石室蓋太公所居吕尚釣于涯王下趨拜曰望公七年乃今見光景于斯尚立變名答曰望釣得玉璜其文要曰岐受命昌來提撰爾雒鈐報在齊箋按呂氏春秋曰太公釣于兹泉遇文王酈元曰磻溪中有泉謂之兹泉括地志兹泉源出岐州岐山縣西南几谷尚出遊見赤人自洛出授尚書命曰吕佐昌者子文王夢日月著其身又鸑鷟鳴於岐山箋按毛詩草蟲經曰雄曰鳳雌曰凰其雛為鸑鷟孟春六旬五緯聚房後有鳳凰銜書遊文王之都書又曰殷帝無道虐亂天下星命已移不得復久箋按琴操作遊文王之郊又星命一作皇命靈祇逺離百神吹去五星聚房昭理四海文王既沒太子發代立是為武王武王駢齒望羊箋按禮别名記曰武王望羊是謂攝陽盱目陳兵天下富昌孔子世家眼如望羊王肅曰望羊視也將伐紂至於孟津八百諸侯不期而會咸曰紂可伐矣武王不從及紂殺比干囚箕子微子去之乃伐紂度孟津中流白魚躍入王舟王俯取魚長三尺目下有赤文成字言紂可伐王寫以世字魚文消燔魚以告天有火自天止于王屋流為赤烏烏銜穀焉穀者紀后稷之德火者燔魚以告天天火流下應以告也箋按史記索隱曰白魚躍入王舟中至火復王屋為烏皆見周書及今文泰誓遂東伐紂勝于牧野兵不血刃而天下歸之乃封吕尚于齊箋按洛誥傳曰天下諸侯采服來受命于周者一千七百七十三諸侯周德既隆草木茂盛蒿堪為宮室因名蒿室箋按宋志作蒿宮又按晏子春秋曰明堂之制木工之鏤示民知節也然或以蒿為柱表其儉質也范成大桂海虞衡志曰大蒿容梧道中久無霜雪處有大者可作屋柱既有天下遂都于鎬箋按漢志武王治鎬師古曰今昆明池北鎬陂是十二年辛卯王率西夷諸侯伐殷敗之于坶野箋按書敘曰武王戎車三百兩虎賁三千人與紂戰于牧野作牧誓武成曰既戊午師渡孟津癸亥陳于商郊甲子朝誓昧爽受率其旅若林會于牧野罔有敵于我師牧説文作坶云地名在朝歌南七十里博物志武王伐紂會于幾逢大雨焉蓑輿三百乘甲三千一日一夜行三百里以戰于牧野孔朝注曰牧野商郊紂出朝歌二十里而迎戰也戎車三百五十乘則士卒三萬六千三百五十人有虎賁三千五百人也王親禽紂于南單之臺箋按周書克殷解周車三百五十乘陳于牧野帝辛從武王使尚父與伯夫致師王既以虎賁戎車馳商師商師大敗商辛奔內登于廩臺之上屏遮而自焚于火武王乃手太白以麾諸侯諸侯畢拜遂揖之武王先入適王所乃尅射之三發而後下車斬之以黃鉞折懸諸太白束晳汲冢書抄曰周武王親禽紂於南單之臺水經注曰南單之臺即鹿臺之異名也遂分天之明箋按分天之明天尚未明也立受子祿父是為武庚箋按周書克殷解立王子武庚命管叔相作雒解武王克殷乃立王子祿父俾守商祀史記衛世家武王已克殷紂復以殷餘民封紂子武庚祿父比諸侯以奉其先祀勿絶白虎通曰春秋譏二名何所以譏者乃謂其無常若乍為名祿父元言武庚夏四月王歸于豐饗于太廟箋按書武成惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商厥四月哉生明王來自商至于豐丁未祀于周廟邦甸侯衛駿奔走執豆籩孔傳曰此本説伐紂時一月周之正月月二日近死魄翼明也武王以正月三日行自周往伐商二十八日度孟津其四月始生明月三日四月丁未祭告后稷以下文考文王以上七世之祖孔疏曰四月哉生明謂四月三日四月己丑朔其日當是辛卯也丁未祀于周廟四月十九日也禮記大傳曰牧之野武王之大事也既事而退柴于上帝祈于社設奠于牧室遂率天下諸侯執籩豆駿奔走追王太王亶父王季歷文王昌不以卑臨尊也命監殷箋按地理志周既滅殷分其畿內為三國詩風邶鄘衛是也邶以封紂子武庚鄘管尹之衛蔡叔尹之以監殷民謂之三監鄭氏詩譜云分其地置三監使管叔蔡叔霍叔尹而教之遂狩于管箋按周書大匡解維十有三祀王在管管叔自作殷之監東隅之侯咸受賜于王王乃旅之以上東隅又周書文政解維十有三祀王在管管蔡開宗循孔朝曰管管叔三邑二叔開其宗族循鎬京之政言從化也左傳宣十二年晉師救鄭楚次管以待之預曰京縣東北有管城作大武樂箋按周書大武解武有六制政攻侵伐搏戰善政不攻善攻不侵善侵不伐善伐不搏善搏不戰孔朝曰言廟勝也尚書武成曰四月丁未祀于周廟越三日庚戌大告武成蔡仲默曰篇中有武成二字遂以名篇今據竹書武王十二年辛卯夏四月丁未祀于周廟作大武樂則是大告武成者謂大武之一成再成三成四成五成六成也申培詩説曰武為大武之一成賫為二成時邁為三成般為四成酌為五成桓為六成則是大告武成者即告以大武之樂成也樂記夫子語賓牟賈曰夫武者象成者也武成名篇者此矣十三年巢伯來賓箋按書敘曰巢伯來朝芮伯作旅巢命孔疏曰仲虺之誥云成湯放桀于南巢或此是也徐邈曰巢偃姓之國今為縣屬廬州府薦殷于太廟箋按薦殷于廟者薦殷俘也説文曰俘取也周書世俘解維四月乙未武王成辟四方通殷命有國惟一月丙辰旁生魄若翼日丁巳王乃步自于周征伐商王紂越若來二月既死魄越五日甲子朝至接于商則虔劉商王紂執夫惡臣百人太公望命禦方來丁卯望至告以馘俘戊辰王遂禦循自祀文王時日王立政呂他命伐越戲方壬申荒新至告以馘俘侯來命伐靡集于陳辛巳至告以馘俘甲申百弇以虎賁誓命伐衛告以馘俘辛亥薦俘殷王鼎武王乃翼矢圭矢憲告天宗上帝王不革服格于廟王烈祖自太王太伯王季虞公文王邑考以列升維告殷罪癸酉薦殷俘王士百人籥人造王矢琰東黃鉞執戈王奏庸大享一終王拜首稽首王定奏大享三終甲寅謁我殷于牧野王佩赤白旗籥人奏武王入進萬獻明明三終乙卯籥人奏崇禹生開三鐘終王定庚子陳本命伐磨百韋命伐宣方新荒命伐蜀乙巳陳本命新荒蜀磨至告禽霍侯俘艾仗侯小臣四十有六禽禦八百有三百兩告以馘俘百韋至告以禽宣方禽禦三十兩告以馘俘百韋命伐厲告以馘俘武王遂征四方凡憝國九十有九凡服國六百五十有二時四月既旁生魄越六日庚戌武王朝至燎于周乃俾史佚繇書于天號孔朝注曰使史佚用書重薦俘于天也遂大封諸侯箋按周本紀武王追思先聖王乃褒封神農之後于焦黃帝之後于祝帝堯之後于薊帝舜之後于陳大禹之後于祀於是封功臣謀士而師尚父為首封于營丘曰齊封弟周公旦于曲阜曰魯封召公奭于燕封弟叔鮮于管弟叔度于蔡餘各以次受封昭二十八年傳曰昔武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人林注曰之往也漢書賈山傳周蓋千八百國秋大有年箋按周頌曰綏萬邦屢豐年鄭箋曰誅無道安天下則亟有豐熟之年僖十九年傳寧莊子曰昔周飢克殷而年豐蓋謂此也又按春秋桓三年冬有年公羊傳曰有年何以書以喜書也大有年何以書亦以喜書也此其曰有年何僅有年也彼其曰大有年何大豐年也注曰宣十六年大有年十四年王有疾周文公禱于壇墠作金縢箋按書敘曰武王有疾周公作金縢書曰既克商二年王有疾弗豫公乃為三壇同墠植璧秉圭乃告大王王季文王史乃祝册曰維爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身孔傳曰壇築土墠除地蔡傳曰以其藏于金縢之匱編書者因以金縢名篇十五年肅慎氏來賓箋按國語曰仲尼在陳有隼集于陳侯之庭而死楛矢貫之石砮其長尺有咫陳惠公使問仲尼仲尼曰隼之來逺矣此肅慎氏之貢矢也昔武王克商肅慎氏貢楛矢石砮其長尺有咫先王欲昭令德之致逺也銘其楛曰肅慎氏之貢矢以分元女太姬配胡公而封諸陳君若使有司求諸故府其可得也使求得諸金櫝如之又按博物志曰肅慎氏有樹名雒常若中國有聖人代立則其樹生皮可為衣周武王成王時曽遣使入貢地理通釋曰肅慎北夷在玄菟北三千餘里通典挹婁即古肅慎之國在不咸山北夫餘東北千餘里濱大海勿吉在髙麗北亦古肅慎國地靺鞨即勿吉也初狩方嶽誥于沫邑箋按周頌詩序曰般巡狩而祀四嶽河海也孔疏曰武王既定天下巡行諸侯所守之土祭祀四嶽河海之神也又按書酒誥王若曰明大命于妹邦乃穆考文王肇國在西土孔傳曰周公以成王命誥康叔據竹書武王初巡方嶽遂誥于沫邑則此乃武王事也若成王之誥安得稱文王為穆考乎篇中稱文王者三而不及武王其當為武王之誥明矣况後世天子于宗邦諸侯尚有伯父叔父之稱而此直呼曰封曰汝何其于周公則謙而於周公之弟則倨也豫嘗著管成碩記以康誥亦武王之辭時成王改封康叔于衛若果為成王之辭則當云衛誥何仍云康誥乎蓋成王在服將闋不便遽自作誥以命叔父故史記世家謂取康誥而申之是也酒誥為武王所作據竹書初巡方嶽誥于沫邑在武王之十五年是也孔傳以為成王者疑非又按白虎通曰何以知太平乃巡狩以武王不巡狩至成王乃巡狩據周頌毛詩序曰般巡狩而祀四嶽河海也竹書武王十五年初狩方嶽則是武王早已巡狩非成王始也詩鄘風沫之鄉矣毛傳曰沫衛邑正義曰酒誥注云妹邦紂之都所處也紂都朝歌明朝歌即沫也冬遷九鼎于洛箋按周書克殷解王乃命南宮百達史佚遷九鼎三巫孔朝注鼎王者所傳寶三巫地名左傳桓二年臧哀伯曰武王克商遷九鼎于雒邑義士猶或非之漢書地理志河南故郟鄏周武王遷九鼎水經注王城東南名為鼎門蓋九鼎所從入也故謂是地為鼎中是武王克殷之時鼎已為周所遷至是又自三巫遷于雒邑也十六年箕子來賓箋按汲冢周書王曰咨爾商王父師惟辛不悛天用假手于朕去故就新辛錫朕以國闡洪範九疇錫侯以道朕殫厥邦土靡所私乃朝鮮于周底于遐逖其以屬父師史記宋世家箕子朝周過殷故墟城壞生黍箕子傷之乃作麥秀之詩曰麥秀漸漸兮禾黍油油兮彼狡童兮不與我好兮狡童謂紂也是箕子封朝鮮來朝于周之事也孔氏書疏曰箕子既受周之封不得無臣禮故于十三祀來朝據尚書敘曰武王勝殷殺紂立武庚以箕子歸作洪範是勝殷為十二年則作洪範者亦是年也書曰惟十有三年王訪于箕子豈去年得箕子今年始問耶史記亦以為武王克殷後二年問箕子或然也宋世家既作洪範武王乃封箕子于朝鮮是矣但箕子來朝當以竹書十六年為得而孔疏云十三年為非蓋朝鮮去周幾近萬里安得十二年始在周作洪範後封朝鮮十三年即來朝之理乎竹書以為十六年是也後漢書東夷傳曰昔武王封箕子于朝鮮箕子教以禮義田蠶又制八條之教其人終不相盜無門户之閉又按括地志髙麗治平壤城本漢樂浪郡王險城即古朝鮮也鄭開陽朝鮮圖説井田在平壤府外城內箕子區畫井田遺迹宛然孔安國洪範傳曰天與禹洛出書神龜負文而出列于背有數至于九禹遂因而第之以成九類孔疏曰易繫辭云河出圖洛出書聖人則之九類各有文字即是書也班固五行志舉劉歆之説謂五行五事為洛書本文自初一曰五行至威用六極悉龜背所有程泰之曰安國之所謂文者數著乎象而錯綜可觀焉耳劉歆謂洛書有字則全與孔異矣先儒立論非之曰如歆之説則洛書已有文字矣而所謂戴九履一左三右七二四為肩六八為足又何以故夫豈有兩洛書耶明王禕以圖書並出于伏羲之世皆聖人所則以作易洪範乃禹所自敘而非洛書今按莊子天運篇巫咸祒曰天有六極五常帝王順之則治逆之則凶九洛之事治成德備監照下土天下戴之此謂上皇吕吉甫注曰五常即五福嚮用五福威用六極順之則吉也反之則逆而凶九洛即洛書九疇九疇之用至于福極則治成德備天下戴之此所以為上皇據此天錫禹洛書禹因敘之以演疇與孔傳合若謂則河圖洛書専指伏義不得以兼禹將天垂象見吉凶亦止為伏義設耶後儒非之正自不必又巫咸所云上皇舊無明注余按廣成子曰得吾道者上為皇疑即此上皇也秋王師滅蒲姑箋按昭九年傳景王使詹桓伯辭于晉曰及武王伐商蒲姑商奄吾東土也郡國志下邳取慮縣有蒲姑陂書序成王東伐淮夷遂踐奄遷其君于蒲姑即此十七年命王世子誦于東宫箋按徐堅曰唐虞已上經傳無太子稱號至周始見文王世子之制白虎通曰何以知天子之子稱世子春秋傳曰王世子會于首止是也又按周書武警解維十有二祀四月王告夢丙辰出金枝郊寶開和細書命詔周公旦立後嗣屬小子誦文及寶典則成王立為世子至是已六年矣禮記文王世子曰成王幼不能涖阼以為世子則無為也又周書本典解曰維四月既生魄王在東宮召公告周公曰今朕不知明德所則政教所行字民之道禮樂所生非不念而知故問伯父是成王在東宮之事也漢書五行志曰東宮太子所居宫也冬十有二月王陟年九十四箋按詩清廟疏武王以成王年十嵗十二月崩今據竹書武王九十四陟是年丙申以甲子計之則武王生于武乙二十二年之癸亥是時文王二十二嵗生武王蓋武乙在位三十五年則武王十四嵗加文丁十三年則武王二十七嵗加帝乙九年帝辛五十二年則武王八十八嵗加代商六年武王九十四嵗嵗在丙申舊説文王十五生武王而又有伯邑考為之兄此大謬也觀關雎思得賢后以為之配求之不得輾轉反側若文王十二三時豈應作此語乎成王箋按周本紀武王崩太子誦代立是為成王名誦元年丁酉春正月王即位箋按漢志曰成王元年正月己巳朔此命伯禽俾侯于魯之嵗也據竹書則此元年嵗在丁酉也周書成開解成王元年大開告用周公曰王其敬天文命無易天不虞王拜曰式皇敬哉余小子思繼厥常以昭文祖定武考之列則成王初立已即天子之位周公攝政仍稱為王矣何嘗有負扆南面而攝天子之位哉命冢宰周文公總百官箋按周禮惟王建國設官分職乃立天官冢宰使率其屬而掌邦治以佐王均邦國鄭注曰爾雅冢大也冢宰大宰也世紀曰成王元年周公為冢宰攝政八年春正月王始躬政事以周公為太師封伯禽于魯父子並命周公拜于前魯公拜于後與紀年漢志並乖世紀之誤也庚午周公誥諸侯于皇門箋按庚午正月二日也周書曰周公會羣臣于閎門以輔王之格言作皇門維正月庚午周公格左閎門會羣臣曰嗚呼下邑小國克有耉老據屏位建沈入非不用明刑惟其開告豫于嘉德之説命我辟王小至于大孔朝注路寢左曰皇門閎音皇小至于大小大邦君也宣十一年傳楚克鄭入皇門至于逵路吳氏曰皇門周邑向京畿之道董逌石鼓文辨曰轡之柔矣作洛皇門此周公作也詩書不得盡見其因後代亡之亦未可知也似未見汲冢周書皇門解也夏六月葬武王于畢箋按周書作雒解乃嵗十二月王崩于鎬肂于岐為元年夏六月葬武王于畢括地志武王墓在雍州萬年縣西南三十八里畢原上秋王加元服箋按家語曰成王年十有三而嗣立周公居冢宰攝政以治天下明年夏六月既葬武王冠成王而朝于祖以見諸侯周公命祝雍作頌曰祝王辭達而已勿多也祝雍辭曰使王近于民逺于佞嗇于時惠于財親賢而任能其頌曰令月吉日王始加元服去王幼志服衮職欽若昊天六合是弋率爾祖考永永無極又按漢書昭帝紀元鳯四年春正月丁亥帝加元服如淳曰元服謂初冠加上服也師古曰如氏以為衣服之服非也元首也冠者首之所著故曰元服其下汲黠傳序曰上正元服是知謂冠為元服儀禮圖解儀禮所存者唯士冠禮自士以上有大夫諸侯天子冠禮見於家語冠頌大戴公冠與禮記玉藻者雖遺文斷闕不全而大槩亦可考如趙文子冠則大夫禮也魯襄公邾隱公冠則諸侯禮也周成王冠則天子禮也大夫無冠禮古者五十而後爵何大夫冠禮之有其冠也則服士服行士禮而已始冠緇布冠自諸侯下達諸侯始加緇布冠繢緌其服玄端再加皮辨三加玄冕大戴禮公冠四加玄冕鄭注曰四當為三是也天子始冠加玄冠朱組纓再加皮辨三加衮冕玉藻曰玄冠朱組纓天子之冠也三王共皮辨素幘疏曰以其質素故三王同之是三加衮冕冠頌曰去王幼志服衮職是也武庚以殷叛箋按地理志鄁以封受子武庚是武庚所居即殷都也成王時乃以殷叛周文公出居于東箋按書金縢曰武王既喪管叔及其羣弟乃流言于國曰公將不利于孺子周公乃告二公曰我之弗辟我無以告我先王周公居東二年則罪人斯得孔傳曰辟法也陸德明曰馬鄭音避謂避居東都今據竹書成王元年武庚以殷叛周文公出居于東二年秋王逆周文公于郊遂伐殷則是居東者謂出居于東也孔傳謂周公既告二公遂東征之非矣然馬鄭以居東為東都亦非史記魯世家曰人或譖周公周公奔楚邵氏寶曰周公避流言嘗居東矣魯公封也不之魯而之楚乎據戰國䇿惠施曰昔王季歷葬于楚山之尾滎水齧其墓季婦鼎銘曰王在成周王徙于楚麓左傳成十三年迓晉侯于新楚杜注新楚秦地括地志終南山一名楚山在雍州萬年縣南五十里武王墓在萬年縣西南三十里周公奔楚當是因流言出居依于王季武王之墓地必無逺涉東都之理邵疑為楚國謬矣觀下文王啓金縢執書以泣曰維朕小子其新逆王出郊天乃雨反風則居東為成周之近郊而必非東都明矣二年奄人徐人及淮夷入于邶以叛箋按左傳因商奄之民命以伯禽説文云䣍國在魯括地志兖州曲阜縣奄里即奄國之地左傳周有徐奄注二國嬴姓魯世家伯禽即位之後有管蔡等反也淮夷徐戎亦並興反秋大雷電以風王逆周文公于郊遂伐殷箋按金縢曰王出郊天乃雨反風孔傳曰郊以玉幣謝天今據竹書則郊是國之近郊而不得謂郊天之郊矣爾雅邑外謂之郊周禮杜子春注云五十里為近郊鄭氏云天子近郊五十里三年王師滅殷殺武庚祿父箋按周書作雒解周公立相天子三叔及殷東徐奄及熊盈以略周公召公內弭父兄外撫諸侯元年夏六月葬武王于畢二年又作師旅臨衛政殷殷大震潰降辟三叔王子祿父北奔管叔經而卒乃囚蔡叔于郭潾凡所征熊盈簇十有七國俘維九邑俘殷獻民遷于九畢俾康叔宇于殷俾中旄父宇于東孔朝注曰康叔代霍叔中旄代管叔遷殷民于衛箋按書敘曰成王既伐管叔蔡叔以殷餘民封康叔作康誥酒誥梓材遂伐奄箋按定四年傳祝鮀曰因商奄之民命以伯禽而封于少昊之虛鄭氏曰奄國在淮夷之北孟子三年伐奄討其君蓋成王嗣位之三年也滅蒲姑附注薄姑氏與四國作亂故周文公滅之箋按此蒲姑當是薄姑之訛昭二十年傳晏子曰昔爽鳩氏始居此地季萴因之逢伯陵因之蒲姑氏因之而後太公因之則是蒲姑之滅太公之封皆在于武王之世安得至成王時始滅蒲姑耶漢書地理志周成王時薄姑氏與四國作亂成王滅之師古漢昭帝紀注四國管蔡商奄也地理志琅琊姑幕縣應劭曰薄姑氏之國後漢注姑幕故城在密州莒縣東北郡國志博昌縣有薄姑城屬樂安國取慮縣有蒲姑陂屬下邳國故曰此蒲姑蓋薄姑之訛也四年春正月初朝于廟箋按詩序曰閔于小子嗣王朝于廟也鄭箋曰嗣王者謂成王也除武王之喪將始即政朝于廟也夏四月初嘗麥箋按周書敘成王即政因嘗麥而語羣臣求助作嘗麥周書嘗麥解曰維四年孟夏王初祈禱于宗廟乃嘗麥于太祖是月也命大正正刑書太祝以王命作策衆臣咸興受大正書乃降太史策刑書九篇以升授大正大正坐舉書乃中降再拜稽首王命太史正升拜于上王則進太史乃藏之于盟府以為嵗典王師伐淮夷遂入奄箋按書敘曰成王東伐淮夷遂踐奄作成王政孔傳曰為平淮夷徙奄之政令今亡五年春正月王在奄遷其君于蒲姑箋按書序曰成王既踐奄將遷其君于蒲姑周公告召公作將蒲姑左傳昭十六年齊師至蒲隧杜注下邳取慮縣有蒲姑陂夏五月王至自奄箋按書敘曰成王歸自奄在宗周告庶邦作多方書曰惟五月丁亥王來自奄至于宗周孔傳曰周公歸政之明年淮夷奄又叛魯征淮夷作費誓王親征奄滅其國五月還至鎬京按竹書夏五月王至自奄在公攝政之五年後二年公始復政于王孔傳云王至自奄在公歸政之明年疑誤遷殷民于洛邑遂營成周箋按周書作雒解周公將致政乃作大邑成周于土中立城方千七百二十丈郛方七十里南繫于洛水北因于郟山以為天下之大湊尚書多方曰昔朕來自奄于大降爾四國民命乃明致天罰移爾遐逖又曰今朕作大邑于兹洛亦惟爾多士奔走臣我多遜是遷殷民在前作洛在後也蔡氏曰敘書者考之不詳以為成周既城遷殷頑民謬矣今據竹書云遷殷民于洛邑遂營成周是作洛在遷殷之後則蔡傳是也呂氏曰孔子序洛誥云周公往營成周則成周乃東都總名河南成周之王城也洛陽成周之下都也王城非天子時會諸侯則虛之下都則保釐大臣所居治事之地周人朝夕受之習見既久遂獨指以為成周矣六年大搜于岐陽箋按昭四年傳椒舉言于楚子曰成有岐陽之搜國語叔向曰昔成王盟諸侯于岐陽楚為荆蠻致茅蕝表坐七年周公復政于王箋按周書明堂解夫維商紂暴虐脯鬼侯以享諸侯天下患之四海兆民欣戴文武是以周公相武王以伐紂夷定天下既克紂六年而武王崩成王嗣幼弱未能踐天子之位周公攝政君天下彌亂六年而天下大治乃會方國諸侯于宗周大朝諸侯明堂之位制禮作樂頒度量而天下大服各致其方賄七年致政于成王漢書律歷志是嵗十二月戊辰晦周公以反政故洛誥篇曰戊辰玉在新邑蒸祭嵗命作䇿惟周公誕保文武受命惟七年又魯周公世家曰七年後還政成王􅀈􅀈如畏然徐廣曰􅀈􅀈敬慎貌也蔡氏書傳曰先儒謂成王幼周公代王為辟至是反政成王故曰復子明辟夫有失然後有復武王崩成王立未嘗一日不居君位何復之有哉今據竹書云成王七年周公復政于王蓋七年之前成王尚幼天下之政皆聽于冢宰至是復政于王令自親政耳豈曰我先為明辟至是復子明辟哉書義自明傳書者誤耳春二月王如豐箋按書召誥曰惟二月既望越六日乙未王朝步自周則至于豐孔傳曰周公攝政七年二月十五日日月相望于巳望後六日二十一日成王朝行從鎬京則至于豐以遷都之事至文王廟告文王詩序曰清廟祀文王也周公既城洛邑朝諸侯率以祀文王焉三月召康公如洛度邑箋按召康公名奭燕世家曰召公奭與周同姓皇甫謐曰文王之庶子穀梁傳曰燕之分子也漢扶風雍縣東南有召亭召康公邑焦氏筆乘曰史篇召公名醜奭豈其字耶書敘曰成王在豐欲宅洛邑命召公先相宅作召誥書曰惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅即此也孔氏召誥傳曰是時周公居攝五年據竹書則召公如洛度邑乃在周公復政之明年為成王七年多二年也蓋書傳言四年建侯衛五年營成周建侯衛者尚書康誥曰惟三月哉生魄周公初基作新大邑于東國洛四方之民大和會是也竹書成王五年王至自奄遷殷民于洛邑遂城成周者洛邑既成營成周為遷洛之計也至七年如洛度邑則度邑即召誥之卜宅詩所謂宅是鎬京之宅周書度邑解稱武王曰瞻于伊洛無逺天室其曰兹日度邑是也于洛度邑本武王之意而成王周公成之以為東都命召公先相宅者此也孔傳以此為五年之事未見竹書故也甲子周文公誥多士于成周箋按書敘曰召公既相宅周公往營成周作洛誥成周既成遷殷頑民公以王命誥作多士王氏曰篇名多士序以為頑民何也在官者謂之士卿大夫士是也在民者謂之士士農工商是也此書稱士皆在官之殷士也遂城東都箋按昭三十二年傳昔成王合諸侯城成周以為東都崇文德焉詩王城譜曰王城者周東都王城畿內方六百里之地正義曰車攻序云復會諸侯于東都謂王城也周以鎬京為西都故謂王城為東都即洛邑也王如東都諸侯來朝箋按尚書周官曰六年五服一朝又周書明堂解曰大朝諸侯明堂之位天子負斧扆南面立率公卿士侍于左右三公之位中階之前北面東上諸侯之位阼階之東西面北上諸伯之位西階之西東面北上諸子之位門內之東北面東上諸男之位門內之西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上四塞九口之國世告至者應門之外北面東上宗周明堂之位也明堂者明諸侯之尊卑也故周公建焉而朝諸侯于明堂之位冬王歸自東都箋按書洛誥疏曰周公攝政七年三月經營洛邑既成洛邑又歸向西都詩王風疏曰以洛邑為東都則此云歸自言自此而歸也立髙圉廟箋按魯語展禽曰髙圉太王能帥稷者也故周人報焉八年春正月王初蒞阼親政箋按文王世子曰成王幼不能涖阼周公相踐阼而治注曰武王崩成王方十嵗雖涖阼為天子未能行治天下之事故周公以冢宰攝政相治之黃東發曰踐阼亦指成王非指周公是成王久已踐阼至是始親政也命魯侯禽父齊侯及遷庶殷于魯箋按定四年傳子魚曰昔武王克商成王定之選建明德以屏藩周分魯公以殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使率其宗氏輯其分族將其醜類以法則周公用即命于周是從前伯禽封魯已分以殷之六族至武庚既誅復遷庶殷于魯使醜類得有所統率也作象舞箋按仲尼燕居曰兩君相見升堂而樂闋下管象武注曰言象而兼言武者象蓋武舞之樂也呂氏春秋曰成王立殷民反周公踐伐之商人服象為虐於東夷周公遂以師逐之至于江南乃為三象以嘉其德髙誘曰三象周公所作樂名淮南子齊俗訓曰周人之禮其樂大武三象棘下是也詩序曰維清奏象舞也鄭箋曰象用兵時刺伐之舞武王制焉墨子三辨篇武王因先王之樂又自作象以象為武王所作時竹書未出故皆誤以為武王也冬十月王師滅唐遷其民于杜箋按襄二十四年傳范宣子曰昔丐之祖在商為豕韋氏在周為唐杜氏杜預曰唐杜二國名殷末豕韋國于唐周成王滅唐遷之于杜為杜伯今京兆杜縣徐才宗國都記曰周成王時唐人作亂成王滅之而封太叔遷唐人子孫于杜括地志故唐城在絳州翼城縣北三十里即堯裔子所封九年春正月有事于太廟箋按春秋宣八年夏六月辛巳有事于太廟杜預曰有事祭也又昭十五年二月癸酉有事于武宮傳曰禘于武公則此有事于太廟亦是禘也初用勺箋按詩序曰酌告成大武也申培詩説曰酌為大武之五成孔疏曰酌左傳作勺內則曰十三舞勺成童舞象繁露曰周公輔成王作汋樂以奉天勺與酌汋義一也肅慎氏來朝王使榮伯錫肅慎氏命箋按武王十五年肅慎氏來賓貢楛矢石砮至是而又來朝書敘曰成王既伐東夷肅慎來賀王俾榮伯作賄肅慎之命傳曰賄賂也義未詳篇亡疏曰榮國名周同姓諸侯為王卿士據穆傳太王亶父封其元子吳太伯于東吳賄用周室之璧郭注賄贈賄也則賄肅慎者義蓋如此不當以賄賂解之十年王命唐叔虞為侯箋按晉世家唐叔虞者周武王子成王弟字子于定四年傳子魚曰分唐叔以大路密須之鼓闕鞏姑洗懷姓九宗職官五正命以康誥而封于夏虛杜預曰夏大夏今太原晉陽也越裳氏來朝箋按尚書大傳曰周成王時越裳氏重九譯而貢白雉韓詩外傳曰越裳氏重譯來朝海不揚波三年矣意者中國有聖人乎水經注曰交州外城記九德縣屬九真郡與日南接周越裳氏之夷國中華古今注曰舊説云指南車周公所作也越裳氏重譯來朝使者迷其歸路周公錫以軿車五乘皆為司南之制使越裳氏載之以南緣扶南林邑海際期年而至其國使大夫窶將送至其國而還其始制車轄轊皆以鐵還至周鐵亦銷盡以屬巾車氏攻而載之常為先道示服逺人而正四方也周文公出居于豐箋按三輔決録注鎬在酆水東酆在鎬水西相去二十五里十一年春正月王如豐箋按通鑒綱目前編曰成王十有一年周公在豐作無逸以戒王無逸曰君子所其無逸先知稼穡之艱難乃逸孔疏曰上言君子當無逸此言乃謀逸豫者君子之事勞心與形般于遊畋形之逸也無為而冶心之逸也君子無形逸而有心逸既知稼穡之艱難可以謀心逸也是時公在豐而王亦如豐公因作無逸以戒之唐叔獻嘉禾王命唐叔歸禾于周文公箋按書敘曰唐叔得禾異畝同穎獻諸天子王命唐叔歸周公于東周公既得命禾旅天子之命作嘉禾又按嘉禾書亡而張霸乃偽作嘉禾篇有周公奉鬯立于阼階延登贊曰假王涖政王莽遂依之以稱居攝則偽書之惑世誣民者大矣王命周平公治東都箋按都疑作郊書敘周公既沒命君陳分正東郊成周作君陳鄭注曰天子之國五十里為近郊今河南洛陽相去則然是近郊五十里之驗也據竹書周公之薨在成王二十一年時猶未薨敘説誤也周本紀太史公曰學者皆稱周伐紂居洛邑綜其實不然武王營之成王使召公卜居九鼎焉而周復都酆鎬是成王雖作洛邑猶還西周而東都之地則命周平公分正東郊是也陳氏曰治洛以化殷民為重故君陳畢命曰尹兹東郊保釐東郊雖以東郊言實全付以治洛也約按周平公即君陳周公之子伯禽之弟箋按鄭康成論語注曰君陳周公子又按焦氏筆乘曰周書有君陳篇王伯厚以君陳為周公之子伯禽之弟見坊記注十二年王師燕師城韓王錫韓侯命箋按僖二十四年傳富辰曰邘晉應韓武之穆也鄭語史伯對鄭桓公曰武王之子應韓不在其在晉乎則韓侯蓋武王之子成王之弟也史記韓世家乃曰韓之先與周同姓殊失考矣今據竹書成王命韓侯就國王師燕師城韓蓋是時韓侯之國與燕為近水經注聖水東徑方城縣又東南徑韓城東詩韓奕篇曰溥彼韓城燕師所完王錫韓侯其追其貊奄受北國鄭箋曰周封韓侯居韓城為韓伯言為玁狁所逼稍稍東遷也王肅曰今涿郡方城縣有韓侯城是也郡縣志方城故城在涿州固安縣南十七里然則宣王時韓侯封于韓原居梁山之地蓋即此韓侯之裔孫也其詩曰王親命之纘戎祖考又曰以先祖受命因時百蠻皆指成王時韓侯言也溥彼韓城燕師所完非即紀年之所稱王師燕師城韓者哉此蓋追述其先祖之事欲其克紹前烈非宣王之世别有燕師城韓也十三年王師會齊侯魯侯伐戎箋按此當是東方之戎近齊魯者如春秋之世公會戎于潛公及戎盟于唐公追戎于濟西北戎伐齊皆東方之戎故王師會齊魯以伐之夏六月魯大禘于周公廟箋按大禘于周公廟者蓋周公亶父周公季歷之廟也時周文公後八年始薨故知非周文公之廟也禮明堂位曰魯君孟春祀帝于郊配以后稷季夏六月以禘禮祀于太廟是也十四年秦師圍曲城克之箋按成王時無秦秦當作齊又城當作成齊太公世家武王封師尚父齊營丘萊人來伐與之爭營丘故至是齊師圍曲成而克之郡國志東萊有曲成蓋萊夷地也冬洛邑告成箋按周成王七年召康公如洛度邑至是凡八年而洛邑始告成十八年春正月王如洛邑定鼎箋按周本紀成王在豐使召公復營洛邑如武王之意周公復卜申視卒營築居九鼎焉左傳宣三年王孫蒲勞楚子曰成王定鼎于郟鄏杜注曰郟鄏今河南也武王遷之成王定之鳳凰見箋按周書王會解鳳凰戴仁抱義尚書周公留君奭篇曰耉造德不降我則鳴鳥不聞則前此召公未求去時鳳凰固嘗至矣此云鳳凰見蓋以王如洛邑時見也故特書之遂有事于河箋按左傳杜注曰有事有祭事也武王沒成王少周公旦攝政七年制禮作樂神鳥鳳凰見箋按説文曰鳳神鳥也蓂莢生乃與成王觀于河洛沉璧禮畢王退俟至于日昃箋按昃宋志作昧榮光並出幕河青雲浮至箋按禮斗威儀曰周成王治平觀于河青雲浮于河青龍臨壇銜元甲之圖坐之而去禮于洛亦如之元龜青龍蒼光止于壇背甲刻書赤文成字周公援筆以世文寫之箋按周公攝政七年下至此皆尚書中候文也刻書乃列書之訛青龍乃青純之訛書成文銷龜隨甲而去箋按宋志作墮甲是其言自周公訖于秦漢盛衰之符箋按世皆以沈約附注為紀年本文今言自周公訖于秦漢則附注為沈氏之自撰無疑麒麟遊苑箋按漢書武帝紀周成康時麒麟在郊藪鳳凰翔一作翺庭成王援琴而歌曰鳳凰翔兮于紫庭余何德兮以感靈賴先王兮恩澤臻于胥樂兮民以寧箋按樂録曰成王時鳳凰翔舞成王作此歌曰神鳳操已上並見宋書符瑞志十九年王巡狩侯甸方嶽召康公從箋按周禮大行人十有二嵗王巡守殷國王制天子五年一巡守鄭氏曰五年者虞夏之制也周則十二年一巡守又按大司馬及師大合軍注曰師為王巡守若會同司馬起師以從召康公之從或亦兼攝司馬也歸于宗周遂正百官箋按書序成王既黜殷命滅淮夷還歸于豐作周官書曰惟王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承德歸于宗周董正治官是其事也陳氏曰書言歸于宗周乃鎬京非豐也然豐鎬甚近故只以宗周言之兼是時有黜豐侯之事其在豐為無疑也黜豐侯箋按左傳富辰曰豐文之昭也杜注豐國在始平鄠縣東又三禮圖曰豐國名其君以酒亡國故崔駰酒針云豐侯沉湎是也二十一年除治象箋按周禮太宰之職曰正月之吉始和邦國都鄙乃縣治象之法于象魏使萬民觀治象小宰之職曰正嵗帥治官之屬而觀治象之法是周制一嵗既懸治象以示之復觀治象以警之至是而成王除之以法立而民不犯故除之也周文公薨于豐箋按書敘曰周文公在豐將沒欲葬成周公薨成王葬于畢告周公作亳姑蓋成王以薄姑益魯之封故告之周公而因作亳姑以命魯也古亳薄通用二十二年葬周文公于畢箋按史記曰周公病將沒曰必葬我成周以明吾不敢離成王周公既卒成王亦讓葬周公于畢從文王以示余小子不敢臣周公一統志周公墓在咸陽縣北一十五里二十四年於越來賓箋按吳越春秋曰少康恐禹祭之絶祀乃封其庶子于越號曰無余無余質朴不設宮室之飾從民所居春秋祠禹墓于會稽傳世十餘末君微劣不能自立轉從衆庶為編户之民禹祀斷絶十有餘嵗有人生而言語其語曰禽鳥呼咽喋咽喋指天向禹墓曰我是無余君之苗末我方修前君祭祀復我禹墓之祀為民請福于天衆民悅喜皆助奉禹祭四時致貢共封立以承越君之後漢書音義曰于南方越名也賀循會稽記曰少康其少子號曰於越越國之稱始此二十五年王大會諸侯于東都四夷來賓箋按周書王會解成周之會墠上張赤奕隂羽天子南面立唐叔荀叔周公在左太公望在右旁天子而立于堂上堂下之右唐公虞公南面立焉堂下之左殷公夏公立焉皆南面堂下之東面郭叔掌為天子菉幣焉內臺西面者正北方應侯曹叔伯舅中舅比服次之要服次之荒服次之西方東面正北方伯父中子次之堂後東北為赤奕焉中臺之外其右泰士臺左彌士外臺之四隅張赤奕為諸侯欲息者皆息焉命之曰爻閭周公旦主東方所之青馬黑􅀢謂之母兒西面者正北方稷慎大麈穢人前兒良夷在子揚州禺發人鹿俞人雖馬青丘狐九尾周頭輝􅀈黑齒白鹿白馬白民乘黃東越海蛤歐人鱓蛇姑於越納姑妹珍且甌文蜃若人玄貝海陽大蟹自深桂會稽以􅥜皆西嚮正北方義渠以兹白史林以尊耳北唐戎以閭閻以隃冠渠叟以鼩犬樓煩以星施卜盧以紈牛區陽以鱉封規矩以麟西申以鳳鳥北羌鸞鳥巴人以比翼鳥方揚以皇鳥蜀人以文鶾方人以孔鳥卜人以丹砂夷用闖木康民以桴苡州靡費費都郭生生竒幹善芳皆東嚮北方臺正東髙夷嗛羊獨鹿卭卭距虛孤竹距虛不令支玄模不屠何青能東胡黃羆山戎菽其西般吾白虎屠州黑豹禺氏騊駼大夏兹白牛犬戎文馬數楚每牛胸戎狡犬皆北嚮權扶三目白州北閭禽人菅路人大竹長沙鱉其西魚復鼓鐘鐘牛蠻揚之翟倉吾翡翠南人至衆皆北嚮冬十月歸自東都大事于太廟箋按周禮太宰職云作大事則戒于百官贊王命鄭注春秋傳曰國之大事在祀與戎宫正云凡邦之大事令于王宫之官府次舍鄭注大事祭事也春秋傳曰有大事于太廟今據竹書成王九年有事于太廟是禘祭一廟之主二十五年大事于太廟是合祭羣廟之主故孔氏雍詩疏曰春秋文二年八月丁卯大事于太廟公羊傳曰大事者何大祫也毁廟之主陳于太祖未毁廟之主皆升合食于太祖是合祭羣廟之主謂之大事三十年離戎來賓箋按水經注戲水出驪山馮公谷又北徑麗戎城東麗戎男國也姬姓索隱曰驪山在新豐縣西南故離戎男國也約按驪戎驪山之戎也為林氏所伐告于成王箋按周左史戎夫記云林氏召驪戎之君而朝之至而不禮驪戎逃歸林氏伐之三十三年王遊于卷阿召康公從歸于宗周箋按張衡東京賦西阻九阿穆天子傳天子西征升九阿郭注疑今西安縣十里九坂也詩序卷阿召康公戒成王也言求賢用吉士也豐鎬宗廟所在故謂之宗周書酆保解周王三十三祀九州之侯咸格于周王在酆昧爽立于少庭正是時事也命王世子釗如房逆女箋按唐書世系表舜封堯子丹朱于房書志房州永清縣有房山故國也一統志廢永清縣在鄖陽府房縣東一百一十里丹朱封房房為堯後故康王娶于房也其曰如房逆女者周禮王者穀圭以聘女以王者言之故稱女也公羊傳曰祭公來逆王后于紀以臣下言之故稱后也房伯祈歸于宗周箋按房國名房伯名祈送女歸于鎬京也桓九年傳曰凡諸侯之女行惟王后書春秋曰紀季歸于京師是也三十四年雨金于咸陽箋按地理志扶風渭城故咸陽括地志咸陽故城在咸陽縣東十五里三輔黃圖曰山南為陽水北為陽山水皆在陽故曰咸陽約按咸陽天雨金三年國有大喪箋按雨金在辛未王陟在癸酉是三年也三十七年夏四月乙丑王陟箋按書敘曰成王將崩命召公畢公率諸侯相康王作顧命書曰惟四月哉生魄王不懌乃同召太保奭芮伯彤伯畢公衛侯毛公云云王曰兹豫審訓命汝越翼日乙丑王崩漢志曰成王三十年四月庚戌朔十五日甲子哉生魄其説謂周公攝政七年成王即政三十年共三十七年鄭康成謂此年為成王之二十八年章子平編年通載謂成王在位四十七年今據竹書成王在位三十七年陟是漢志不謬也竹書統箋卷七
